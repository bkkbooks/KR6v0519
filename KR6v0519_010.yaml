body:
  text: 天目山三學學人廣賓纂器界莊嚴品側聞根身曰正宿業緣生器界為依吾心影現以故大地本微塵無明所聚名山多間氣有道斯開稽夫我虎林之所自也遐祖崑陵十萬里締南龍而盡局邇宗黃海五百年儲西目以開都上衡天市之垣外控海門之案山勢北來有朝宗之象水形東去無陵奪之虞堂堂乎蓋九重天子之畿非士民所敢當也浩浩乎實五印聖人之域豈鬼神所敢據焉於是我大士瑞擁五雲靈盤三竺屏匝五峯上聳摩天之碧幢浮一剎中函布地之金遂令航海梯山櫛風沐雨玉帛走三吳之會香華招百粵之衡六橋深處同參水月分身九里清陰更聽松風代梵山固不殊佛國地偏迥絶皇輿詩云泰山巖巖魯邦所瞻按經曰三千大千世界約一四天下一日月所照臨中有山王高三百三十六萬里名須彌盧次第有山高廣遼闊俱以海間之至八重外出為中國河源當西海之戌地北海之亥地有山縱廣萬里高萬一千里其下青白赤黑之河環其墟是名崑崙自崑崙東南觚角分條由康姑九萬八千七百五十里出西羌天竺西番南界曰六國山之北一萬二千里達巴蜀之嚴鵬山分枝三派南股歷雍思入東蜀之南過東北起平華頂分二股左股逾四川之東北至雷磨山起二支一支入廣西與辰州之北界合行過東梅峯北角入建者踰潛陽山起祖歷鉛山其左股一條踰玉山蓼華峯起頂分三條一條通祁門至黃山下昌化竹嶺洎於潛之白沙關四十五里抵豪千關乃崛起為西天目之金仙頂是為武林天竺諸山之宗也去府治一百七十里高三千九百丈周廣五百五十里東南發脈三十里至臨安之泥塢六十里交新城之青牛嶺六十里次富陽塌石嶺二十里屆餘杭由拳嶺三十里乃錢塘分金嶺蜿蟺東來循五朝度龍門伏而奮起莫不陵深拔峭布麓舒岡若舞若翔嶄焉鬱勃為天門山錢塘志曰兩峯對峙如門也天門西南曰栗山蓋天竺南北兩山所宗有吳大帝石杵在焉栗山北擁為天竺諸峯曰乳竇曰雙檜曰白雲曰中印曰獅子是為上竺曰稽留為中竺曰蓮花曰月桂為下竺從上竺而南而東為龍井為大慈為玉岑為積慶為南屏為龍為鳳為吳山皆謂之南山從上竺而北而東為靈隱為仙姑為履泰為寶雲為巨石皆謂之北山合南北飛來古謂之武林山聯絡周匝鉤綿秀絶鬱蔥扶輿之氣盤結鞏厚濬發光華體魄閎矣潮擊海門而上者晝夜再至夫以山奔水導而逆以海潮則氣脈不解故東南雄藩形勢浩偉生聚繁茂未有若錢塘者加以南北山間匯為西湖泄惡渟深皎潔圓瑩若練若鏡若雙龍交度而頷下明珠懸抱不釋若蓮萼會敷拊瓣莊嚴而馥郁花心含蓄甘露是以天然妙境無事雕飾覿之者心曠神怡遊之者畢景留戀信靈山之佛國宇內所稀覯者也形勝雙檜峯在白雲峯之右隅上有雙檜婆娑取雙樹之意昔翊大師嘗趺坐其下峯有巖名雙檜巖一名百丈巖白雲峯在愚岡之右雙檜之左昔寺創始時居人遠矚嘗有白雲儼如幢蓋覆其上故名實寺之主山也中印峯大殿左山也昔翊大師結茅西峯時嘗入定見大士語之曰汝前劫遊西乾中印度國吾受記汝指其對峙之山曰中印庶汝不忘宿因故名是峯實居羣峯之中乳竇峯寺之正案奇峻插天恰對大殿下有石竇出泉色白香冽其味如乳獅子峯在乳竇峯之右昔翊大師經行時忽聞獅聲震吼故名至今山腰有奇石狀如獅寺之把門峯也香爐峯在大路側狀如香爐故名按武林內七志天香巖在天巖房之後舊有叢桂故名頂巖有奇石狀如紗帽名紗帽石宋佛光祖師塔於此雙檜巖一名百丈巖見前烏石嶺在白雲峯後石色斑剝奇石巖下有洞名烏石洞獵人曾於此獲虎俗名虎巖郎當嶺又名捫薜嶺在幽淙嶺之上下為活沙塢左迫削嶂右臨深溪緣木攀蘿方可舉趾非芒屩莫登雖矯捷亦懾故稱郎當上為天門東通龍井南通五雲水出嶺一名幽淙嶺在郎當嶺下有泉出自山巔泠泠如琴瑟大旱不竭猢猻嶺在幽淙之下舊有猢猻故名梯子嶺一名蘇子嶺在華嚴塢嶺由東坡與辨才得名楓樹嶺在中印峯愚岡之交上多楓木故名石人嶺在烏石峯西上有石如人一名栗山又名粟山高六十二丈路屈曲如羊腸又名馮公嶺通西溪愚岡在白雲中印交接之處宋時培土號愚岡蓋取愚公移山意琴岡在大殿前平圓豐正橫亘可撫也頂從白雲峯南抽小支峻削如翠屏如火雲如陳旗直下於麓伏而為案蓋天設也青鳥氏云此琴形法應萟竹則琅玕清越寺出韻人楊梅塢在獅子峯麓宋時楊梅甚盛而金婆家所産尤稱佳品故以為名也慧光訥法師退居此塢宸翰賜額曰彌陀興福院今僧德光興復華嚴塢俗呼心安塢以谷中為心安房也今深處有華嚴山居本名蘇子塢相傳東坡辨才嘗夷猶於此雲隱塢在雲隱堂後路通猢猻幽淙捫薜三嶺歡喜臺在雙檜峯之上其臺平如掌可眺覽可觴詠俗謂負樵者至此乃喜故名四顧坪去百丈崖不數武堪趺坐曠覽羅阜上供五聖護法神以鎮水口如意石一名轉元石面鏤如意文曲折回繞大悲泉經此出焉韋馱石在乳竇峯東側山尖巨石立如神恰對大士殿故號韋馱獅子石見前紗帽石見前烏石見前仙人石在猢猻嶺下兩石相對老人洞石筍在烏石下半高數仞圓峭特立一名卓筆峯董明德詩異種休誇玉版禪嶄然頭角立層巔遠尖自抱雲根壯疊蘚誰疑雨籜纏夢裏三生空過眼胸中千畝謾流涎應知不入寧公譜出土摩霄是幾年石人在石人嶺頂上高丈許如人近看如將軍戴笠然又一處望如幼女雙髻又號女兒山老人洞在猢猻嶺北隴絶頂有石洞如室可避風雨羅漢洞在獅子峯流虹澗匯五峯之水於普門外又折而左與淙老橋諸流合而為一總名流虹當梅霖初霽積雨浹旬奔湍激石駛瀨穿雲噴雪轟雷跳珠飛沫望之若素練縈紆長虹亘地故名南澗發源於幽淙西合華嚴塢水會德馨橋出大澗漢時名即今之流虹澗雲液池在白雲峯下泉自山足湧出瀦之石池如玉又名白雲泉榮國公道衍次芝雲法師韻曰白雲飛出化為水歘然湧起蒼崖底初疑銀漢自空墮忽驚瓊沫因風起流來澗曲隨方圓有時不動為雲眠氣通崑阜石中玉光挹泰華峯頂蓮斗星倒影澄可數小池分出開榛楚渴麋下飲跪兩足靈禽並浴敷雙羽雨餘更覺清且深雪霽欲汲應難尋溶溶散野豈有意滔滔出岫曾無心嗟我重遊不知處應喜樵人引來路霞裾霑潤帶天香從兹領得山中趣遂傾一勺調枯桐千劫熱惱須臾空期與雲泉作世友日日來此聽松風池上有辨才手植山茶花今無如意池池以青石為之方有丈許面鏤如意文曲折回繞如流觴焉水月池在中印峯前宋寶祐五年十二月理宗敕住持佛光照法師鑿之福聚池清蔭池俱在雲隱房華光池在白雲西院清興池在伴雲房徹骨池在大士殿前琴案之南麓離位以鎮火災大可畝餘今廢載武林梵志大悲泉在正殿之乾夢泉在雙檜峯下宋崇寧元年大旱廚水不給主僧至法師夢有泉發於西坡鑿之果得因名華光泉在白雲西院之右泉出崖石間白雲泉在白雲峯下乳竇泉在乳竇峯下泉色白如乳味香美甘冽水月泉在中印峯前凝翠泉在幻西房後冽泉在普門房後即流虹所瀦出邵志孫公泉即無竭泉在孫公亭石壁間下有方池可尺許雖大旱不竭觀音出現井在殿後即神木發光之所幻應井在正殿之巽按生氣方也今廢為鯨音之出路坐禪井一名古春井在中印峯下昔古春法師坐禪處故名楓樹巷路通楓樹嶺雲心深處巷路通幽淙諸嶺古名蘇子巷多福巷在乳竇峯前道翊祖師靈塔出路楊梅巷古興福院出路內名楊梅塢宋時楊梅甚盛故名天竺路闊四弓有大樹為界路旁沙灘地在外由普門至上竺山門有一千五百六十步由山門外至小橋流水計二十步大士橋俗呼旱橋在圓通門外瑞雲橋在長中房金佛橋在雲心巷口普門內宋淳熙間慧光訥法師建橋掘土得金佛一尊故名琮老橋在鼓元亭之上僧琮建規製堅固坦夷行人欣忭名曰琮老志其惠也天巖橋在天巖山房溪上雲隱橋俗呼仙橋雲隱塔出路德馨橋僧德馨建路通雲棲五雲幽淙橋在幽淙嶺下德馨建捫薜橋在郎當嶺下山門橋在上竺山門外中竺天王殿前橋右宋時辨才大師重建兩山尖市在雙檜峯後宋時做市於此做市日揚旗蓋此地通江干及留下人也紫雲坑在活沙塢遊記宋蘇子瞻三竺紀勝曰昔余守杭州時與客出遊西湖之上探奇攬勝寄興舒情極登臨之樂蓋十年於兹矣追憶往事宛然如昨而客慕想西湖之勝者每從余問詢不能悉為酬應乃録其心目之最稔者凡十有八首漫綴數語并附詩歌間有問者輒舉以示之使觀者了然亦可以當卧遊也三竺之勝周回數十里而巖壑尤美空洞玲瓏瑩拔清朗如伏虯飛鳳層華纍萼妍態怪狀種種絶勝宋秦觀少遊月夕同參寥子訪上竺辨才法師記曰元豐三年秋後一日余自吳興道杭東還會稽天竺有辨才大師以書邀余入山比出郭日已夕航湖至普寧遇道人參寥問龍井所遣藍輿則曰以不時至去矣是夕天宇開霽林間月明可數毫髮遂棄舟從參寥策杖並湖而行出雷峯度南屏濯足於惠因澗入靈石塢得支徑上風篁嶺憩於龍井亭酌泉據石而飲之自普寧凡經佛寺十五皆寂不聞人聲道旁廬舍或燈火隱顯草木深鬱流水激激悲鳴殆非人間之境行二鼓始謁辨才朝音堂明日而還皇明楊守陳遊天竺記曰杭多名剎天竺為稱首久欲遊弗果成化戊子秋過杭杭僧綱顧本源遣徒廣無外請遊時豫友御史魏孔淵暨豫弟豫子六人同遊皆乘肩輿行湖光山輝交映無際金剎畫鷁隱見於松筠茭蓮之表鐘梵與笙歌之音間作令人耳目無少暇西入山路頗廣且夷然益入益深奧寥閴寂第見古松離立拂雲外聞澗水與松風交相鏘鳴而已越集慶至靈隱寺寺靜潔幽勝然昔稱五亭無一存者睹其高峯勢若飛舞巖壑奇峭乃昔西僧謂自靈鷲飛來者即天竺山也其下有澗梁以片石飲其流冰齒是謂冷泉旁有呼猿洞深且寬傳昔有猿可呼就手取果亡久矣轉而東一門榜曰佛國與山僧同至下天竺見泉無跳珠者訪流杯翻經諸亭臺但蕪址耳中天竺荒寂類之於是盡所謂九里松者始到上天竺詣觀音殿寶光奕奕射人僧為口數手指小朵軒而壁石峻峭松蘿垂陰天香室對乳竇白雲諸峯若屏障前拱空翠欲滴寺之勝止此然諸剎依城者雜於綺麗喧囂雖湖濱者亦不能無惟此則幽邃靜潔之極宜其為稱首也室中布觴豆談笑久之僧能詩請留詠且詠且觴樂殊甚回憶前數十年欲遊不得遂豈山靈固遲之以與傑友高僧同樂也耶王洪遊西山記曰吾鄉多佳山水最勝者西山西山多名剎最勝者天竺永樂己丑豫告歸偕友人相與策蹇由北郭循湖堤折旋而西湖水鏡靜雲光倒垂萬象在下而漁人釣艇往往若鳬鶩出沒煙波間遠而益微僅見其影東望澄江如匹練新濯遙接海色茫然無際又西逾集慶至飛來峯西山第一佳處也其高不逾五六十丈巖石嵬怪特異若犢駭若隼立若鳥啄若豹躍若蛇逝若棋置劍植益玩益奇上多果木直幹碧色不假土壤根出石外種種殊異不可名狀其下巖洞若曲室玲瓏相通泉自石出滴石上作鏗然鳴有亭曰冷泉澗經其下坦然澄瑩毛骨爽徹又西不里許至下天竺住持伯圭上人具禮邀款遂同至上竺石路夷潔蒼松兩行若翠羽蓋列行緑陰中清風徐來暑日不爍遂遇古春名宿茶話久之薄暮還宿伯圭所觴小朵軒脫帽坐石壁下林壑陰翳萬籟岑寂山風飄颻徐動林木響應溪谷間以幽鳥聽之蕭然有忘世之志噫豫遊四海久矣嶽之秀者泰岱衡華水之巨者洞庭彭蠡而名剎高士勝僧未有若吾鄉俱美者吾徒樂而忘歸也先遊之一日大雨如注豫作詩有不妨三日雨一為洗山川之句及是天雨朗霽山水增秀殆不非偶然不可以不記夏時錢塘湖山勝概略曰凡稱山川之形勝莫不以浙為首浙以杭為首杭以錢塘為首分野在斗疆域則揚州形勢則自天目龍飛鳳舞歇落江湖鍾靈於錢塘餘不備論即西過行春橋由普福過集慶月桂峯下有閻妃墓在焉又西入佛國山自下竺越中竺至上竺下竺則古迹為勝上竺則觀音為靈三竺之間雲氣煙光泉聲松籟香凝鐘靜耳目心神之會為之一空恍如登極樂出三界外也志辨宋釋契嵩武林山志略曰其山彌杭西北其道南北旁湖而入南出西關轉赤山逾麥嶺燕脂北出錢塘門躋秦王纜船石過秦望蜻蜓二山至駝峴嶺趾左趨入袁公松門抵行春橋橋西通南之支路過行春橋垂二里南北道會稍有居民逆旅行人可休益西趨二里入二寺門逼合澗橋過合澗龍迹二橋自丹崖紫薇亭緣石門澗趨冷泉亭至於靈隱寺流水清泚崖石環怪如刻削乍覩爽然也自合澗南趨更曲水亭並新移澗距天竺寺門西顧山障重沓相映有若無窮靈隱晉始寺之禪叢也天竺隋寺之講叢也其山起歙出睦湊於杭西南跨富春西北控餘杭蜿蜒蔓衍聯數百里到武林遂播豁然如引左右臂南垂於胭脂嶺北垂於駝峴嶺其山峯之北起者曰高峯冠飛塔而擁靈隱岑然也高峯之東者曰屏風嶺又東者曰西峯又東者曰駝峴嶺其高峯之西者曰烏峯又西者曰石筍又西者曰楊梅石門又西者曰西源支出於西源之右者曰石人其峯南起望之而靄然者曰白猿左出於白猿之前曰香爐益前而垂澗者曰興正又出於白猿之前而雲木森然者曰月桂白猿之東曰胭脂嶺白猿之西者曰獅子又西者曰五峯又西曰白雲又西曰中印南印西向前走迤邐於武林之中者曰無礙又前者曰善住並善住而特起者稽留其稽留之西者曰蓮花有巖號玉女其蓮華之東者曰飛來峯乃西域異僧慧理所謂此吾國靈鷲下嶺之飛來者也昔多靈仙隱焉乃呼白猿驗之南屏天竺北障靈隱北瞰後者東出謂其潛徹異境絶與城闉相去十有二里周亦如之秦漢始號虎林以其棲白虎也晉曰靈隱用飛來故事也唐曰武林避諱也或曰青林巖仙居洞亦武林之別號耳然其岪鬱巧秀氣象清淑而他山不及若其雄拔高極殆與衡廬羅浮遠矣其山八九月每夜霽月皎則天雨桂實其壯如梧桐子其水南流者謂之南澗北流者謂之北澗自合澗橋至於白雲峯之趾凡八逾橋其七石也其一木也北澗龍迹橋至於西源峯之趾凡七逾橋其四石也其三土木也南澗源白雲峯之麓東注會它支澗出閘口曲流西復東注會奚家澗入新移澗出閘口曲流北之合澗橋北澗源西源山之腹東注過騰雲塢口稍逼楓樹塢口湍於第五橋下浸飛來峯趾匯於西塢漾渟於洗耳潭瀦於渦渚東嶼瀲灩於冷泉亭下經呼猿石門澗濆激於伏龍泓過龍迹橋下東注與合澗又東注越二里過行春橋下出靈隱浦入錢塘湖古所謂錢源泉出武林山此其是也此蓋有支塢者六曰靈隱曰巢枸曰白沙曰大同曰騰雲曰西源是六塢者皆有佛氏精舍曰靈隱曰碧泉曰法安曰資嚴曰辨利曰無著曰無量壽曰定慧曰永安曰彌陀曰吉祥曰西安其精舍凡十有三其十者在支塢其三者廢其三者宅正塢南亦有正塢皆有精舍曰天竺曰興聖曰崇壽講叢也曰慶寧曰永清曰金佛曰德澄曰福光曰天竺禪叢也古觀音氏垂象與人乞靈曰永宣其精舍凡十其五在支塢其五廢其五宅正塢諸塢皆有居民錯雜其殷處幾成村墅然無阪墾不牧牛犢羊豕水陸不甚汙其人不事釣弋漁獵以樵荈自業然同其在古潔靜清勝之風未嘗混也其山無怪禽醜獸惟巢枸之樹最為古木松筠果蓏與它山類唯美菽與靈山所生之枇杷桂花發奇香異耳國朝邵重生武林山辨曰武林杭之名山因以名郡而古今皆朦朧未有直指的名為某山者舊志以武林門右土阜俗稱祖山者當之為其山先名武林以避唐諱改稱虎林成化志引楊正質虎林山記謂錢王時祖山在郭外有異虎其山自名虎非避諱也又引宋樓鑰攻愧詩武林山出武林水靈隱後山無乃是且宋淳祐志言漢書明載武林山為武林水所出安有又避唐諱之説決非城內無水小山明矣是夏斷以靈隱後山北高峯為武林山矣與薛公通志同惜偏而未全一統志列武林山當矣下曰一名靈隱一名靈苑一名仙居以靈隱山飛來峯二山為武林山是矣特認而未的至沙門契嵩武林山志與泗水潛夫武林舊事直以飛來峯為武林山似矣又局而不廣近田公西湖遊覽志陳公萬歷志皆不列武林山而以靈隱山注一名武林山豈惟齟齬不明而名言更不正今山豫為辨者三以伺質之夫君子焉凡郡邑之著稱必以郡中佳山水祖山蟻垤不足以當固矣特靈隱之名發於東晉其先秦兩漢厥名伊何愚意凡謂之山者以其全體而言也其高聳者曰山峯其如脊者曰山嶺至岡陵丘阜皆有分別而一山字足以概之故武林山之名乃杭南北靈隱天竺諸峯慧理未來之先之祖名之總名也自慧理既來之後有飛來之名焉有靈鷲之名焉有靈隱之名焉有天竺而後有五竺之名焉五印度而後有中竺之名焉至於蓮華佛國白雲白猿獅子香爐皆繼慧理發之而為武林之支名至於南高北高五雲雙檜乳竇月桂諸名又後人之濫觴也其曰形勝烏石靈苑仙居龍門楊梅西源善住興正瑞雲慶化集慶秦亭又土人之私諡也自有諸名而武林反以無專主而晦如呼子之名而不詳其祖父之諱又如子孫寡而皆晦則祖父之名自傳子孫衆多而又著則祖父之名遠而晦久而亡此常道也故吳山秦望以宿名非武林也定浮龍鳳以沿江別派非武林也九曜南屏玉皇大慈以過峽非武林也黃鶴臯亭臨平超山遠而照對非武林也孤山獨山寡不成林非武林也黃山安樂山七十二賢山焦山水其所根源非武林也此外諸南西北三面之山戟攢旗矗如武庫森列者有一非武林山不可也如羅浮有七十二峯皆謂之羅浮山黃山有七十二峯皆謂之黃山武夷有三十六峯皆謂之武夷山是可辨者一也然此意未經高人明言而意實見往往如羅處約靈隱碑曰浙水之右有山曰武林盧襄西征記杭地北環天隱國朝楊太守開西湖疏曰杭州南跨吳山北兜武林觀曰右曰環曰兜三字則非一二山之指羅公自是才子楊公極善堪輿盧公大於遊覽故其所見之卓如此其可辨者二也且求武林山者必當求武林水杭南北二山之水孰有大於三竺靈隱之溪乎南則從捫壁嶺水出嶺合雙檜永清月桂諸塢北從石人西源合白沙韜光諸塢正與舊志合曰武林山有二水南出者曰南澗北來者曰北澗若惟以靈隱寺山為武林山則惟有北澗而無南澗若以飛來峯為武林山則飛來峯無水不出澗若以靈隱飛來二峯為武林山則南澗從天竺諸峯來發源不全況舊志言西湖匯武林山水秦時名武林水至漢方有金牛明聖之號南北二山凡有水流入湖者皆武林山其可辨者三也始焉求之人心之同昧既焉質之高人之偉見終焉稽之形勝之現存吾於武林也奚疑物産白雲茶郡志曰白雲峯出者名白雲茶與香林寶雲並稱佳品子瞻詩有白雲山下雨旗新又遊天竺嘗飲釀茶七碗戲書云示病維摩元不病在家靈運已忘家何須魏帝一丸藥且盡盧同七碗茶今久不種桂花志曰天桂秋來特盛非必種出月中蓋亦地氣使然子瞻八月十七日送天竺桂花與楊元素詩見末卷楊梅志載三竺楊梅之富在宋已然惟楊梅塢金婆家為最今上竺多不栽靈芝有紫紅黃三種皆木本七識云柄如漆者是暑雨時採蒸熟數年不變竹簟生竹根上色白而甘無毒香灰七識云上竺紙爐灰用布袋水淘淀煅過白而火不滅土檀香乃樺樹根亦名樺香極清遠凡毛族羽族蟲豸果蓏與諸山所産無異概不載山中之土以砂瘠且隘日用蔬筍之屬皆供之山外蔭木引路古松自上天竺山門內至見心亭西大小共一十七株其間數圍者六株餘則合抱淙老橋上首路南張姓屋角合抱樞口樹一株天王殿前古柏三株大數圍案山古楓木七株大小杉木三株溫杉一株婆羅樹一株苦刁樹六株正殿前柏樹左十二株右十二株坐山牆以內古楓木九株大者數抱大小杉木十一栗木八苦刁木十二柏木二榆木三沙朴四梧桐二杜樹三松木八箬樹二香檜二香樟一牆外嶺上大古楓二苦刁一版籍前代乘除敻不可究即國初圖册迄有變更今準嘉靖三十五年六月初一日優免差徭帖文上天竺寺先朝始建欽賜佛殿寮房基址洎九里松路合計一頃二拾畝按鱗圖册前後正殿鐘鼓樓丹墀紙爐基地一十一畝四釐六毫又白雲兩峯堂基地二畝八分八釐八毫坐山三畝四分二釐三毫案山五畝五釐並率字號上竺山門內行路兩邊沙灘地五畝見心亭上首沙地六分一釐二毫下首沙灘地六分八釐八毫肅儀亭邊地四分七釐九毫淺澗邊地一畝三分八釐二毫凡五峯以內疆界縱橫不恆其主總屬率字號下具如鱗圖册中佛殿基地十一畝一分四釐六毫開山祖師墳山五分出路地四分七釐五毫前朝欽賜百不存一惟定山北管等圖地方白石光山所存一十一頃五十九畝錢塘蔣公墟發字號田八十餘畝見存古蕩鳴字號莊基地二畝八分一釐一毫古巖王字號田地計二百畝零今存者半方井教場墟伏字號莊基地一畝九分五釐八毫崇禎四年歸并靈隱有契田一百畝零存有其半仁和十八都三圖形字正字號田五百二十三畝自隆慶四年至萬歷八年詰告清理歸戶當差錢塘天竺港天竺橋寺田二百畝餘並廢方山女南鄉推字號田一百八十畝萬歷三十二年寺僧圓徑真諒真定祖玉賣紹興三年七月高宗賜上竺寺平江府許墅莊田二十頃隆興二年七月孝宗賜上竺寺臨安府錢塘仁和秀州嘉興崇德平江府等處田禾買該科敷色役等事盡行蠲免給下劄付刊石殿後淳熙十一年孝宗賜秀州田十頃詔住持師覺承領慶元二年三月三省同奉光宗聖旨其所賜田地山蕩等項勘照纍朝指揮重行蠲免嘉定六年光宗賜崇德田一十五頃詔住持善月承領端平三年理宗賜錢塘仁和富陽海寧等處田地山蕩沙地四十五頃詔住持梵奎承領嘉熙二年理宗賜錢塘仁和富陽臨安山每縣一十五頃詔住持文杲承領淳祐三年理宗賜松江府華亭上海田一十頃詔住持法照承領寶祐元年三月理宗賜全免各處莊田糧稅景定三年理宗賜湖州府德清烏程歸安長興田五十頃詔住持智觀承領四年十二月詔上竺住持妙銛檢會木籌納苗事給省劄刊石施田宋宰臣韓莊敏公施上竺寺以平江府許墅莊田二十頃至景定五年其孫侍制韓大倫述大父施田緣起作記勒石景定二年丞相賈似道以上竺寺莊田水荒捐吳中田二千畝親屬記遺常住勒石兩峯堂東至咸淳三年六月申省理平江府許墅莊田納苗放糙事丞相劄下者三歲省米二百五十石平章賈魏公施田記曰釋氏法施為無量施捨特粗迹耳嗇於己者率以是藉口似道不謂然直謂捐甚愛而空所有則可以是求福田利益則不可捐空之在我不失為廉如求所利則於理第見為貪貪廉係行己界限所貴乎明辨於利與善之間也似道自以身殉國第見夫仁可成生可舍平日所自有者一不得視為己物而莫甚於己未之冬訖於庚申之春命之短長直在屈伸肘間當時母子骨肉離散它抑可知已人能於此發深省則身且非我有而何有於外物外物不攝於心則好貨財私妻子之念自可頓悟貪風絶廉道興矣然是心也人固或存於艱急之時而不能不忘於安逸之日以艱急而存以安逸而忘曾是以為悟乎斯心斯語似道嘗於侍側及至吾母重有感焉一日命似道曰汝能作施捨功德否苟能是汝固為真廉又將以善承吾志而孝似道奉命惟謹會辛酉春所建石橋寺曇華亭成實宦未達時嘗於斯地有心逮今酬之所撒舊材積於亭側一日晝晦風雨大作及小弛則若有物徙而空之者寸尺不復存矣及五百聖僧茶茶甌中一一現異花猶夫常也中現四字其文曰大士應供聚觀者神之豈將有所動悟於似道耶夏五月常雨為災上命近臣詣天竺禱大士導迎至於明慶寺似道嘗精禱許飯千僧亡何獲嘉應以六月二十八日往謝且酬既遂事佛光法師請於似道曰寺田已捐僧飯將絶僧非穀粟不生活飢將奈何內溝若己公志也似道為之動於是蹶然思外物之何有體吾母之所命遡大士之有緣急輟吳中伏臘之田為畝二千永作常住供養亦曰空諸所有非以是求福田也吾儒家法福惟自求布施求福何以異於市賈之利合而動不惟非所以自待所以待大士也宜不如此吾儕小人朝不謀夕相時射利遑恤厥德似道惟於坡老之言知所涵泳惟大士證明若曰為善必獲福厥應的不爽願以此功德回向於君親亦惟大士證明清理按七識云上竺莊田南宋六朝所賜約二萬畝至今盡皆迷失惟仁和十八都田五百三十畝為郎珠輩占隆慶四年寺僧道梁等具告軍門谷中虛纍經按院二司凡更縣父母三直至萬歷三年方結判還本寺今臨平有莊辨復莊田議曰南宋六朝欽賜莊田無慮數百頃盡皆迷失惟仁和十八都一等啚田五百三十畝零備知去處邇年鄉宦諸名公憐寺僧倍賠消耗白諸撫按藩臬郡邑為之辨復行拘勘究是實準令給主奈所司更代不常數年方始歸結然逋欠數多難於追給判還本寺具有成案可查不惟所費不資亦心力俱弊矣雖一時喜動顏色自識者觀之有隱憂焉何也彼乃土著之鄉民視為故物此係置郵之過客不少寧居易姓更名藏形匿影據租契則另是一番人戶求實迹則不脫原舊根苗以瘠薄代膏腴以低窪抵高阜或鑿池養魚或種桑造屋指東説西以多減少故老莫窺其宿弊清官難究其隱衷若使連年荒旱不能辦納糧差況經手老僧難保長生不死將來後進不能早見預防用力參差為謀舛錯約伴同行豈得齊心并力爭先退後必致衆怒羣猜若不另立良圖斷然仍蹈覆轍悔之何及也道梁平淨等決須會集同事僧淨芝平澗德孚圓徑圓周淨楠德霖道柯德雷糾請該圖里書當鄉知識本山耆舊親往田所將瘦搭肥以高就下計畝均分作為十處務要各成片段不得補湊牽連拈鬮畫地各立莊房聽其與人租種或躬臨耕作間遇年荒稍獲微利此為可久之計耳不知作倡以為何如今將撫按司道府縣批詞詳允緣由開具於後隆慶四年四月十六日寺僧道梁平淨等具告欽差都察院谷準批仁和縣查斷速繳蒙縣主陳每畝判餘租米二斗具申本院詳批郎珠等所佃既係寺田每畝每年止出二斗大不得其平矣無怪乎寺僧屢屢告鳴也且原議應追價銀今已延捱數年遂置之不問可乎仰縣仍秉公查處勿偏護也此速繳本縣奉批覆查郎珠等田地蕩有上中下三等上等三斗中等二斗五升下等二斗具申本院詳允仍出帖給示郎珠等升合不吐隆慶五年二月二十七日具告布政司姚準批仰縣究報蒙縣主張具招申詳蒙批照原招結繳又三月初七日具告管糧道劉準批仁和縣掌印官嚴加究報蒙縣主張具招申詳蒙批依擬郎珠等納贖葉初收贖完日與道梁等各發寧家焚修取庫收認退狀繳餘照行陸巖免提十一月十八日告按察司謝準批仰本司孫經歷究報具招申免帖杭州府錢塘縣為乞遺照例優免差徭事據上竺寺僧道霑告稱本寺先朝始建欽賜佛殿廊房基址九里松路一頃二十畝并坐落定山北管等圖地方白石光山一十一頃五十九畝及賠糧田地一頃六十一畝歷年無收花利稅糧年賠煩苦不勝即告業蒙憐恤均徭丁田雜派悉照無息光山之例每百畝準作一丁編役訖若不告乞給帖誠恐後役概派臨難控擾乞賜給帖準免萬感恩德等情到縣據經行拘該圖里老裘通奎等結稱上天竺寺所告前項山路基址果係先朝始建欽賜基産并定北地方白石光山無收花利賠糧是的等情具結前來覆查得基址松路白石光山花息無收悉照光山之例已經審派每百畝準作一丁編役訖擬合通行移送丁田遞送兵等房科知會外為此帖仰告僧道霑等收執候審差役册注明白聲説賫帖赴審以憑準丁扣算照免毋得代人受寄影射查出重究不恕須至帖者右帖仰上天竺寺僧道霑等收執準此嘉靖三十五年六月初一日帖押又帖嘉靖三十五年五月日為前事給帖仰僧道霑收執詞同不録又帖萬歷二十四年十二月草四日為查究姦弊以清國稅事云云右帖仰上竺寺僧道柯收執又帖萬歷三十四年三月初十日為懇天纂額遵輸事云云右帖仰上竺寺僧遠暉等收執準此
