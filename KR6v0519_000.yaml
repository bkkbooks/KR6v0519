front:
  text: 上天竺講寺位於浙江杭州西湖天竺山天竺分上中下三山上天竺山位於武林羣山中為佛教勝地上天竺講寺肇建於後晉天福四年九三九時僧道翊得奇木刻大士像僧勳持古佛舍利納之頂間吳越錢忠懿王即地建天竺看經院宋嘉祐中改靈感觀音院靖康初屬金難僧道元秘聖佛於井兵退歸像院中理宗書廣大靈感觀音教寺元至元五年一二六八改天竺教寺明成化間重修清康熙五年一六六六因燬重建三十八年一六九九聖祖南巡書法雨慈雲匾額賜撰天竺寺碑文乾隆十六年一七五一御題法喜寺匾額故俗稱為法喜寺咸豐十一年一八六一寺燬於兵同治三年一八六四寺復舊觀寺志舊有李金庭志以附會舛訛甚至僞撰明太祖竺隱說一篇以炫俗崇禎年間寺僧照本乃囑釋廣賓為撰新志廣賓曾撰西天目祖山志潛陽梵剎考等書此志凡五易寒暑始脫稿彙成十五卷分門為八普門示現品尊宿住持品道場規製品器界莊嚴品帝王檀樾品宰官外護品風範隆汚品詩文紀述品普門示現品收功德靈異悲仰贊感應頌喜雨詠請牒祈謝感應等文尊宿住持品收題名高僧列傳教觀清規示眾等道場規製品錄建置塔墓碑記器界莊嚴品則載形勝遊記物產施田等帝王檀越品錄勅命御製等宰官外護品載師友信施著作旌舉等風範隆汚品則備書寺僧品行詩文紀述品則摘錄歷代文士有關本寺之詩文是志曾得古菴居士校訂流通不廣光緒二十三年一八九七錢塘嘉惠堂丁丙覓得舊本乃為之重刋兹據丁氏重刋本景印四庫全書總目上天竺山志十五卷明釋廣賓撰天竺為東南巨剎舊有李金庭志廣賓以其附會舛譌甚至偽撰明太祖竺隱說一篇以炫俗乃刪補而成此書曰普門示現品曰尊㝛住持品曰器界莊嚴品曰帝王檀越品曰宰官外護品曰風範隆污品曰詩文紀述品凡七門其風範隆污一品於寺僧污行備書不隱較他志獨存直筆據總目尚有卷首一卷此本已佚不存上天竺寺肇於晉天福四年僧道翊得奇木刻大士像會僧勳持古佛舍利納之頂間妙相具足錢忠懿王感白衣異夢即地建天竺看經院宋嘉祐中郡守沈文通攺靈感觀音院靖康初屬金難僧道元祕聖佛於井兵退歸像院中理宗書廣大靈感觀音教寺元至元五年仍改天竺教寺明則重修於成化丙辰入國朝康熙五年因燬重建三十八年聖祖南巡書法雨慈雲匾額賜撰天竺寺碑文六十一年春殿再燬雍正九年世宗賜帑金鼎建製重修寺碑乾隆十六年御題法喜寺匾額嗣後曡邀宸翰恩錫優渥祈禱雨暘為一郡司命遠方趨謁不下普陀咸豐辛酉罹粵匪之刼同治甲子兩浙鏡清佛日重輝寺復舊觀光緒初元住持釋悟化校刊海甯管廷芬原輯天竺山志十二卷詳近畧遠未見廣賓所纂斯志殊屬缺典今得舊本冠以欽定四庫總目不惟直筆昭彰且所佚之首卷亦都在焉洵普門之寶衛自在之莊嚴也謹壽諸版回向靈山不二門中同圓種智光緒二十三年丁酉六月十九日優婆塞丁丙合十序重修上天竺山志序天竺在月氏東南數千里杭之山曷為沿兹名浮圖法故來自天竺典午時以兹顏其寺名所繇昉也道翊結茅光徵奇木大士像成而洛僧又以舍利置頂間寤求夢見赫有靈蹟旛蓋香燈之供口持膜拜之虔殷山填谷魁然此阜遂與身毒並稱矣曷為成兹志志者識也識大識小道斯未墜普門之示現勝地之靈奇衣鉢之流傳錫屐之游息非紀載莫詳舊志輯於東瀛李氏茂才手寺僧照本懼嵗遠益譌屬賓公任編摩之役凡五易星霜彚成十五卷靜探輪藏之文博摉籖軸之祕孝廉文學住山皈法者各以見聞佐之而强半取裒於古菴居士居士存日久隱山阿攷訂精覈山之董狐也或疑浮圖樹下一宿無住無著經曰法無名字言語斷故蒙豫所謂聚沫多緣假標空非色香者也然則大士何戀於是山山何贅以是志余惟大士從聞思修入三摩地動靜二相了然不生能所圓融有無交暢三十二應入諸國土無剎不現海上普陀湖邊竺嶺出現因緣較他剎更顯至於旱澇祈請歲著靈奇厯代表彰尤極喧茂則夫藉山以宣大士之教即藉志以著兹山之奇因是而可大可久俾眾生獲十四種無畏功德四不可思議無作功德記事者參載世事仍歸無事記言者旁採世言總歸無言南北宋之崇褒遞加於大士固國土所同稱而廣大獨耑屬竺嶺大士何必不託異於天竺天竺又何必不傳信於此志所謂觀匪留色音匪受聽道未墜地者當不在大月氏而近取諸上天竺矣古來志輿圖多為經世之用惟王子紀五山東方朔撰十洲陶弘景譜金壇林屋杜光庭考洞天福地則皆出世之觀又祇為尋𤣥采真作津梁耳西域記洛陽伽藍記以後闡宗風者其欣攬於兹編時順治三年丙戌秋七月幾望古潤妙香居士孫時偉乳仙甫薰沐敬書於湖上之紫薇右署杭州上天竺講寺志凡例慈悲淨聖靈異顯赫奔走海宇曷可無志寺僧照本興荊棘銅駝之感傾衣鉢屬余余雖不文適修天目祖山志西湖僧寶聚諸祖禪藻拾遺潛陽梵剎考諸書成鼓舞餘勇遂力任其事東瀛輯上竺舊志蕪穢杜撰如題中所云冒元人於宋首其他猶可至高皇帝竺隱說亦偽造一篇本以開面靈山翻滋罪案粃糠沙石槩在汰刪古者列國各有史史不實錄則觀者胡稽是以董狐良史趙盾必書志即史之餘將以是非得失垂為勸誡敢俛曲阿徇濫施華衮風範隆汙寸心千古知我罪我所弗敢辭靈奇悲仰贊頌詩文充棟汗牛筆不勝書梓不勝壽兹獨力既艱輿情未愜何妨好事續刻補遺是集所收精微潔淨有目幸鑒聞之吹竽而過邯鄲之市則師曠凜色盛容而出臨淄之塗則陽文沮顏何者邯鄲耳肆臨淄目林雖姝色和聲無當眾視羣聽也今輯志於名山人爭聽覽焉其敢忽諸蒐摭散軼稽訂魯魚枯心嘔血聚腋綴裘託始於鷲山再輯於鄭菴再輯於寶石山房則孝廉邵以窺氏煑字宏多更請政於嚴氏文學孝廉諸君子修討凡五易寒暑而是書始燦然可觀語云趾欲固視故步往蹟未詳文獻奚考聞有藏書饑渴往借篝燈簡讀有關某某隨筆錄鈔太史公自序曰余所謂述故事整齊其世傳非敢云作也
