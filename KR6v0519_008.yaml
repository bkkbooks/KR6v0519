body:
  text: 天目山三學學人廣賓纂道場規製品建置鳴陽樓即鐘樓在正殿左西向紹興二年五月高宗詔住持惟日建至七年二月上鑄萬石大銅鐘以賜住持應如管領樓燬咸淳六年三月度宗賜錢住持法照復建入國朝成化間住持智霑重建舊所賜鐘南宋故物也鯨音圓亮聲聞數十里成化間鎮海樓巨鐘毁於火時鎮守太監麥公秀輦借入城以代急用隨鑄償本寺矣嘉靖三十四年七月島夷猖獗軍門命取廢寺敗鐘鑄佛郎機麾下乘勢脅嚇攘取僧眾控訴雲間方伯潘公恩白而止之萬歷二十三年十一月寺僧如淵等重鑄約六千餘斤時住持圓逸圓日圓逕大學士淳安商輅撰上天竺重建鐘樓記曰東南佛寺錢塘為勝錢塘佛寺天竺為勝天竺有三上天竺又其最勝也乳竇峯聳其南白雲峯拱其北天香巖峙其東雙檜巖直其西重岡疊巘螺髻堆青泉水松風笙簧入韻誠一方勝概也寺創於五代之間時天下繹騷惟兩淛宴然蓋錢氏立國之功文穆之世高僧道翊結庵是山一夕見前澗光明上燭旦往視之得奇木遂刻為觀音像奉之後感夢忠懿易庵為寺聿新殿宇至宋咸平元祐寖加增廣於時趙閱道蘇子瞻秦少游諸公皆有記南渡以來六朝車駕不時臨幸樓臺殿歲增月益因賜廣大靈感觀音寺額并白雲堂印列為五山之首禪教宗之我朝改教為講五山之名仍因其舊郡之人水旱疾疫有求必禱輿馬闐駢往來如市是雖佛之感動於人要爾山川之靈有以相之於寺故有鐘樓頹圮已久近時司禮太監李公義奉命出鎮間嘗詣寺因見巨鐘在地惻然興念爰施己資募工度材重建層樓發鐘懸之於是鯨音四達晨昏有警寺之景象遠過於前住持僧智霑具廢興始末徵余為記將壽諸石以表太監之功以侈寺之美觀可謂知所重已且地不自美因人而美物不自成因人而成夫以天竺為寺擅勝東南著稱叢林非有傑構為之壯觀文字為之顯白何以昭當時名後世哉跡其興建之功偉矣愧予文不足以繼趙蘇諸賢後因其請姑為之說或來者有考嗣者弗失庶幾名山勝境與天地相為悠久云振遠樓即鼓樓在正殿右東向嘉靖間樓既坍頹寺僧清正赤腳募緣聿新起廢萬歷己酉寺僧如淶重修藏經樓紹興二年五月高宗詔住持惟日建咸淳六年三月度宗賜錢命住持佛光重建水月樓在水月池上虛敞宏麗僧錄若訥建自淳熙嘉定端平間屢朝臨幸駕憇於此扈從游觀搢紳名詠留題甚夥後燬於兵燹今廢大仙樓在兩峯堂後即禪觀堂舉佛事則齋天於此廢今為禪堂清暉樓在白雲堂左隅傾頹歲久嘉靖中僧綱道顯再建方丈五楹在白雲堂左古有之淳祐十年五月理宗臨幸詔住持佛光作方丈石山至國朝正德中廢皇華館寶祐元年八月住持佛光建奉延中使降香者駐節焉廢夜講臺治平中辯才淨法師演說無倦嘗謂鬼神少威德則不敢隨眾晝聽乃為夜分講經故設之勤舊寮侍者寮書記寮且過寮茶湯寮藥石寮並廢三官佑聖祠在正殿西隅廣三楹萬歷二年寺僧道禎建福祐靈濟公祠即伽藍神也按寺誌寶祐六年理宗封上竺伽藍神號內七誌曰此不在十八位之列姓曾以四月初四日生辰文昌祠在鐘樓左偏北向崇禎八年寺僧心印建僉事林徽初題額張仙祠在圓通門外琴岡盡際萬歷丙子住持德洪建左方伯朱卿題額曰廣嗣張仙祠土地神祠神蓋陳渾也漢靈帝熹平二年為餘杭令今山中祀為土神不知所以尸祝之由內七誌曰王莽廢錢塘為泉亭縣光武惡之廢泉亭而錢塘故縣未曾復至光和二年封朱雋為錢塘侯則錢塘又廢為侯封而無縣矣熹平至光和凡六年武林其時想分屬餘杭而渾正治斯土有遺澤故祀之渾字應明餘杭為陳明府君廟後唐長興二年封渾太平靈衛王故俗稱陳明大王今以正月十五日為君生辰靈衛祠祀朱蹕也蹕安吉人建炎三年為錢塘令十二月金虜由西溪並天竺而進金勝祝威二將於葛嶺編竹覆泥以陷之蹕率義勇二千款其前鋒中流矢二敗猶叱以戰退守天竺山傷重而死咸淳四年誥封為列侯雷公遺愛祠公名鳴陽嘉靖間為本府二守斷靈竺賜山萬畮令佃戶納餉當差寺僧即兩峯故址立遺愛堂祀之諸狀元為記梁公祠公名瑤正德中鎮守本藩有惠於寺共建生祠雙檜軒淳熙二年賜唐相園中雙檜植此見正統石刻清華軒在秋香閣後淳祐九年三月住持佛光重新宋季燬大德四年住持筌若洲重建今廢竹嶼軒趙孟頫書扁在觀堂圓通門在天王殿左隅琴岡未盡處向東寺初建處紹興二年五月高宗詔住持惟日重建舊制亡稽今以四柱重枅飛甍鬬角翼然而壯也額曰圓通王穉登書又嶺南李時行書額曰蒼煙白石普門在雲心衖口金佛橋下製似圓通洪武己巳住持大山建正德丁丑住持歸定重建萬歷甲戌住持道福又建高二丈四尺闊二丈二尺嗣曹國公景隆書額曰普門尚寶卿徐江山書額曰示現神通山門舊在飛來峯外蓋三竺靈隱共由一門白太傅所謂一山門作兩山門也入國朝諸寺始畫地分疆其門遷在中竺寺橋之右永清石橋之東製如圓普而谿巒關鍵過之嘉靖甲子住持道霑重建萬歷壬子住持圓逸重修崇禎乙亥眾准香火助資住持本初心授又新之洪武甲子曹國公書額曰上天竺撫臺喻思恂書額曰法雲慧日按武林舊事載天竺外山門額乃蔡京書他誌惡其人不錄高二丈八尺闊二丈二尺大界相三鉅書鑱之石壁按虎庵住界誌云不知某師禁足處東在普門下西在觀堂後南在雲心巷北在白雲房後學人曰此是重修懺期結界之限非禁足也按四分律云佛半月說戒眾集疲勞許僧伽藍各結大界故又為說戒所置也肅儀亭在孫公泉上翰林蔣暉書扁西湖志嘉祐中辯才法師建寺志載郡守蔡襄有名不存洪武二十八年一如法師重建正統五年住持無相復建萬歷元年僧道禮又建正德間方豪鑱石厓四大書曰漸入佳境雪坡亭寺誌謂東坡訪辯才法師適雪霽搆亭厓下以紀其勝植杖亭政和五年郡守李學士偃訪宣梵珍法師適珍下山遇諸塗遂植杖立談因置亭表之謝屐亭誌謂宣梵法師靜處觀堂陟西峯之麓石磴紆盤每出入必三休焉喜著屐嘗曰安石隱東山乃攜二妓遊薔薇洞吾以松竹為薔薇卒無開落以白雲明月為妓空色兩忘何忝安石哉選逕之半為亭以述厥志今廢夢泉亭誌謂齊玉法師崇𡩬元年既鑿夢泉於西坡仍建亭以誌其異廢曲水亭熙泰間妙珪法師再住持築退居曰復庵在寺門橋南林樾蓊鬱引泉為曲水倣蘭亭故事作亭其上瀕水列嘉石為座參錯宛轉賓客至則命轆轤注水泛杯茗而俯拾焉廢見心亭在琮老橋外山陲沙轉處嘉靖十三年都指揮僉事李節建石幢在見心亭路北高二丈鐫諸佛於上當琮老望之矗然特立於谿山交際莫知所自初二萬歷間毁一子院大明房在白雲峯南麓之坳由級而升國初始分白雲西房又分西白雲東房為二矣隆慶間東又分鯨音房今一華四葉也有額曰少師舊隱曰藏春樓曰雲深堂曰嘯月樓曰香巖閣中丞喻思恂書觀堂房正統年無相法師退院法屬鼎為三房曰觀東曰觀西曰觀中在白雲峯麓與大明山同逕歷級而歧有額曰環中堂施鳳來書曰雙樹堂無垢堂曰攬翠樓曰白雲樓曰華光樓曰覺照樓白雲東院在白雲堂東偏正德年鐵峯法師退院法脈別為二房曰方丈中曰方丈西萬歷年方丈中又別為二房曰仰峯曰鏡山北又別為二房曰少泉曰伴雲西又別為二房曰碧泉普門有額曰白雲東院曰見峯堂夏桂洲書曰岧嶤閣王穉登隸曰慧演堂湯煥書曰印月堂黃汝亨書曰振音堂董承詔書曰寄幻堂曰慈雲樓閔宗德書曰雲住樓曰嘯雲樓王恬書白雲上房在白雲峯南跨支岡之麓拾磴而上單傳也有額曰自觀堂錢士升書長生房廼國初古春法師退院至顯宗之嗣歧為二曰長生西曰長生下有額曰蓮花藏龔勉書曰長生堂曰淨聖齋心安房在雙檜峯麓祖嗣辯才法師為元東溟法師退院其胤至嘉隆間析為三曰心大心南心外有額曰祚胤閣曰寶月堂曰慈恩樓曰玄對曰清約雲隱房在雙檜峯麓右國初竺隱法師丈室法裔至永宣間鼎為三曰雲西曰雲東曰雲中隆慶年雲中又支一下房萬歷年雲西又支一下房有額曰來印閣沈演書曰雲隱堂王穉登書曰平遠樓董承詔書曰延桂閣陳繼儒書曰松華室程南雲篆曰虛白堂陳洪濛書曰七重樓張繼孟書幻應房在普門外與天巖相向古塔院也成化年性庵法師之嗣駢為二曰幻西曰幻中有額曰五峯草堂孫鑛書曰萬翠樓沈夢斗書曰怡雲樓天巖房在中印峯南麓蓋佛光法師退院法嗣至國朝嘉靖間分為三曰天西曰天北曰天南有額曰萬杉深處開化方豪書曰天巖佛窟天台王宗沐書見心房在寺外妙香庵萬歷十年越僧真海承嗣都綱霑五峯始序同心彌陀興福教院在楊梅隖按咸淳誌淳熙初慧光法師若訥奉旨撥賜上竺空閒山地用衣鉢創建紹熙三年光宗御書院額賜之宋末燬天啟甲子年僧德光復建中立三世如來殿七楹蕭山張士驌醵金倡施後為彌陀三聖殿五楹東甌劉康祉創緣為彌勒閣七楹優婆塞張圓奎率眾落成約兩廂禪燕經行庖湢之寮三十餘間像設經龕制所應有者悉具焉永嘉布政使劉康祉撰重建彌陀興福教院記曰杭之上天竺有乳竇獅子兩峯間即梅塢也宋孝宗敕兩峯强半山坡為慧光訥法師別業以使退休光宗御書彌陀興福教院為額而院名始著元時院廢我朝隆萬間寺宇鼎新基址蓁蕪且轉轉互授分屬私門也萬歷廿六年靈隱祗園庵月輝禪師德光愛此寬閑深邃購得陳氏續置產一片結廬禪誦其背係上竺住持玉長老分產及紹峯與師久契因劃其山麓若干畝捨之師即遊蕭山族姓募百餘金購材築精藍日與弟子正課閒暇開墾平削幾更寒暑西圍基面始坦然無坑坎不平之觀也乞食越城適呂相府染疫延師以陀羅尼祛之遂於餽餉外更置桌牀幔多副送歸及遊台宕東甌宰官聽所項公伯無王公與余欣然傾蓋與合郡玉成檀度遂下南山之木取道東海募營中兵士舁歸無何又募郡人馮有恩倡刻彌陀丈六之像觀音勢至相繼而成眷屬樂助四十餘金即成後殿蓋天啟五年也嗣後弟圓慧孫明徹共捐銀帛更造兩廂周遭掩映煥然有章兵部尚書衡岳朱公榜曰重建彌陀興福教院師進此山將四十年其為院之寸土片瓦焦心勞思間關拮据辛苦殆非一旦是以未及六旬雪鬢霜渡眉貌稜稜而骨立矣其所以樂此不為疲者誠不以自己為急可謂不負紹峯者矣上天竺寺廨院淳祐十年住持佛光照法師適左藏薛師魯占廨院為廳照不許即渡江東歸是日理宗幸寺祈雪隨禱即應上喜甚遣中使鄧惟聰進香聰有奏聞上命內轄快行遂禁渡炤回霅僧永頤贈以詩曰瀟洒白雲卿泠然非世情住山金玉重去路羽毛輕禁渡停江棹高名滿上京野人心獨喜得失懦夫驚頤錢塘耆舊也方圓庵在龍泓元豐二年辯才法師自本山歸老於此釋守一記曰天竺辯才法師以智者教傳四十年學者如歸四方風靡於是晦者明窒者通大小之機無不遂者不居其功不宿於名廼辭其交游去其弟子而求於寂寞之濱得龍井之居以隱焉南山守一往見之過龍泓登風篁嶺引目周覽以索其居岌然羣峯密圍㳷然而不蔽翳四顧若失莫知其鄉逡巡下危磴穿深林得之煙雲髣髴之間遂造而揖之法師引余并席而坐相視而笑徐曰子胡來曰願有觀焉法師曰子固觀矣而又將奚觀予笑曰然法師命予由照閣經寂室指其庵而言曰此吾之所以休息乎此也窺其制則圓蓋而方趾余詰之曰夫釋子之寢或為方丈或為圓廬而是庵也胡為而然哉法師曰子既得之矣雖然試為子言之夫形而上者渾淪周徧非方非圓而能方圓者也形而下者或得於方或得於圓或兼斯二者而不能無悖者也大至於天地而近止乎一身無不然故天得之則運而無積也地得之則靜而無變是以天圓而地方人位乎天地之間則首足具二者之形矣蓋宇宙雖大不離其內秋毫雖小待之成體故凡有貌像聲色者無巨細無古今皆不能出於方圓之內也所以古先哲王因之也雖然此游方之內者也至於吾佛亦如之使我黨祝髮以圓其頂壞色以方其袍乃欲其煩惱盡而理體圓靈慧修而德相顯也蓋溺於理而不達於事迷於事而不明於理者皆不可謂之沙門以制禮樂為衣裳至於舟車器械宮室之為皆則而象之故儒者冠圓冠以知天時履句履以知地形蓋蔽於天而不知人蔽於人而不知天者皆不可謂之真儒矣惟能通天地人真儒矣唯能理事一如向無異觀者其真沙門歟噫人之處乎覆載之內陶乎教化之中具其形服其服用其器而於其居也特不然哉我所以為是庵也然則吾直以是為蘧廬爾若夫以法性之圓事相之方而規矩一切則諸法同體而無自位萬物各得而不相知皆藏乎不深之度而游乎無端之紀則是庵也為無相之庵而我亦將以無所住而住焉當是時也子奚往而觀乎嗚呼理圓也語方也吾當忘言與之以無所觀而觀之於是嗒然隱几予出以法師之說授其門弟子使記焉元豐癸亥四月九日慧日峯守一記不二作此成過予愛之因書鹿門居士米芾元章彌陀菴淳熙十一年詔本山住持師覺補右街監義十二年轉左街僧錄卒塔瘞此庵在凝翠泉右廢復庵紹熙三年妙珪住持本山建庵為退居在普門南陸務觀復庵記曰嘉泰二年上天竺廣慧法師築退居於寺門橋南名之曰復庵後直白雲峯前直獅子乳竇二峯帶以清溪環以美箭嘉木凡為屋七十餘間寢有室講有堂中則為殿以奉西方像殿前闢大池兩序列館以處四方學者炊爨湢浴皆為其所牀敷巾鉢雲布鱗次又以為傳授講習梵唄之勤宜有游息之地以休其暇日則又作園亭流泉以與學者共之既成命其弟子了懷走山陰鏡湖上從予求文以記歲月予告之曰進而忘退行而忘居趨前而昧於顧後者士大夫之通患也故朝廷於士之告歸每優禮之而又命有司察其尤不知止者以勵名節而厚風俗士猶有不能決然退者又況物外道人初不踐是非毁譽之途名山大眾以說法為職業愈老而愈尊愈久而人愈歸之雖一坐數十夏何不可者如法師道遇三朝名蓋萬衲自紹熙至嘉泰十餘年間詔書褒錄如日麗天學者歸仰如泉赴壑非有議其後者而法師慨然為退居之舉傾竭囊裝無所顧惜雖然以予觀之師獨視天竺之眾不啻敝屣加以歲月功行遂為西方之歸復庵又一敝屣也死生去來無常予老甚矣安知不先在寶池中俟師之來語今日作記事相與一笑乎梅峯庵端平中梵奎法師退院并塔於此在見心亭北麓萬歷年廢同庵淳祐中允憲法師退院塔亦在焉古鏡庵嘉熙中文杲法師歸塔處北峯庵景定中智觀法師退居坐禪庵在中印峯南麓今廢妙香庵在見心亭訥齋為辯才法師燕居蘇子瞻記曰錢塘有法師曰辯才初住天竺寺以天台法化吳越人歸之如佛出世事之如養父母金帛之施不求而至居天竺十四年有利其富者迫而逐之師欣然捨去不以為意吳越之人從之若騖天竺之眾分散去事聞於朝明年俾復其舊師僶俛而還如不得已吳越之人爭出其力以成就廢缺眾復大集無幾師告其眾曰吾雖未嘗爭也不幸而立於爭地久居而不去人以己是非彼法門也天竺之南山深而禾茂泉甘而石峻汝舍我將老於是言已杖策以往以茅竹自覆聲動吳越人復致其所巉嶺煙屺築室而奉之不期年而荒榛巖石之間臺觀飛湧丹堊炳煥如天帝釋官師自是謝事不復出入高郵秦觀少游名其所居曰訥齋道潛師寂寥屬予為記余聞之師始以教法人扣之即鳴如千石鐘來不失時如滄海潮故人以辨名之及其居此山閉門燕坐寂默終日落葉根榮如冬枯木風止波定如古澗水故人以訥名之雖然此非師之大全也彼其全者不大不小不長不短不垢不淨不辭不訥而又何以名之雖然樂其出而高其退喜其辨而貴其訥此眾人之意也則其以齋名也亦宜乃作頌曰以辨見我既非見我以訥見我亦幾於妄有扣而應時止而止非辨非訥如如不動諸佛既然我亦如是靜處齋萬歷癸丑住持萬靈重建在中印峯麓大明山居國初姚恭靖公廣孝初為沙門名道衍上竺住持大山蓋其法嗣公既貴南還居此久之故扁曰少師舊隱蕭山孫學思書或問大明取義金庭子謂少師在元時已兆開國之徵或謂山中古有大明寺載咸淳志及武林舊事邵虎庵有辯見內七志尚竢博雅正之華嚴山居在雙桂峯下梯子塢萬歷初年寺僧雨山建楚僧正叢嘗居之吳興施進士浚明官南部以太史紙印南藏經律論為方冊付寺僧如淞安置山居便閱焉古顯親多福院天福五年五月吳越王建舊名光福治平改額今廢塔墓道翊祖師塔在乳竇峯之麓墓道自普門外數十武南入至塔計七十六弓闊北二弓南一弓崇禎丁卯年夏五月住持炤本鳩合寺重立石牌坊一座題曰晉開山聖僧道翊祖師之塔縣侯王楊基書額陰彚刻住持名表於路口癸酉冬住持照本重加塔門柱檻拜臺等屬琢石新之辯才淨法師塔在南山老龍井按邵氏七識在衍福寺黃門侍郎蘇轍撰塔銘曰如來昔在世心禪語為教譬如四大海惟是一溼性性於溼性中變化千萬億風來為濤瀾風去為湛然魚龍所遊戲鬼神所出沒船筏借其力網罟取其利其上為洲渚諸國所生育其下為淵谷百怪所藏伏東南出日月上下屬河漢觀者不能了𥈭盱何暇說如來知迷悶隨變為解釋因變所說者是則名為教彼善聞教人當知是幻耳既已知是幻則當識真實我觀世教師皆謂教是實由謂教實故則為禪所呵禪雖呵乎教終以教致禪禪若不取教是杜所入門教而不知禪是不識家也辯才真法師於教得禪那口舌如翻瀾而不失道根性湛如止水得風輒粲然以是於東南普服禪教師士女常奔走金帛常圍遶師性不取故物來不能拒道成數有盡西方一瞬息西方亦非實要有真實處慧光訥法師卒諡宗教廣慈大師塔曰普照在興福彌陀菴光祿大夫宋之瑞作銘師覺法師淳熙十一年卒塔於彌陀菴妙珪法師嘉定元年八月卒塔於復菴思義法師嘉定十六年卒塔於鑑堂善月法師端平三年三月卒塔於柏庭佛慧法師文杲嘉熙四年卒塔於古鏡菴允憲法師淳祐七年卒塔於同菴中大夫直寶文閣學士林希逸為塔銘默堂法師正觀咸淳元年卒塔於彌陀菴慧寂玉禪師塔在上竺山西佛光照法師塔賜曰慈應咸淳六年九月度宗詔太傅魏國公鈞齎俸資為造天巖壽塔二十六日乙丑經始十一月乙未落成於咸淳癸酉八月十五日窆全身衣髮於天巖在中印峯半之南禮部尚書文及翁撰塔銘曰台山蒼蒼佛國相鄉萬八十丈鐘秀發祥挺生晦巖巍巍堂堂禪宗教旨律檢精詳總歸一乘純挈眾芳游戲三昧舌吐廣長法嗣北峯此一瓣香洋洋覺海我為津梁及其示寂破缽空囊是幻是滅非幻不忘慈應之塔玉立東岡山君川后擁護塔旁經百千刼古佛放光元如菴真法師塔天如則禪師撰銘曰天台鉅宗天竺盛集匪伊人兮孰造其極異哉如菴應化靡測海月辯才誰今誰昔虩虩法雷杲杲慧日何燭非幽何啟非蟄歸藏故丘是訓是式子孫繼之有永無斁國朝東溟日法師塔賜曰妙應在過山楊梅塢學士宋濂撰塔銘曰人天之際所貴惟誠能貫鐵石可達潛冥世之修學思證無生舍此不務其將孰營倬彼大師為時俊英春蒸草木水翻建瓴天延法胤神夢符禎出演鴻寶丕昭性靈飛樓矗矗湧殿亭亭琅函飾鳳華虡鏗鯨一實所感百物交并惟心所證諸緣莫攖出言石墜轉盻露凝釋門蓍蔡剎海章程豈期蓮夢遽生淨泓世相莫廢人文是徵後千百載尚信斯銘存翁道法師雲隱塔在雙桂峯之麓太子少師姚廣孝撰銘曰一念三千解行全大蘇妙悟百世傳部味教觀何幽玄我菴得旨疏且箋法師聯芳并教專青鎮五竹兆已先天竺下上宜榮遷文藻黼黻成勝緣四眾仰德加敬虔左街政聲彌八埏廣薦說法天子前法才浩浩音清圓龍顏喜動驚外筵神燈下照光燦然福及鬼域資人天胡為一夕傾法船苦海莫濟淚漣漣靈寵深密窣堵堅勒銘山阿垂萬年宣德辛亥上竺住持徒弟正順立石止堂山法師塔大理寺少卿楊復撰銘曰赤城分秀滄溟減波素蟾流暉帝委厥和合生異人神邁惟一匪俗克沉慨歸於佛海藏有文含乳即通百千萬卷羲日以融遭逢哲匠道茂志長駕摩訶衍遊於沆茫出世名剎提綱顯司宏加化度大雲垂慈龍司寢處神相左右我心孔雄何有結漏所作已辦爰旋淨鄉寂滅三昧逍遙真常白雲在塔嗣法多孝奉此塵剎深心用報支那天台標屹自然覩比舍利性鑑同圓性菴顧法師生塔在乳竇峯下吏部尚書魏驥撰銘曰系出名族教依大慈釋典既崇儒術亦窺屢主道場整矩頓規坐猊揮麈大眾悉歸載啟載沃釋彼羣疑不懈亦勤扶植教基甲子未週歸計遽為生死瞭然知者其誰峩峩窣堵卜協蓍龜百靈呵護以俟期頤靈鷲盤旋祗樹蔽虧過者宜式視我銘詩一菴如法師塔在中印峯麓學士楊士奇為誌蘭古春禪師塔在上竺坐禪菴後
