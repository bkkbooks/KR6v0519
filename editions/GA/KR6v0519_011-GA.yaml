body:
  text: 天目山三學學人廣賓纂帝王檀越品側聞地登歡喜出為閻浮提王果襲應真間作妙嚴世主統無為之化推有道之權亭毒斯氓棟梁吾教乃若雄為王雌為覇學菩薩發心內則釋外則儒現官家說法昔吳越國王副仄微之懸記及南朝天子賚殊渥於偏安丘墟之棘金碧旋暉刼燒之灰堊丹倍麗矧兹天竺舊屬皇禋乞桴鼓於禜雩弭磁鍼於菑害陰翊王度喜綏民巖遂爾矗堂殿也虹霓煥山川兮錦繡中使之馳而道相望尚方之賜而月無虛六飛駕即儼警蹕於中林千指食繁籍田莊於列郡永著名山之寵茂彰大士之靈故曰信受奉行斯不負世尊囑累者也志檀越敕命太祖高皇帝敕浙江杭州府僧綱司都綱弘道奉奉天承運皇帝制曰古帝王設官任職分理庶務已有成制稽諸典禮設以僧官以掌方外之士非徒為僧榮也然其率修善道陰翊王化爾非真識寡欲澹泊自守者奚足任斯職哉朕倣古制受爾以官給爾以符爾其體至心以己之善化人為善來朝考績朕將合焉欽哉洪武十六年七月十六日又敕左善世弘道奉天承運皇帝制曰佛本無心而言心不已所言不已者為有心者也故以無心而導有心攝聰敏之邪以歸正啟頑惡以頓良設如來之威力以此道而被大千今爾弘道履是法門節度斯道必人天於爾知方契無心之本乎朕昨勅見任僧官於百萬千中求同佛心者爾今為眾所推而至出萬百千人之上是為希有特命為僧之第一僧錄司左善世宜慎善世以消頑毋增頑以長惡廓然無依寥然稱寂乃證佛之場必履是道而弗迂實方今之稱首欽哉洪武十六年九月二十日英宗睿皇帝欽賜杭州上天竺寺大藏經敕命皇帝聖旨朕體天地保民之心恭承皇曾祖考之志刊印大藏真經頒賜天下用廣流傳兹以一藏安置浙江杭州府上天竺講寺永充供養聽所在僧官僧徒看誦讚揚上為國家祝釐下與生民祈福務須敬奉守護不許縱容閑雜之人私借觀玩輕嫚褻凟致有損壞遺失敢有違者必究治之諭正統十年二月十五日聖旨太祖高皇帝聖旨洪武二十一年戊辰三月十四日僧錄司左善世弘道等於中右門欽奉聖旨恁僧錄司行文書各處僧司去但有討度牒的僧二十已上的發去烏蠻曲靖等處每三十里造一座庵自耕自食就化他一境的人欽此四月二十六日僧錄司左善弘道等於奉天門欽奉聖旨靈谷天界天禧能仁鷄鳴等寺係京剎大寺今後缺大住持務要叢林中選舉有德行僧人考試各通本教方許著他住持毋得濫舉欽此六月十四日僧錄司左善世弘道等於奉天門奏各處來未有度牒的僧人見於靈谷寺長髮住坐奉聖旨明日帶他來入見欽此次日左善世弘道引髮僧於奉天門奏奉聖旨宣諭了你仍舊剃髮為僧欽此六月十四日僧錄司左善世弘道等於奉天門欽奉聖旨今後有不守戒律的僧人發他天界能仁寺工役欽此八月初一日僧錄司左善世弘道於奉天門欽奉聖旨天界寺只作善世為額欽此洪武二十二年八月初九日僧錄司申該本月初一日早本司左善世弘道等於奉天門欽奉聖旨西河洮州等處多有不曾開設僧司衙門恁僧錄司差漢僧番僧去打點著本處官司就舉選通佛法的僧人發來考試除授他去欽此選到漢僧番僧人一十名本月初八日本司左善世弘道等於奉天門奏奉聖旨著禮部出劄付恁僧錄司出文書與他八月二十日起程去欽此當即將僧花名申部欽遵施行八月十七日僧錄司左善世弘道等於奉天門丹陛奏天禧寺管塔和尚福興帶鐵牌點燈不便奉聖旨舒了他欽此洪武二十四年六月初一日欽奉聖旨佛教之始自東漢明帝夜有金人入夢是後法自西來明帝敕臣民願崇敬者許於是臣民從者眾所在建立佛剎當時好事在法入之初有去鬚髮而捨俗出家者有父母以兒童子出家者其所修也本苦空甘寂寞去諸想慾必欲精一己之英靈當是時佛教大彰羣修者雖不能盡為圓覺實在修行次第之間豈有與俗混淆與常人無異者今天下僧寺以上古剎列聖相繼而較者佛之教本中國之異教也設使堯舜禹湯之時遇斯闡演未審興止何如哉今佛法自漢入中國歷歷數者一千三百三十年非一姓為君而有者也所以不磨滅者為何以其務生不殺也其本面家風端在苦空寂寞今天下之僧多與俗混淆尤不如俗者甚多是等其教而敗其行理當清其事而成其宗令一出禪者禪講者講瑜伽者瑜伽各承宗派集眾為寺有妻室願還俗者聽願棄離者聽僧錄司一如朕命行下諸山振揚佛法以善世仍條於後自經兵之後僧無統紀若府若州合今僧綱司僧正司驗倚郭縣分僧會司驗本縣僧人雜處民間者見其實數於見有佛剎處會眾以成叢林守清規以安禪其禪者務遵本宗公案觀心目形以證善果講者務遵釋迦四十九秋妙音之演以導愚昧若瑜伽者亦以見佛剎處率眾熟演顯密之教應供是方足孝子順孫報祖父母劬勞之恩以世俗之說斯教可以訓世以天下之說其佛之教陰翊王度可也令出之後敢有不入叢林仍前私有眷屬潛住民間被人告發到官或官府拿住必梟首以示眾容隱窩藏者流三千里令出之後有能忍辱不居市廛不混時俗深入崇山刀耕火種侶影儔燈甘苦空寂寞於林泉之下意在以英靈出三界者聽洪武二十七年正月初八日欽奉聖旨自佛去世之後諸祖踵佛之道所在靜處不出戶牖明佛之旨官民趨向者累代如此效佛宣揚者智人也所以佛道永昌法輪常轉邇年以來踵佛道者未見智人但見奸邪無籍之徒避患難以偷生更名易姓潛入法門以其修行之道不足以動人一概窘於衣食歲月難度由是奔走市村無異乞覓者致使輕薄小人毁辱罵詈有玷佛門特敕禮部條例所避所趨者牓示之合避者不許奔走市村以化緣為由致令無籍凌辱有傷佛教若有此等擒獲到官治以敗壞祖風之罪寺院庵舍已有砧基道人一切煩難答應官府並在此人其僧不許具僧服入公廳跪拜設若己身有犯先去僧服以受擒掌敢有連僧服跪公廳者處以極刑凡欽賜田地稅糧全免常住田地雖有稅糧仍免雜派僧人不許充當差役凡住持并一切散僧有交結官府說俗為朋者治以重罪若欲游方問道在所雲水者親齎路費循道而行往無定止者聽民有善德之家一見如此禮而齋之者受施財者納之僧有妻室者許諸人捶辱之更索取鈔五十錠如無鈔者打死勿論有妻室僧人願還俗者聽願棄離修行者亦聽若不還俗不棄離許里甲鄰人擒拿赴官循私容隱不拿者發邊遠充軍僧寺庵院一切高明之人本欲與僧攀語顯揚佛教奈何僧多不才其人方與和狎其僧便起求布施之心為此人遠不近今後秀才并諸色人等無故入寺院坐食僧人粥飯者以罪罪之嗚呼僧若依朕條例或居山澤或守常住或游諸方不干於民不妄入村市官民欲求僧以聽經豈不難哉如此則善者慕之詣所在焚香禮請豈不高明者歟行之歲久佛道大昌榜示之後官民僧俗人等敢有妄乖為者處以極刑欽此成祖文皇帝聖旨永樂十七年二月二十八日宣僧錄司右善世一如等於西紅門當蒙頒賜一如佛像二軸佛骨五塊鈔一千貫諸佛菩薩名稱歌曲大小三本當即入見欽奉聖旨恁一如等為朕編類禪宗語錄來看欽此當即題奏中間合無去取奉聖旨祖師說的都是佛法不要去取欽此三月初三日宣一如等八人於西紅門欽奉聖旨將藏經好生較勘明白重要刊板經面用湖水素綾當口題奏合無用花綾奉聖旨用八吉祥綾當又欽奉聖旨每一面行數字數合是多少當口題奏五行六行的皆用十七字合無只用十七字欽奉聖旨寫來看欽此五月二十二日一如進庵於內用作門裏奉聖旨你兩個做僧官較藏經再尋一人欽此七月初九日一如等於御用作門裏呈看僧人子謨等六十四人所寫字樣奉聖旨好當題後面有幾僧還欠寫奉聖旨只就今日好日揀好寫的又題唐太宗刊的藏經前面有御製三藏聖教序今聖朝重刊合無亦用序文奉聖旨不要欽此九月十二日一如等題奏藏經目錄裏面前是經律論後是各宗祖師文字聖朝所編的佛名經與名稱歌曲神僧傳目錄內合無編寫在經律論後諸宗文字之前奉聖旨安在後只要有朕名時便了又奏太祖高皇帝御製心經序聖朝諸咒前亦各有序合無於各經前都寫上奉聖旨太祖於佛法上多用心都寫上又奏奉累朝如唐太宗宋太宗等經前多有序文合無寫上奉聖旨都寫上永樂十八年正月十六日大內觀燈宴十七日早宣一如菴進法主思擴未至二人於西紅門見著看師子畢敕問藏經較得好了當奏云已七番較過好了奉聖旨上緊用心又敕問你夜來看燈來奏云曾看有旨云著人尋你如何不見奏云在後面有又奉旨云不曾擠了麽奏云不曾又奉旨云與燒餅各五十齋了去欽此七月十八日早一如等於奉天門口題奏昔日太祖皇帝取到各處高僧命如玘宗泐等註解心經金剛楞伽三經頒行天下內有太祖高皇帝御製序文合無寫入藏刊板奉聖旨寫入又題聖朝佛菩薩名稱歌曲作五十卷佛名經作三十卷神佛僧作九卷即目見寫奉聖旨是好又奉聖旨經板刊後留在何處不敢對當奉聖旨明日安一藏在這里安一藏南京又奉聖旨石上也刻一藏大石洞內藏著向後木的壞了有石的在又奉聖旨這里蓋兩個大寺如今僧取來的有聰慧的選下些明日起大寺了著他在這里住當奏云僧裏面只是老的多了又奉聖旨有病的著他回去又如今寫經的都念經奉聖旨也難遇著他念經當又欽奉聖旨寫經的寫經也要辦我的事欽此御製宋孝宗皇帝誦金剛般若經三萬卷製劄降上竺住持訥法師曰平昔以來所食禽魚之類傷害為多今仗般若為除此過庶使羣生俱承解脫宋真宗皇帝製法音集一部大中祥符二年癸丑春三月又製偈曰初祖安心在少林不傳經教但傳心後人若悟真如性密印由來妙理深又自寶祐六年十一月製上天竺觀音記御書登石惜今不存太祖高皇帝御製竺隱說賜僧錄司左善世弘道曰僧之殊俗者去姓是也務立字為名爾以道竺隱稱自以為奇不知色界之道無盡法界之道無窮斯道幽乎顯乎有相無相曲如羊膓一縱一橫誠如十字又若弦在雕弓其世之君子小人故有馳之異同今爾道名可謂志矣且竺者西域之國名也我中土智僧此立為剎爾云於此而隱其道承如來之教乎說者如來成道時放眉間白毫相光照大千界指迷破暗利濟羣生豈不彰之顯之爾乃以隱自任何也且隱者匿也吾所不取至者人明其道幽其德名彰不朽果隱其道則不許然嘗聞聖人有云德不在彰道不在顯終日乾乾汝若是乎若此後必了然哉皇明慈寧皇太后賜上天竺觀音瑞蓮聖像御製贊曰惟我聖母慈仁格天感斯嘉兆厥產瑞蓮加大士像圖寫流傳延國福民霄壤同堅其年月上用慈聖宣文明肅皇太后之寶召問宋孝宗於隆興元年秋七月初臨幸上天竺寺陞大士殿北面未展敬次問住持若訥曰拜是不拜是若訥對曰拜則遞相恭敬不拜則各自稱尊上乃拜乾道三年春二月駕幸上竺問光明懺法之旨若訥曰梵釋天帝四大天王下臨土宇護國護民故佛為說金光明三昧之道後世祖師立為懺法以資諸天之威德故帝王道士皆可修持上悅一日上問佛法固妙安得如許經卷訥對曰有本者如是上然之九年春正月七日召左街僧錄若訥入對選德殿上問天竺緣起及大士靈迹若訥對曰起自石晉天福四年僧道翊者結庵山中夜每見前山發火尋之得異木取而刻為觀音像夢神人曰明日有洛陽僧來可求舍利果得舍利三顆置菩薩頂髻中每有請祈靈感特異開寶間吳越國王錢俶夢白衣天人曰吾居處甚陋覺而詢得其地乃廣其殿宇名天竺看經院英宗治平間沈文通蔡襄繼守杭疏其始末宰相曾公亮敷陳之賜額曰感應觀音院今蒙陛下宸翰表章方成大剎上又問法華經旨訥隨答之上曰宗教俱通其師之謂一日又召訥法師令入內講圓覺經至於此虛妄心若無六塵則不能有訥曰心本無形因塵有相塵滅心滅真心湛然上手書其語賜之上又嘗問金剛之旨若訥曰此乃六百卷般若中一分興問斷疑特喻金剛故無著論云此金剛波羅蜜以如是名顯示勢力絓是般若皆有是力此既諸般若之釋疑是故金剛二字文雖出此義實通諸般若作譬故持說者福重功深上曰朕日讀此經今更命眾合誦三萬卷矣孝宗又幸天竺駕經飛來峯上問淨暉法師曰既是飛來何不飛去淨暉對曰一動不如一靜已而駕至上天竺寺上問觀音亦持數珠念誰對曰念觀音上曰何故自念對曰求人不如求己上悅理宗皇帝寶祐三年值天基節詔上竺佛光照法師入對上御延和殿賜講華嚴經皇情大悅曰自是不同自是不同厚賚齋幣上又問無諍三昧之旨法照對曰按般若經我得無諍三昧人中最為第一天親論解曰無諍者無欲也有欲則有諍須菩提不但得無諍三昧而已又於無諍三昧之人之中最為第一上首肯久之太祖高皇帝洪武改元召江南有浮圖待問上天竺住持慧日法師奉詔入京上御奉天殿僧如魚貫而見時慧日年最高白眉朱顏列班之首上問以升濟沈冥之道慧日備述其故上悅顧眾言曰邇來學佛者惟飽食優游沉埋歲月而已如金剛楞伽諸經皆攝心之要何不研究其義苟有不通質諸白眉法師可也賜賚宋真宗大中祥符二年癸丑春三月賜上天竺看經院額仁宗皇祐七年八月賜靈感觀音院額又賜祕典五千二百三十卷為教藏高宗紹興元年賜祠牒并捐兩浙祠廟施錢令轉運吳宗哲張綬之修造上竺殿宇極其壯麗三年賜平江府許墅莊田二十頃七年二月賜沈香龍十四金香爐一玻璃淨瓶二大銅鐘一孝宗隆興元年建藏經閣賜御書轉大法輪之扁又賜御書雲漢之閣二年賜靈感觀音寺額又賜七寶冠一玉龍符一玉罇壺瓶彝爐各一九月建法堂并五百羅漢閣御書靈感觀音寺額十月禱雨輒應上大悅賜內府三品玉帶乾道二年三月賜若訥法師白雲堂印三年賜觀空淨域額皇太子書二月詔每歲佛誕日例賜帛五十疋八年二月賜錢建藏經閣東宮書法輪寶藏額淳熙元年賜福州印造藏經五百函賜內帑建閣十一年賜秀州田一十頃詔住持師覺承領又賜若訥法師歸隱二字皇太子書退居楊梅塢興福院及逝賜諡宗教廣慈大法師塔曰普照寧宗慶元元年五月賜妙珪廣惠法師號二年十一月壽成慈惠皇太后賜金瓶六十兩開禧元年賜住持妙珪復庵二字御書二年七月二十二日賜錢建十九觀堂嘉定六年賜崇德田一十五頃四年賜住持文杲佛慧法師號淳祐元年賜大士像及御書聖教序御書心經又賜玉手爐五年九月重新五百羅漢閣賜御書超諸有海扁八年冬祈雪應禱敕法照法師管教開公事賜座下衣紫者六度僧錄修造祠牒十本九年重彩大士賜七寶冠瓔珞一玉屐一兩加賜金錢萬餘本年九月明禋賜賚如前御筆特書法照賜號佛光法師進錄左街賜金襴袈裟寶祐元年三月賜度牒二十本米四百石修大殿觀堂兼全免各處莊田糧稅十年賜法照晦巖二字三年詔法照入對延和殿講華嚴經厚賜齋帛十一月上御復古殿宣若訥進見以皇妃請禱思學首眾如前厚賜齋帛五年九月特賜法照金香盒幣帛湯藥五十緡六年明禋賜如初賜封伽藍神福祐靈濟公賜法照御書靈峯堂三字復賜紫金襴景定二年賜妙銛白雲二字度宗咸淳三年秋禱晴輒應賜祠牒十二師號十二六年三月賜錢重建鐘經二樓復詔太傅平章魏國公鈞賚俸資為法照建天巖壽塔皇明成祖文皇帝永樂二十年十月初六日上御奉天門賜僧道官宴天下眾僧亦在丹墀宴畢先賜僧錄司一如刻絲觀音菩薩有旨問云你道是什麽不敢對上云我兩年擺布的文水晶數珠一串成化二十三年太皇太后周賜沁金銅觀音聖像一尊銅塔一座嘉靖十年昭聖康惠慈壽皇太后賜旛袍修齋五晝夜嘉靖三十八年唐世子施旛修齋嘉靖四十年楚王施旛二首修齋宜春王施旛修齋嘉靖四十五年崇王施錦旛錦袍修齋三晝夜裝塑天王四像內殿石臺一座裝千手眼觀音一尊左右善才龍女二尊萬歷辛亥年神宗皇帝遣中使李承恩賜珠冠衮袍玉帶青圭萬歷戊子二月中宮皇太后賜錦旛二首以小旛叢翼之崇禎甲戌四月潞王施金扁一道大慈悲父四字崇禎戊寅七月中宮皇太后周專遣戚畹周金吾賜織錦千佛寶旛二首宸翰吳越國錢忠懿王賜手書天竺看經院宋高宗御書上竺額曰靈感觀音之殿孝宗御書轉大法輪之扁以隆興元年八月賜上天竺寺藏閣又書額曰雲漢之閣隆興二年秋九月御書靈感觀音寺額詔住持應如承領孝宗又命皇太子書觀空靜域之額以乾道三年二月賜於十六觀堂太子即光宗又敕東宮書法輪寶藏額以賜新成藏殿淳熙十一年東宮書歸隱二字賜慧光訥法師蓮居興福院理宗御書心經及書聖教序同大士像賜上竺時淳祐元年十一年九月御筆特書法照賜號佛光法師又敕議上竺大士號住持法照摭大悲經廣大二字聞奏大悅加靈感之上牌座殿扁字額皆親灑宸翰以易之寶祐元年九月庚午詔佛光復領寺事十月大書晦巖二字以華其號又御書靈峯堂三大字以侈佛光生緣之地六年十一月又御書親製觀音記登之石景定二年十二月御書白雲二字賜上竺住持左右街仲鑒法師妙銛臨幸宋高宗皇帝紹興二年幸上竺寺四年九月又幸五年乙卯九月丙辰又幸孝宗皇帝乾道元年幸寺二年三月幸寺三年二月幸寺四年九月庚午從太上皇幸寺淳熙二年春三月幸寺十一年又幸光宗皇帝紹熙元年幸寺寧宗皇帝慶元元年五月幸寺四年九月幸寺嘉定元年幸寺六年又幸寺十二年幸寺十六年又幸寺理宗皇帝紹定二年幸寺端平三年幸寺嘉熙四年幸寺五年幸寺淳祐元年幸寺七年幸寺八年幸寺十年夏五月幸寺是年冬又幸寺寶祐元年幸寺三年幸寺是年又幸四年二月幸寺五年九月幸寺景定二年九月幸寺三年七月幸寺度宗皇帝咸淳元年春二月幸寺是年復幸寺三年又幸四年八月又幸五年八月幸寺六年三月又幸諭祭仁宗昭皇帝欽賜祭葬上天竺寺天巖山一如法師諭祭文曰維洪熙元年歲次乙巳三月庚辰朔初九日己卯皇帝遣禮部員外郎丁鎡諭祭於故僧錄司右闡教一如維靈深明宗旨精專戒行解脫塵緣眾所敬服榮膺國命俾長緇流方期化導愚冥丕闡釋教屬兹圓寂良用感悼兹特遣人賜祭性靈不昧尚克享之
