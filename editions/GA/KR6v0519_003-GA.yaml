body:
  text: 天目山三學學人廣賓纂尊宿住持品側聞維僧為寶參佛法而鼎稱與世作津度人天以筏喻文身千界慧命一絲睠兹天竺開山金輪紹位直指人心始也契禪那於柏子反聞自性繼而談般若於空華乃如鑿厓架屋以廬學者盛莫盛於辯才鑄印標堂以柄諸山尊莫尊於若訥璽書宸翰歷更廿四久莫久於晦巖此三老之聲光道德蓋樹法幢於有宋者也至如白眉天問於斑前者為東溟五竹軒符於夢表者為竺隱妙蓮科注於國初者為一菴此三老之英靈福慧蓋振教譯於皇明者也靡不悟豐祖髓名簡帝心羽儀十剎而領袖五山洞析一家而瀾翻三觀百葉蟬聯香逆曇華之國五峯峻極乳流獅子之王故記曰人能弘道非道弘人此之謂也志住持宋佛光法師法照上天竺講寺住持題名碑記曰千佛名經其來遠矣上天竺住持無題名闕事也自道翊師天福四年開山結菴得夜明木為觀音像錢忠懿王易菴為寺國初咸平至元祐益增廣之由南屏辯才而下大振法席高宗皇帝駐驆有禱必應紹興乙卯翠華臨幸羨有錫齎命應如暨圓智一新殿宇孝宗乾湻間若訥登對論道稱旨於是賜白雲堂印署都僧錄銜凡稱禪教律公定皆從此出所俾不輕矣今上聖治之暇心悅佛乘於僧錄之任尤加推擇淳祐寶祐御製御書昭其驗也上下三百餘載傳聞異辭竊迹宗教共二十二代爰題諸石其道之隆替庶乎後之學者亦有考云開慶元年九月壬寅晦巖照記元竹屋淨法師上天竺寺歷代住持題名碑序曰題名者何使來者目之必曰孰道德孰起廢孰躐等孰公於眾孰私於身於乎可不懼乎皇慶二年夏住持竹屋元淨書題名開山第一代道翊法師石晉天福四年第二代南屏梵臻法師皇祐三年第三代辨才元淨法師嘉祐七年第四代法照用文法師元豐四年第五代慈辨從諫法師元祐五年第六代圓悟思尚法師政和元年第七代宣梵嗣珍法師政和五年第八代慧覺齊玉法師宣和六年第九代普明如靖法師建炎六年第十代佛照智堅法師紹興元年十一代圓通應如法師紹興三年十二代普覺惟日法師紹興十五年十三代證悟圓智法師紹興二十三年十四代慧光若訥法師紹興二十八年十五代師覺法師淳熙十一年十六代復菴妙珪法師紹熙三年十七代柏庭善月法師嘉定六年十八代虛菴有宏法師嘉定十二年十九代鑑堂思義法師紹定五年二十代柏庭善月法師紹定十六年再住二十一代梅峯梵奎法師端平三年二十二代古鏡文杲法師嘉熙二年二十三代同菴允憲法師嘉熙四年二十四代佛光法照法師淳祐三年二十五代石室智觀法師景定三年二十六代東林祖印法師景定三年二十七代佛鑑妙銛法師景定四年二十八代默堂正觀法師咸淳元年二十九代佛光法照法師咸淳六年再住三十代鼎山時舉法師咸淳九年三十一代南麓時法師至元十三年三十二代愚山古法師至元二十年三十三代梓山恭法師至元二十二年三十四代鼎山舉法師至元三十一年再住三十五代若洲筌法師大德四年三十六代柳塘權法師至大二年三十七代竹屋元淨法師皇慶二年三十八代佛海澄法師泰定二年三十九代如菴真法師至順二年四十代虎巖頤法師至元二年四十一代賢叟思法師至元五年四十二代我菴無法師至正二年四十三代東溟日法師至正四年四十四代絕輝鑑法師吳元年四十五代雲谷臻法師洪武元年四十六代日彰偁法師洪武二年四十七代惟源修法師洪武六年四十八代竺隱道法師洪武十五年四十九代箕山隱法師洪武十七年五十代止堂大山法師洪武十九年五十一代古春蘭法師洪武三十二年五十二代宗源梵法師洪武三十五年五十三代敬修德完法師永樂二年五十四代一菴如法師永樂三年時姚少師奉命取金光明懺法來寺住五十五代宗鉉鼐法師永樂五年五十六代顯宗彌法師永樂十二年五十七代即中實法師洪熙元年五十八代鏡中潭法師宣德元年五十九代浩初頤法師宣德五年六十代訓中謨法師正統三年六十一代無相住法師正統四年六十二代有中頔法師正統六年六十三代瑞巖祥法師正統九年六十四代大猷闡法師正統十二年六十五代本源顧法師景泰二年六十六代芝山廣法師天順二年六十七代宗濟法師天順五年六十八代洪沛法師天順七年六十九代曇芳法師天順八年七十代無外廣法師成化二年七十一代秉忠桓法師成化七年七十二代雨菴霑法師成化十年七十三代天澤霑法師成化十七年七十四代敏中智法師弘治四年七十五代草堂芳法師弘治九年七十六代默菴潛法師弘治十三年七十七代鐵峯定法師正德八年七十八代天日南法師正德十四年七十九代大林茂法師嘉靖九年八十代大鼎脀法師嘉靖十四年八十一代松隱琳法師嘉靖十九年八十二代東山顯法師嘉靖二十二年八十三代雲巖貴法師嘉靖二十四年八十四代春谷俊法師嘉靖二十九年八十五代心泉璟法師嘉靖三十一年八十六代竹山蕙法師嘉靖三十四年八十七代月洲源法師嘉靖三十六年八十八代五峯霑法師嘉靖四十年八十九代雲峯才法師嘉靖四十年九十代近泉松法師隆慶二年九十一代一山福法師隆慶四年九十二代小泉禮法師隆慶六年九十三代月樓憲法師萬歷二年舊志次九十三代而止下三十五人今續入凡天下叢林至宗風不振乃循甲乙相承故上竺自皇祐間吕郡守奏去甲乙而外請名耆良有以也頃稽方丈自月樓憲公不惟甲乙且增正副矣迨雲池逸公不惟正副又參鼎足矣嗣是以往二十人後又無不徼外護之靈踰前茅之列職此所由蓋香火之利養喪天使山門之風規掃地耳悲哉且夫住持以代例稱所以序道統者也皮既不存毛將安附故今續入者上不嗣代下不系年住持萃峯道樑師住持小山道立師住持繼泉德孚師住持仰峯承明師住持雲堂德洪師住持南溪道柯師住持竹亭圓逕師住持明菴圓日師住持雲池圓逸師住持無塵明遠師住持紹峯祖玉師住持敬坡真宰師住持愛雲意奎師住持雲泉真諒師住持伴雲諸香師住持厚泉明信師住持心宇明機師住持潮音海瑞師住持心臺萬靈師住持玉岑世高師住持萃吾興美師住持旨玄寂嘉師住持易菴如貿師住持文宇寂纓師住持奇峯照珍師住持春山萬富師住持印中照本師住持寄竺寂瑜師住持本空續藴師住持道微本初師住持心凝通藏師住持心融續元師住持印峯心授師住持了因源汶師住持信如寂徵師住持兆初本一師列傳五季道翊法師當陽侯杜公之子出家於終南山翠微寺晉天福四年入天竺佛國山止息西峯之隈誅茅結庵精修淨慮夜則高擊齋魚經行五峯之顛衝冒雺霧霜霰不避豺虎絕無徒侶多歷年所遂致湱然超悟乃屏息止觀休糧入定者久之一夕忽見山麓火光燭霄師禱於天即擲錫空中詰旦果得異木浮水面錫卓其上異香襲人攜委雕鑾匠氏孔仁謙剖之得大士像宛然天成不假刻削歸菴中多獲靈感師夢白衣人曰明日僧從勳自洛陽來隨身有古佛舍利當求之已而僧果至求得之納於像之頂門靈感異著師與兄道宣弟道定偕入杭後宣為南山六通寺律師定為法相始祖時號僧中三鳳云宋南屏梵臻法師錢塘人傳四明法智之道初住金山龍游侍講吳公倅都聞師名革興教禪居請主之學者朋來師每講次會文集義貫穿始終浙西台學大振自南屏始嘗述二偈贊妙宗鈔曰佛許六即辨蛣蜣何不通知一不知二失西又失東三千若果成一切皆常樂蛣蜣不究竟諸佛斷性惡後與淨覺岳公辨教門陳詞有司乞築高臺竪赤旛倣酉竺聖師與外道角勝以幡標顯處義墮者斷首截舌懸之府尹杜而不從聞者凜然初吳公多於休沐請講盛服止閫外師未登座不輒入東坡云與師語羣集有所遺忘師則應口誦之亹亹不休東坡答辨才文云講有辨臻即為師崇寧中諡實相宋辨才法師名元淨字無象俗徐氏郡之於潛人客有過其舍者曰嘉氣上騰當生奇男既生左肩一肉起如袈裟條八十一日乃沒伯祖異之曰宿世沙門必使事佛八十一者殆其算歟及師之終果符其數十歲出家每見講座輒曰吾願登此說法度人十八就學於慈雲不數年而齒高弟後聞明智講止觀方便五緣曰淨名所謂以一食施一切供養諸佛及賢聖然後可食此一方便也師悟曰今乃知色香味觸本具第一義諦因泣下如雨自是遇物無非法界代講十五年杭守呂臻請住大悲閣嚴設戒律其徒畏愛臻為請錫紫衣辨才之號七年翰林沈遘撫杭為上竺本觀音道場以音聲為佛事者非禪那居乃請師居之鑿山增石廣聚學徒教苑之盛魁於二浙熙寧三年杭守祖無擇坐獄於檇李師以鑄鐘例被追辨幸而得釋寓止真如蘭若擬金錍設問答述圓事理說發明祖意之妙元豐元年有利山施資之厚者倚權以奪之眾亦隨散逾年其人以敗聞朝廷復𢌿師眾復大集清獻趙公抃與師為世外友為之贊曰師去天竺山空鬼哭天竺師歸道場重輝東坡寄詩云道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開三年復謝去居南山之龍井士庶爭為築室遂成蘭若六年太守鄧伯温請居南屏越明年復歸龍井時天竺靈山虛席師以慈雲師祖道場俯就眾請及月餘於禪定中見金甲神跪前曰法師於此舊無緣不宜久住既奉冥告還龍井元祐四年蘇公軾治杭子迨生四歲不能行請師落髮摩頂數日即善步有詩云師來為摩頂起走趁奔鹿師將示寂乃入方圓菴晏坐謝賓客止言語飲食招參寥子告之曰吾淨業將成若七日無障吾願遂矣至七日出偈告眾右脇吉祥而卧奄然順寂時元祐六年九月晦日也塔成弟子懷楚詣汝陰請志於東坡坡命子由為之銘復作文託參寥子以祭之師焚指供佛左三右二有欲效之者師止之曰如我乃可修西方淨業未嘗須臾廢或禱大士求放光光即隨現沙門熙仲對食視師眉間有光遽起攬之得舍利數粒後人嘗於卧處得之嘉興令陶彖有子得魅疾祝之即愈諸暨陳氏久患心疾漫不知人警以微言醒然而悟布衣李生久習禪觀辨而無行欲從師出家東坡為之請未言其名力拒不許若先知然秀州狂僧號回頭以左道惑眾宣言欲建大塔為吳人植福施者雲委以師不可欺憚於入杭先遣使以錢十萬供僧師答曰承以建塔淨財欲飯僧教有明文不許互用狂人大慙而止法照用文法師慈辯從諫法師處士松陽毛氏子幼見佛經輒能自誦父曰再來人也年十九歲試法華經得度即謁上竺辨才夙夜聽習復往依南屏於金山問辯如流南屏歎曰吾道由子而行也熙寧中講於明慶徒眾日蕃乃遷淨住元豐初處人建壽聖迎居之越三年辨才主南屏自以年老屈師首眾嗣歲舉以自代元祐五年上竺虛席辨才囑郡守蒲宗孟曰靈感勝迹非從諫不能當郡用其說復為奏賜慈辨之號義天僧統自高麗來求法郡以師應命乃求鑪拂傳衣即詣智者塔誓之曰已傳慈辯法師教觀還國流通乞賜冥護既歸乃建剎立像尊為始祖大觀二年辭歸壽聖之門學車溪普明等十人詣師省候師曰諸子遠至後會無期老僧不如乘興便行遂沐浴更衣升座說法書偈安坐而逝葬全身於受業圓悟思尚法師早從淨慧妙盡其道政和元年詔居上竺賜號圓悟講說簡明學者咸仰嘗曰吾宗義學也不旁通儒典而事講業者吾恐未盡其義苟義有未盡其意何所在得意忘言自是成學之人若初心向學須先尋文義可也宣梵嗣珍法師政和五年居觀堂時徽猷閣侍制李偃知杭州入山訪之適師下山而遇諸途即植杖立談忘日之既夕也因建植杖亭以志其處師喜著屐嘗搆精舍於西峯石磴紆盤出入每三休焉謂人曰昔謝安石隱東山嘗攜二妓游薔薇洞吾以松竹為薔薇歲寒青青卒無開落以白雲明月為二妓空色兩忘吾何忝安石哉爰搆亭逕之半曰謝屐以志所好慧覺齊玉法師霅川人尚書莫公支子也早親釋學日記數千言始參祥符神智後依慧辨一日赴僧次辭遜之或問其故答曰誠不欲以五千之利而喪一日之功慈辨得通相三觀之旨祕不肯說師屢叩不已乃於密室跪鑪以授初出居苕溪寶藏每於歲終大興淨業之社遷橫山立丈六像率道俗修行中夜告眾曰我輩未念佛時心隨塵境作諸不善犯一吉羅尚受九百千歲地獄之苦況犯篇聚重罪乎今若念佛則可一念能減八十億刼生死之罪況又父母生我令我出家理當度脫以報重恩今若破戒墜陷則父母聞之豈不失望大眾聞之無不傾誠懺悔舉身自撲至損額失聲者宣和六年遷居上竺先是慈辨之去繼之者或不振學徒謀曰得五公乃興郡守翁彥國聞之乃具禮以迎講道敷化不異慈辨嘗中夜頂像行道一僧失規責之曰汝無知乃畜生耳已而悔曰彼雖不肖罵為畜生有玷三寶自是三年對佛悔過建炎元年秋謂首座修慧曰吾牀前夕寶塔現慧曰流通法華之瑞證也師曰所願見阿彌陀佛耳即集眾念佛頃之舉首加敬曰佛已來接也端坐合掌而化葬於山西草堂之側諡妙辨塔曰慧寂門弟傳教者密印修慧等二十人所著普賢行法經疏及自釋祖源記無量經疏雜諸記安般守尊法門尊勝懺法普明如靖法師早入慈辨室杭人有以私憾害其兄者後深知悔以問一律師答之曰殺人償命何足為問其人即投西湖而死欲償兄命免為後怨既不見鬼反悔投水因眾人入雷峯受戒鬼隨以入聞戒師說人造罪許懺悔其鬼乃怒律師早知可懺必不投水日夜隨律師索命語以修薦百方皆辭久而言曰為我請靖佛子施大乘戒則可脫及為授戒法乃見形致謝而去後主覺悟學徒雲擁惟一室空閉云有惡鬼居之師中夜入室坐禪忽聞哮吼見一人頭飛走地上俄化為人師謂之曰汝何得擾人鬼曰凡出見人本欲求度人見自畏非擾之也師乃為設法授戒語之曰汝可入吾袖鬼即如教覺重甚攜至中林放之化成天人殷勤謝師飛空而沒建炎二年遷上竺初是有為鳴童卦者或以上竺住持為問童云待問土地良久曰今早天符已下請靖法師矣閱月而師至三年十一月金虜破杭師預感夢知此山戹運不可免語其徒令避去及虜至或謂可以禮迓即聲鐘集眾虜疑其將抗己放兵大掠火其廬而去佛照智堅法師圓通應如法師婺之浦江人姓胡幼默記多聞尤善持論來學上竺慈辨深器之嘗往靈山訪同志出六能義反覆辨詰彼義墮負師即揭竿繫帛謂之西竺破敵則竪勝幡道場降魔亦表勝相今法戰既勝當揭一竿人畏其烈目之虎子初慈辨得南屏通相三觀之旨祕不授人玉慧覺祈請尤力許子夜為密說師即知之陟梯揭瓦伏身竊聽飛雪翻空背若被鎧旦白慈辨曰我於通相三觀若有冥授即錄其言以示一眾慈辨怒曰應如盜法紹聖初主越之圓通嘗因講散謂侍者曰今日東風吹教法過浙西去使眼中有耳者得以有聞師三十歲便亡卷每臨座侍者供講袠以俟紹興三年遷上竺兀朮焚蕩之餘唯存藏室有勸他人營建者師曰我但流通大法耳他日自有修造者至及師亡普覺惟日果以繼席興土木事五年九月車駕臨幸大士殿師奏對若流上喜賜萬歲香山以供大士師不尚著述嘗以偈示人曰吾傳智者一性之宗三千實相妙空假中一念法界生佛體同凡聖一如善惡理融毗盧身上湛若虛空達斯旨者法法圓通左之右之受用無窮山家稱如虎者三人神照本如四明道如及師也一夕別大眾歸寢而終塔於寺西北隅嗣法崇先懷志白蓮慧仙皆足世其業師有教義名指難集
