body:
  text: 天目山三學學人廣賓纂列傳證悟圓智法師黃巖林氏子母夢老儒寄宿而生幼聰敏書史經目悉能開說醫方卜筮無不精究後依真覺學通觀鬱為師匠慧光若訥法師字希言嘉興孫氏子依竹庵於德藏刻志苦學久而嬰病心叩大士口誦祕咒夢大士灌以靈液寤而失其疾乃往赤城謁證悟遷上竺命師首眾既沒詔師嗣居之乾道三年春二月駕幸上竺展敬大士問光明懺法之旨釋四王下臨土宇護國護人故佛為說金光明三昧之道祖師立為懺法以資諸天之威德故帝王士庶皆可修持上悅授右街僧錄既而詔於山中建十六觀堂仍倣其制作堂於大內四年夏召師內宿觀堂論道四月八日召師領徒五十人入內觀堂修金光護國法上問曰佛法固妙安得如許經卷師曰有本者如是上然之進左街僧錄慧光法師九年召對問大士歷代靈迹及法華經旨上曰最初得師發明此事遂以圓覺悟得法門譬如著棊勝負既分不但并去棋子棋盤亦須一時并去師曰并著亦不可得上曰宗教俱通其師之謂有詔令講圓覺至此虛妄心若無六塵則不能有師曰心本無形因塵有相塵滅心滅真心湛然上手書其語以賜又嘗問金剛之旨師曰此乃六百卷般若中一分興問斷疑特喻金剛故無著論云此金剛波羅密以如是名顯示勢力維是般若皆有是力此既諸般若之釋疑是故金剛二字文雖出此義實通諸般若作譬故持說者福重功深上曰朕日誦此經今更命眾合誦三萬卷乃降劄云平昔所食禽魚之類今仗般若為除此過時沂王尚幼上召師入禁中為王說法摩頂嘗以疾丐閒上曰且賜地築室更數年彼此作閒人水邊石上共說無生十一年退處興福特受兩街都僧錄時光宗在東宮書歸隱之扁以賜之仍製讚以褒稱其德孝宗退養重華宮召注金剛經肩輿登止宿殿廬注成以進上披覽益有省發紹熙二年十月旦謂侍人曰吾宗通法華宜以此終乃遂集眾修法華懺取道具進兩宮端坐而化壽八十二塔於正寢紹熙二年諡宗教廣慈法師普照之塔復庵妙珪法師柏庭善月法師字光遠四明定海方氏父偉為邑中名儒母夢月輪墮懷已而有孕生之夕白光滿室初學語常合掌道法界字甫成童父編六經授之以誦習如温故業十二通春秋大義母攜往正覺寺設供循殿楹數匝寺主道并謂其母曰吾夜夢白龍繞此柱其徵此兒乎於是父母始令出家名善月符先夢也十五具戒越三月而師亡乃往南湖依草菴常以科目繁冗為勞菴誨之曰白日看家書有何難解師為一省菴曰異時鼓吹吾宗者其在子乎梓菴講道月波往謁焉聞世相常住之旨益有省發乃復歸南湖見堂問如來不斷性惡之說身心豁然如卻關鑰見府庫以所悟白堂更為演其義師拜領而退堂示寂師為專使往當湖請竹菴越明年命師分講風儀清温談辯雅正竹菴讚之曰吾與首座可謂得人但恨無繼之者所居古柏獨秀因自號焉淳熙庚子初主東湖辯利遷慈谿寶嚴居無何太師史真隱請居月波學士來奔廩食不足真隱聞之喜使使白師曰師為道延眾欲食來取予不嗇也紹興二年郡守何公澹以南湖虛席親裁疏勸請講道有方御眾有法十三年不易節緇素以是信之嘉泰四年退隱衍慶精舍一息十載夢老叟耳語曰六十五七十一嘉定六年郡將陳卿以南湖有去思為更屈致辭弗克雨華更新舊徒再擁未逾月上竺以敕書召師謂亟往有似於徇名堅不為動眾謂上命不可不恭始幡然而往是年正六十五之驗也八年夏旱詔迎大士於明慶車駕親幸致師恭禱朝注暮洽上大悅特補左街僧錄十二年秋拂衣東歸偃息於城南祖關是年七十一又知所以驗前夢也明年秋郡以西山資眾𢍉師佚老紹定五年春有旨再領上竺人皆以坡仙師去忽復來鳥語山容開之句為之賀端平三年得目眚請老東菴一旦示寂坐牀上若相酬酢者法孫秀林問何為曰吾與荊溪尊者對談祖道耳將入寂顧左右曰人患無實德為後世稱若但崇虛譽我則不暇千載之下謂吾為柏廷叟則吾枯骨為無媿幸勿為請諡以汙我素業言已累足而化實淳祐元年正月十九日也留龕七日面色鮮白心頂俱煖奉全塔於寺東為壽九十三法臘七十八先是首座智覺論請於朝言師道光前哲四眾依仰年登九秩將逼歸真請建塔山中以擬歸藏上旨允之故今用此成命所遺衣髮及四經解合藏於南湖祖塔之側師所著述楞嚴一覽金剛會解圓覺略說楞伽通義因革論簡境十策三部格言金錍義解宗教淺述仁王疏記附鈔箋要皆行於世自餘雜製名緒餘講餘嗣其道者香林清賜為上首虛菴有宏法師鑑堂思義法師字和甫武康凌氏試法華第一得度依明智學隨聞隨悟歷修四三忽頸上生一肉癭夜夢功德天食之以桃其疾即消熙寧四年賜紫服號淨慧丞相蘇頌帥杭請住天竺大振法道三十二年如明智立記元祐三年別眾怡然坐寂梅峰梵奎法師古鏡文杲法師同菴允憲法師佛光法照法師台州黃巖姓童氏其唐有為長史者祖也父好善生九子師居其次母陳氏夢日霣褰裳得之妊十二月乃娩氣貌奇偉耳垂肩眼如電入小學根氣不凡讀儒書多頴悟十三禮聖水蒙庵宣公出家一夕歸自外寺僧望兩炬晶烱近接乃師目光也月溪輝公欲於受經城西多福首座堪公曰此子異能返照佛祖堪公薙髮自後肄業精進教乘三閱大藏出游諸方豁堂當代尊宿貽書褒勉諸山以職延致悉不就攜香禮北峯印法師次住蔣山參𤥎浙翁問答之際深器之北峯住下竺招師歸浙翁以教門為囑講論授受泠然有得北峯順寂振錫東還錢丞相作高僧堂招延共談年二十三改住天台大慈遷聖水史衛王舉住雲間延慶一見喜曰師異日必大振佛法繼遷鳳山褒親丞相史永公舉住四明延慶海順二法師自日本來聽講所作讀教記繪師像歸國高麗崔丞相亦致書問佛法大旨乞九祖圖且遺師漂甆缽盂及金觀音香藥育王虛席郡請兼住舉癡絕冲自代閫帥奪寺園為酒庫杖履而遁道出東掖兩山學徒歡迎於境上宏齋包公屈致智者真覺重祖廷也理宗聞師名敕住下天竺尋遷上天竺補左街鑒義御筆特賜佛光法師進錄左街賜金襴袈裟召見倚桂閣對御稱旨集慶寺成旨命開山力辭舉白蓮觀此誠公自代明年誠圓寂有旨特轉左右街都綱錄令住不許辭免上書晦巖二大字賜之開無礙講凡禪教律三宗學徒雲集聞名開悟召見延和殿講華嚴經又大書靈山堂以賜遣姪武經郎童炎奉宸翰歸其里東宮召見復古殿講般若經再賜紫金襴袈裟齋於明華殿聖眷隆渥昔未曾有面奏力乞還山度宗登寶位敕再住上天竺前後閱二十四年平章賈魏公為造塔於寺之東岡奏請名天巖塔院賜田三頃以助香燈是年秋示疾移居塔院卻藥屏醫作文自祭中秋之夕書偈曰佛壽八十我多九年虛空掇轉大用現前擲筆端坐而逝享年八十有九僧臘七十四生於淳熙乙巳七月二十八日終於咸淳癸酉八月十五日諸大弟子妙應繼席時等四十餘人手度一百餘人奉全身窆以衣髮金地天巖墓遵初志也次年賜諡普通法師塔曰慈應撰讀教記二十卷為學者日月其餘法語遺文諸高弟所耳聞面命多所記錄不可罄述鼎山時舉法師佛海澄法師名性澄號湛堂會稽孫氏子生有異資四歲戲拈筆為佛像授以經文即能成誦至元丙子出投佛果寺石門諸律師初探律藏繼而依佛鑑銛鼎山舉為天台之學後謁靈澤於南天竺深加器重職以清班至大戊申遷住演福屢被旨顧問進號佛海大師泰定甲子以選住上天竺觀音教寺至順壬申效辨才故事拂衣歸南天竺之雲外齋學者坌集則誨迪獎勵未嘗少倦其晚年篤志淨業晨夕繫念雖病不廢嘗屏絕左右修一心不亂觀門者七晝夜屢有瑞應一日眾以月旦問訊師遽迎揖之曰老僧向退閒十二年幾在半途今日則有明日則無光陰其可把玩乎煩大眾點視行李用表無常眾為念佛師曰止止佛須自念明旦書偈而逝至正壬午八月二日也春秋七十八所著書有金剛經集註心經科注消災經註彌陀句解仁王經如意輪咒經科並行於世如菴真法師名淨真俗姓沈氏母朱夢月升海墮於懷而娠識者謂海月都師之再來也九歲依化城明靜志法師出家授以法華歷耳成誦十六為僧受具首謁雲夢澤公服勞既久復造無極度公咨叩盡其學大德間出主海鹽德藏賴以起廢仍割己儲營法華期懺泰定己丑行省丞相脫驩公舉住下天竺諸大方麟鳳爭願出席下居七年寺之門舊臨澗南逼於巖巖下之逕紆且小師命闢之高其門大書佛國山以揭之至順辛未上竺湛堂澄公舉師自代先是師疾夢白衣大士持金瓶水灌之曰汝勿憂非久當愈復曰卻後二年汝避喧於大樹之下及至上竺寢堂西偏有大樹堂扁曰靜處始悟前夢也臨眾簡嚴不妄言笑每夙興默課法華不輟翰帖酬應運管若不經意癸酉冬預知時至歸受業而逝壽七十二茶毘唯舌與頂骨不壞我菴無法師名本無黃巖人從淨慈方山剃落依寂照於中竺獲侍箋翰有舅氏教庠老成挽之更宗乃見湛堂於演福研精教部寂照惜其去寄以偈云從教入禪今古有從禪入教古今無一心三觀門雖別水滿千江月自孤後出世既為湛堂嗣仍爇一香以報寂照不以迹異二其心也寂照示寂時遺書祝其力弘大蘇少林兩宗趣餘無他辭師祭之拈香云妙喜五傳最光燄寂照一代甘露門等閒觸著肝腦裂冰雪忽作陽春温我思打失鼻孔日是何氣息今猶存天風北來歲云暮掣電討甚空中痕睌年無疾坐蛻白雲堂皇明東溟日法師名慧日天台赤城人宋丞相賈魏公諸孫也志慕空門往依平山等公落髮為沙門時子庭訓公講台學於赤城師走輪下一旦假寐似見竹橫地下竹上所凝者白粥粲然師目臥而餐之及覺言於祖庭庭曰竹粥與竺同音子得就地以食其言殆在上下兩天竺之間乎子宜亟行師即復浙河拜竹屋淨公於上竺為遷剛燥之地遇之如賓友命典客尋掌僧籍竹屋既示寂越溪澄公自演福來繼其後甚器師延居版首未幾出世吳山聖水俄招還處以上座以表儀四眾吳楚閩蜀之士趼足而至者動以百計師隨其性竇淺深而疏導之至元四年師獲主薦福歷三寒暑而下竺靈山教寺災至正元年宣政使高公納麟謂非師無以膺起廢之任移師蒞之師至修普賢大士殿大雄寶殿四年高公又遷住上天竺子庭所謂兩天竺之間至是益驗矣師知緣契在斯走募多金凡大殿三門鐘樓講堂諸寮宇寺制所宜有者無不具焉帝賜以金襴袈裟及慈光妙應普濟大師之號十六年撾鼓而退隱於會稽山水間浙江行省丞相達識帖木爾遣使者以物色訪之力請還山前後所住凡二十五年國朝洪武改元始獲謝事於塔院師軀幹修偉眉長三寸餘其白勝雪目睛閃閃射人道德餘光所被不問耄稺見師經行咸曰我白眉和尚來也爭持香花為供師歸天竺日修西方之學冥心合道不雜一念十年秋七月朔日夢青蓮華生方池中越四日趺坐書偈而寂世壽八十有九僧臘七十有三全身葬於西峯之妙應塔院所度弟子甚眾下天竺則圓具等十人上竺則妙修等近二百人日彰偁法師號用拙常熟張氏子十七祝髮東游四明時我菴無公住延慶石室瑛公居育王皆待以忘年既首眾報恩又為上天竺第一座出世郡城之永定洪武初善世院令住上天竺以高僧選留京師性源修法師存翁法師名弘道字竺隱吳江澄源里人姓沈有梵僧過其居視水木清華之勝言此宅當出高僧師既生及睟見佛像則合掌能稱佛號父母異之母歿鞠於嫂氏十年就外傅日記數千言見人誦法華等經歷耳成誦年十三父命禮密印寺雲屋慈公為師十九薙髮進受滿分戒自此為學孜孜靡懈往見元叟端禪師復歸密印是年庭生竹五竿因名其軒曰五竹將藏修焉聞魯山文公講授有規矩乃從學台宗疏鈔等書罔不通貫會我庵和尚遷主上竺詣謁之我菴深言獎勵且曰為我掌記未朞月上方丈請益曰日前蒙和尚指教嘗於靜夜試以平日所聞返照己心圓具法界念念即空即假即中千界如一事理無礙若明日以此心對一切境接一切佛未免掉散昏沉不能任運泯合不知過在何處我菴厲聲叱曰未在去師汗流浹背頓覺平日所聞所行一切疑礙冰消遂禮拜我菴託之曰子善護持他日教門灰寒火冷之際以此對揚明廷重光末運可也國朝洪武初我菴既寂去從絕宗繼公未幾秀之天巖耀公退寂廣福請師自代遂拈香嗣我菴湖郡守請主慈感無何退於澄源溪上六時禮大悲像期生淨土為終焉之計三年詔天下高行僧道問鬼神事師建議唯允杭之靈山兵後廢甚眾與諸山力請乃起師偕其徒淨珠志嘗畚瓦礫刜榛莽募緣重建光明懺堂若干楹自元季世亂期懺行法絕聞於時至是行之師之力也初師於五竹軒夢與大明照師同遊靈竺賦詩有出紅塵戶外德業至今存照公嘗住此山始悟所夢實今之讖也十年皇上有旨箋註楞伽等經師與全室具菴同註三經頒行天下上御製竺隱說賜之十五年遷住上天竺有詔開說僧道衙門師領杭郡都綱明年起師為僧錄師左善世二十四年以老告閒上許之其年七十七也退處長干修一行三昧明年秋八月夢觀仁公請師為學者講妙宗至三輩往生觀文忽示微疾顧其徒正謨等曰昔我祖法智嘗為心境叵得故染可觀淨不礙緣生想成相起惟色惟心故當處顯現吾所修念佛三昧以此為準則今夕世緣當謝泊然而逝二十五年九月三十日也世壽七十有八僧臘五十有九火餘藏舍利於天竺雙檜峯之麓曰雲隱塔少師姚廣孝撰碑銘師凡四坐道場所至無不興修惟靈竺懺堂其功最鉅為都綱僧錄三宗諸山有所依怙焉止堂大山法師字仲齡俗姓陳天台臨海縣之梅㠗人父再習母方當妊之夕夢皓月墮懷遂生師實元辛未十一月十有二日也丰姿粹瑩性警敏方踰晬聞母誦佛書心耳輒有會能隨母聲其亦宿根有過人者矣年十二益嗜梵典往依諸父聞莊法師於上天竺祝髮為沙彌未幾聞藏春衍大師晦迹於姑蘇竹塘寺貫通三教之旨偕莊師往見頂禮為弟子懇求指教大師知為法器曲加獎掖後大師應太祖高皇帝召命選從成祖文皇帝於燕邸趣師歸上竺臨行詔之曰俟吾還當與汝遐遁佛國山中也已而輔定靖難受封榮國公後大師奉命取金光明懺法於杭棲止大明山居師徒復一會晤與止庵古春輩有鳳山登高倡和之作閱年載以欽限不可稽留乃歎曰吾一落塵網欲脫未能汝當虔奉香火即朝夕侍我也遂別去師既佩大師訓愈自勵習衡台教觀因言薦道見法知宗受具足戒己亥登班上首後遷普福不三禩超補圓照法師用為住持導迪暇身督經營更建圮穨莊業之奪於豪右者咸復焉是歲詔天下耆學所演宗旨浙西諸山即杭吳山寶奎寺延師講心經眾方圍繞倏聞異香盈坐恍若睹韋天側立傾聽者一時咸驚異之丙寅冬各錄舉上天竺仍授杭郡都綱師蒞任十餘載歸隱觀堂頹新舉廢置建之功不可枚數壬午秋預建華嚴道場一十五日閱二日謂弟子曰身有壞滅性常不遷吾行矣結跏而化茶毘獲五色堅固子無算諸徒為塔於白雲峯下古春法師名如蘭富春人淹通經論餘及詩文所著名支離叟集忠肅于公彌月時師赴湯餅會摩其頂曰此兒他日救時宰相也後果驗一庵如法師蘭古春贈詩云山川發靈秀造化無有窮間生賢哲人大闡衡台宗吾師越之徹奪迹千巖中蓬萊對秦望浩氣開鴻濛孤舟鑑湖上一笛樵漁風神禹奠南鎮會稽獨稱雄具翁有真子如魚水相逢胸湧冰雪淨行屹丘山崇朅來長干寺靜室方養蒙靈山古佛國小朶攢青空摩霄志不冺西嶺存遺蹤猿鶴應起舞龍象如雲從鷲頭宣一妙亦足暢深衷宗源梵法師係東溟門人敬修德完法師明天台宗留心內外學進修不已兢業持身東臯有銘鏡中潭法師無相住法師名智住榮國公法孫也深通藏海兼涉儒墳嘗對宣宗皇帝說法啟沃聖衷大稱厥旨賜度牒二十紙著馳驛南歸掩關謝世蕭然自得偕其孫瑾無瑕賡唱禪餘以娛歲月殆緇流之繡虎也大猷闡法師雨庵霑法師名大霑習台宗位右覺義為南洲洽法師手度得法弟子竹山蕙法師名覺蕙鹽官張氏子性好禪詠與從兄古梅顓同依玉虛竹東海雲交相磨礪雅尚風標受知於僉憲黃山焦公郡倅柏山雷公優遇之嘗秉拂白雲堂以興衰起弊為己任晚搆覺照樓為讌寢以送餘年性菴法師名永顧字本源四明鄞人十歲喪母能執喪禮哀毁如成人服闋出家郡都綱竹菴問師應度為法孫篤意釋典暇攻儒術既而謁南京僧錄唯菴實師命和本宗偈有三十世生一念有五千經旨片言該句菴倍加器重為書狀侍者轉懺首值杭梵天闕住持菴命往主之凡七載刺血書妙法華阿彌陀經報父母恩僧錄心田霔師延為大報恩寺都講闡揚法華奧旨聽者川湧若陸參政友諒中書姜孟圭等咸執弟子禮屬有薦師住持上天竺寺報恩懇留駙馬都尉沐公冢宰黃公宗伯王公杜公太常鄭公曰天竺大剎也非師不可辦始得行既至啟滯覺迷舉廢興墜為之一新凡十年有都綱之命復表率九邑又居官十稔無少瑕纇誠可重也著述有講貫結偈朝野賡歌山居倡和缶音等集南溪柯住持名道柯姓俞仁和人年十四歲家雲隱房十九薙髮究心內典又兼通世諦温恭遜讓與物無競五十眾推舉為總持簡靖莊肅與大宗伯范公有支許之契及退休一室禪誦彌陀壽七十一無疾而逝玉穉登撰銘伴雲香住持諱諸香仁和人姓沈性樸實喜捨不少恡嘗遊天台鴈宕又一日行五臺山中八十里人煙絕俄有草庵老僧迎飯歸途覓庵不可得葢精感通也壽七十三卒瘞桂子峯前黃汝亨為塔銘靜庵讓法師餘杭人姓王十五出家上竺禮進公為師幼時性喜合掌人以天香童子目之既祝髮和平撙節既四十慨然以家事付徒如貴曰余世事畢矣因受戒雲棲寄名廣行持戒真切毫不肯苟平日傷末法陵夷每興善業必躬必倡慨寺風不振直諒必歸正持其肫肫樹教之意可方遠錄公其懇懇公廉之心無愧都僧正者萬歷辛亥七月二十五日示寂邵重生撰正定塔銘行述觀如法師師諱方誌海陵馬氏子父尚元母許有鹿門偕隱風師少持報母齋抵洛伽回參上竺夙緣有待即於竺之雨山居投歷庵師為師祖萬歷戊戌薙染庚子寺住持竹亭暨無塵雨山伴雲率合寺請歷菴建禪堂師勠力勷事持蘭溪趙檀越銀十六兩詣龍游更募助得材肆佰餘株又乞榷關免稅舁歸𤱵築擔負與菴頡頏聽雲棲似空師楞嚴之講菴促歸師念大事未明辭游南都五臺徧悉禪講乙巳回竺聽明宗師法華於宋園而菴將堂事交出僧自然師亦力輔次年臺山澄方大師同內監張然公送御藏至昭慶與師晤契同函蓋戊申得古心和尚大戒即請澄師自華嚴而下所流通法寶於竺徧演諸福田事咸力主之閱藏齋僧尤為恆課送澄師北上返於楓嶺之陰造中印庵供地藏甲寅冬碧海昭陽李公請師說金剛法華於慧照寺泰州梁垜諸處四期講香相接道化盛矣丁巳澄師登皇壇師為阿闍黎受神宗賜紫又受光宗賜紫大小衣服十一件天啟乙丑受慈聖賜紫說皇戒又受慈聖賜紫及金冠密旨弘經崇禎庚辰回竺注法華正旨竟即受徑山請主方丈三稔甲申冬至泰州修西山寺順治戊子應撫院陳公請講華嚴全部十四月圓滿己丑冬付杭城慧林寺說法華正旨庚寅夏還竺復講法華正旨脾疾作期終歸中印庵於七月廿六日亭午索浴褡衣手捉白拂命舁禮祖塔未行即說偈曰七十八年幻夢中奔馳南北走西東還歸天竺靈山國統照元來色即空說畢泊然坐脫受業得戒弟子無算嗣法者溧陽野松湖廣松門杭州恆觀高郵野營泰州玄聞杭州隱生江西清白紹興石田杭州道燈揚州見明鎮江朗生茶毘後孫明錞等募眾資建塔於中印庵之山麓心臺靈住持諱萬靈姓邵氏仁和人萬歷甲申同徒世榮投華藏房靈源師薙髮食貧苦守躬罹鼠牙備嘗險阻拮据堂構以長子孫皆師之力也建別業曰靜處齋有終焉之志值大士殿圮議鼎新之師與同志航海採木竣功錢師相麟武虞銓部德園黃學憲貞父三鄉先生俱護法焉崇禎壬申八月二十日手書遺囑先是嘗三捐鉢資為雲棲飯僧迄此復建道場七晝夜命子孫聚而念佛取曆擇二十九日午時云吾於此長逝矣屆期沐浴更衣吉祥而逝世壽六十二法臘四十八春山富住持諱萬富號春山姓錢氏霅人也禮上竺意正為師居秋香閣苦行清修丙申閣不戒於火遂肇基普門之旁創業不辭勞瘁時值本寺正殿傾圮師與同志十有四人共謀鼎新而願力獲遂厥後師以齒高多病謝去諸務先是師建準提閣退息其中晨昏禮法華諸經靡間誦佛號日以萬計走天童受密雲大師戒越三年預知逝期曰除夕吾正七也呼孫續元遠詣命浴浴罷爰輪手珠誦佛號而逝時年七十有二其孫續元字心融姓張氏霅人九歲出家二十薙髮至性純粹為住持善調眾志人咸敬仰乙亥之明年走金粟受戒歸山第誦法華涅槃兩經一日示微疾亦念佛而逝
