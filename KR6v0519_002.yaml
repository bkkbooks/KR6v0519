body:
  text: 天目山三學學人廣賓纂請牒奏宋郡守陳軒上靈感觀音院奏曰臣所領州西偏湖山之勝甲於天下而天竺山在焉自五代時僧翊得奇木不能名刻為觀音大士像僧勳又以佛舍利內置頂間其後像見光惟與人作福祥遠者載金石近者口相傳不絶不復概舉臣自去秋視事民方薦飢今年春夏雨彌月不止吳興苦卑連歲水災父老日夜憂懼臣即率屬躬禱像下衝雨入山衣帽沽溼渠決壞道從者皆涉比臣之還天宇開霽纖雲不興白日正中清風穆然邦人合爪歎息既又輿致城中作佛事與民祈禳已而雨暘有時民不告病稼穡旆旆遂為豐年實兹像之庇兹土也所不可忘臣竊考圖志惟天竺山粵自晉末嘗為道場逮聖朝天聖始分上下而觀音像所在歷載崇奉在治平中賜號靈感因以名寺在熙寧中許寺歲度一人為僧朝廷每遣中使謁者走香幣其所封識用御府寶璽蓋嚴恭如此惟是殿宇之建垂六七十年日就頽弊不足以揭虔妥靈宜有加飾臣不勝大願願給祠部空名度僧牒數十道貨緡錢市材僦工撤而新之不惟俾東南之人永有瞻式儻遇水旱禍災吏不能力者庶幾有所控告臣惶恐以聞祈謝文宋郡守蘇學士軾禱天竺大士祈晴文曰三吳之災連歲不稔尚賴朝廷大分倉廩之陳乃眷疲羸僅免流殍今者淫雨彌月秋成半空永惟嗣歲之憂將有流離之懼我大菩薩行平等慈覩此衆生皆同赤子反雨暘於指顧化豐歉於斯須雖某等不德而召災念斯民無辜而受憫願興慈惻一拯含生又謝晴文曰民無常心固何知於帝力天作霪雨當有感於佛慈慧光照臨陰沴消復拯農工於溝壑寬吏責於簡書某等共銜不報之恩願頌難名之德恭馳梵宇少薦微誠感應記唐皮光業撰上天竺觀音看經院感應碑曰錢唐佛國山中舊有天竺觀音寺相傳創自典午時毁於六朝兵燹石晉天福四年僧道翊從終南山來即其故址縛茅居之見山麓有神木發光之異刻觀音大士像虔奉菴中後洛僧侁施舍利納頂間凡諸祈禱應答如響唐季有異人錢鏐挺生臨安狀貌魁碩具萬夫無敵之勇適當五胡雲擾九域塵飛奮梃一呼兩浙披靡志圖捍衛東南中懷疑二忽一旦夢感大士有封王拜相之言乃攘臂先鋒所向克捷頤指氣使罔不樂從初為董昌偏將繼為杭州刺史擢鎮海節度使後進荊揚節度使欲出兵討朱全忠復夢大士曰不可輕動汝能救百萬蒼生不旬日進爵為王矣已而果封吳越國王鏐感大士默佑之神屬豫托述其事鐫諸貞珉以表靈感之德於無窮豫謂老翁止汲水以溺兒井著婆留之靈迹胡僧言託生於斯處池無神物之潛形宿命洞燭於未來玄機迭徵於無朕岱嶽生申補衮藉元良而翊運尾箕誕説築巖起右相以和羹況兹扛鼎之英豪無始劫來必親赴龍華而授記是以然燈之正覺閻浮界內乃數呈夢象以開迷將欲拯溺而救焚特此因人而假手非廣大靈感之慈迥出於乾坤覆載之外何天人相與之際若捷於形聲影響之間否則何以致三代五王之盛山林被綿繡以騰輝一門百辟之榮子姓襲金貂而繼美者乎凡諸祥瑞具載簡編邇復僭次緒言代申銘心鏤骨之悃愫殆亦假兹願力普為導迷破暗之筌蹄云爾宋鮑欽正代郡守陳軒撰靈感觀音碑曰紹聖二年軒自合肥移守錢唐明年奏疏於朝曰臣所領州之西偏湖山之勝甲於天下而天竺山為靈感觀音菩薩像在焉臣自去秋視事民方薦飢今年春夏雨彌月不止父老日夜憂懼臣即率官屬躬禱像下衝雨入山衣帽霑溼渠決壞道從者皆涉比臣之還天宇開霽纖雲不興白日正中清風穆然既又輿致城中作佛事與民祈禳已而雨暘有時農不告病實兹像之庇此土也所不可忘惟是殿宇之建日就頽弊不足以揭虔妥靈宜有加飾臣不勝大願願給祠部空名度僧牒數十道貨緡錢市材僦工撤而新之奏禮部尚書敕令從事許裒一路祠廟施利以充其費於是毗陵胡公宗哲番陽張公綬偕為轉運副使特主其事乃得錢五百萬緡樂施者又千萬是役也凡在見聞智者獻謀巧者出技富者薦貨貧者效力良材密石盡山澤之選經始於某年某月而某年某月告成為殿屋若干楹高明奧深嚴翼宏大復闢其前楹為懺堂金碧丹堊之飾炳煥奪目華供之具無物不備慈容妙相巍然益尊過而禮者恍若梵天帝釋之居又疑身在圖畫或以謂三昧力所變幻也蓋如是而後足以侈上之賜而顯揚菩薩之威靈以慰夫邦人父老之心余為撰次其本末將勒石以詔於後國朝吏部尚書蕭山魏驥撰禱雨感應記曰景泰六年夏兩浙天久不雨禾稼將稿四民倣徨無措時欽差鎮守浙江都知監左監丞阮公會諸都閫藩臬重臣於議政之堂而揚言曰方今聖上屢降敕書憫念元元務在以安其生今兩浙無雨田疇龜坼禾稼枯稿況嘉湖二府之民已罹水害賑恤且未蘇今又旱若此儻失西成則民何以堪非惟其嗷嗷不能以生則國賦從何而輸在古暵旱有靡神不舉之典今豫詢諸耆老謂上天竺寺所奉之觀音大士每遇暵旱凡守土之臣能秉誠祈之有應豫欲徇民之情與諸公當一往之可乎僉曰宜公遂與鎮守兵部尚書德興孫公齋沐於六月既望率諸藩臬之臣徒跣躬詣其上天竺寺奉迎靈相至仙林建壇祈禱即日陰雲四起至日晡甘雨大澍明日如之又明日亦如之致兩浙之地禾黍芃芃枯稿悉蘇民咸歡忭鼓舞舉手加額曰此非鎮守大臣秉此一誠躬率僚寀以祈求之其何能得雨有如是耶公由是大感靈貺念無以酬即捐己資重建行龕洎製冠服與諸供具以莊嚴之既而仍奉送以歸於時其住持僧永顧目覩其盛且於山門有光乃具前所云者於豫請記之豫曰觀音大士得雨以濟斯民若邇以歲歉杭之鰥寡惸獨及別郡流移而來乞食於市者殊夥公則規畫百至或給之以米或濟之以粥賴其全活者不可勝數又若正統己巳括蒼寇作流毒其境公躬擐甲胄提兵深入搗其巢穴擒厥渠魁於脅從者則待以不死既招徠無辜陷於寇者老稚以千萬計至杭之街衢河梁之類久被堙塞則竭盡心力以繕理之使復其舊以便於民致民仰公者不啻猶神明感公者不啻猶父母願并紀之殆有不特表區區感公之心而且表浙民之感公之心也敢請惟豫自天官蒙聖恩歸老林下知吳越之民被公之惠者非一人頌公之德者非一口蓋以公能體聖上惓惓愛民之心為心於民之飢寒則賑恤之於民之寇盜則翦除之於民之嘆旱則祈雨以濟之於民街衢河梁則整飾之於民之寃枉則伸雪之是故強暴不興良善安業以樂太平之樂實由公秉此一誠外盡其力內盡其心而能然也昔鄭火大夫子産救災補敗得宜當理史實書之衛有狄人之難文公治其城市宮室合於時制詩人歌之今公於浙不言其他姑以昔除括蒼之寇盜今祈雨而濟民而論與子産救鄭之火災文公靖衛之寇難無異其紀之也良不為過故豫因永顧之請特為之記真身考國朝邵重生曰上天竺觀音法身奇木乃本寺之寶南宋史建炎三年冬十二月金虜完顏宗弼即兀朮也入臨安府聞其奇奉觀音輿中并大藏經徙而北時有比丘智完者率其徒以從至燕舍都城西南五里曰玉河鄉建寺以奉田公西湖遊覽志陳水南兩三墨談郎仁寶七修稿今成化杭州志萬歷杭州志皆從傳燈録之説或言佛身憑虜奉去安在靈異不知佛視中國夷狄初何爾我按續傳燈録云建炎二年十一月金兀朮入杭城追高宗至紹興四明次年二月兀朮復回杭城乃奉觀音北去不知此時偶陰雨請真身在城海會寺侍香火道元知虜求索急藏井中將他像置行殿虜隨取去及兵退城寺亦燹爍衆僧迷不知處道元被驅至許村逃歸知其處卓地有聲井起像如故則虜奉去者非真身也傳燈録之言如此今余住山得見真身法身沉香者不知菩薩化現自在一方此土生靈感召其曰玉河鄉未聞靈應然則大士之靈係於土而不係於像假乎像而不依於像狡虜奉去與黠僧求存皆斷見也惜燕京非元上都朔漠之地乃今北京城縱元上都我成祖北征已至其地而玉河鄉更邇亦必有人至更無能詳訪此像下落耶其無可知矣上竺論古菴山人曰或問上天竺於天下無峨嵋五臺普陀天台之形勝於神無泰安濟瀆之著見於仙無茅山武當之來歷區區託迹靈木之光至若狂三吳飢渴四海而香火不熄年新月盛者此何以故哉請居客而竟其説大抵山川之靈係於境神靈之著因乎人習以成風者由於久翕然攸好者秉乎彝從心所欲者乘其便音響流通者感其慈願出其途者取其適不境則靈何所緣不人則靈何所顯不久則靈何由同不性則靈何所攝不便則靈何由普不慈則靈何由圓不適則靈何所歆七者得其一而從違半況得其全而天下歸也夫何疑哉請以人境言之堪輿大勢地形全資水法地傑所以人靈水法東南注為順順則水走山因以飛無情而地不結水法西北注為逆逆則水返山因以回有情而地結粵自上古武林山南北二支生至錢江而止其中南北武林二澗水瀉於今西湖西湖東南由進龍浦順注於江杭城之地不結靈竺之山雖有晦昧自秦漢晉以來武林二水瀉於今西湖其時進浦路漲為陸江不通而成湖方有金牛明聖之號西北逆注於海故杭城之地結靈竺之山於焉而始顯然則有西湖方有杭城有杭城方顯靈竺審矣有靈竺所以有杭城有杭城不可無靈竺又審矣惠理道翊之見易地皆同秦漢晉時未有杭城有錢塘縣之草設故靈竺亦不須深惠理開天竺至今下竺而止石晉之時杭城盛而稱郡故天竺當邃道翊開天竺至今上天竺而止杭城小故天竺近杭城大故天竺深然則杭城盛天竺寧不盛杭城衰天竺與之衰天竺杭城風氣命脈實相關係不居然可見哉又不觀之近有人以大士盛極而開香火於五雲焦山二處五雲風景則大江流其前焦山則天目聳其左卒之風氣無關命脈不係蓋人雖有厭常喜新之情而無可大可久之勢故也寧若上竺之不求而自然欲廢而不可者乎不特此也大士之風孰不欲依以為重雖以慈雲之德設旃檀觀音而不傳江干有五丈觀音而不著本境有黑觀音堂而不彰新市有長觀音而不久近村有四面觀音而不立以至剎剎有閣處處有堂豈非關係所存自潛孚默契而不可奪因緣所感有若或使令而不容己者乎惟天下之塗浙直江犬牙而福廣川蜀所必由之路諺云有之上説天堂下説蘇杭惟天下之福金帛財貨萃於杭城而杭城之福富貴康寧懸於上竺山川為杭土之母若提綱而挈其領大士之慈悲為杭父若法化出而佛口生海內香火雖多而出現因緣此山所獨靈感之言士民不捨於北宋廣大二字南宋表揚而迄今夫信之專者則土石皆帝攝其魄者則草木皆兵加之久道則不言而化緣熟則不約而同蓋好德之良根於民性本善由是天下之人即以仰杭城者而仰大士其歸已不可禦矣所謂久而性也如此至謂便且適者奈何生氓之情所以求福者不過欲逸欲樂也東南財賦有餘之地人情更甚杭為六省通衢九達孔道花錦為城貨泉為藪萬寶之所輻輳百工之所攢集開天竺之門戶有西湖六橋掉天竺之手足有靈鷲飛來峯秀天竺之眉目有諸裝點而天竺兼之焉因求福而暢逸豫之情因逸樂而益堅求福之念故不特富貴賢智歸之而貧賤愚不肖莫不興起以此也然其圓也奈何蓋天下靈聰司土肸蠁者安富貴而躋貧賤已耳大士不惟能與世間樂尤用情於苦難則雖至貴至富所不能無而極愚極劣更切哀仰糾察之靈者不過彰善疸惡已耳而大士尤不捨夫不善之人過往之靈不過電暗室察順風已耳大士尤遺聞反聞無作妙力循聲感應不特三際懷保十方恫瘝已耳而其緣更孚於執著難化之婦女上合諸佛之慈故曰大慈下殉羣生之欲故曰大悲世有善不善百世既歸家有閫以內尤懷向慕夫孰不有父子孰不有妻孥孰不有順逆如是者安往哉抑又獷悍之性可化而馴良顓蒙之愚可乞而智慧隨地説法靡剎不形蓋不特三十二應而有千億恆沙之身不特千手千眼而有千億恆沙之手眼此吳越之崇天竺高於五臺峨眉四海之渴天竺深於靈山祇樹矣又何必泰安神道之設濟瀆浮物之幻武當昭代之崇天台羅漢之果茅山聲聞之迹而已哉然其外又有三説為天下神佛之致歸向者莫不水有風波之危陸有傳舍之苦舟車屢易人獸俱疲孰有水平通於千里陸凹無過一程善信如遵郊陸婦女若履閾門更出於天下之神靈之右又四方別省所以足民用而充官儲者或棗栗梨橘竹木漆枲皆成於人者七而伺於天者三惟吳越蠶桑農穀成於人者三而伺於天者七雨暘既司乎大士豐儉必藉乎威靈祈蠶祈穀祈麥古聖王所不廢何能後於今之氓乎且也泰山武當茅山諸處聞儲香資進奉孰有如天竺曠蕩之恩士庶得自盡其誠而無取故握粟可卜裹飯可禱至有心香投體而已者又有醉飽於僧而賖有秋之償者或即貨所業而以其羡充費者而又有創見觀光驚心聳目一年不至若一事未完一夫不行若舉家獲罪此春時之民盡若狂者以此也然則杭城靈竺豈但相為表裏而又相為盛衰豈但相為盛衰而實相為存亡者耶客聞之唯唯或又言上竺與普陀大士是同是異曰豈得異蓋天竺即普陀普陀即天竺也普陀所以鎮三際之水乃天下之大士而三吳在其中上竺乃三吳之大士而天下在其中大小無分而理亦無異然至上天竺者可以不至普陀而圓謂小可以該大至普陀者必至天竺而偏謂遠而不可忽近圓偏互舉而事無不同也女身説山人又曰觀音古佛其身不必論男女其身自是天下萬世男女法身況法華楞嚴觀音普門二品三十二應中或現優婆夷童女身而為説法或現女主夫人命婦大家而為説法蓋或現者即於其人中出生善人即大士之身非謂大士往變現諸女相也大士不往變現隨其人中出生則隨其身男女矣斯大士應身之妙觀應之一字則老少男女大身童身皆隨其人而應也至如法華龍女品之説此以女化男如維摩經天女化舍利弗為女身曰一切諸法無有定相此以男化為女也此屬皆不可思議事觀圓通二字則男無所圓女無所缺男無不通女無可礙故女身之説亦不廢焉然則執公主之説謂之不知佛則執男子之説得非局於佛耶或者又曰今時以三寸小履二寸繡緣加大士可乎曰無害隨緣其人艴然曰薦以腥羶塗以脂粉拒乎答曰若如是則又非圓通矣且大士天下之大士也男女之大士也今女人即以杭城女子之飾事之男子即以杭産縞金銀之物事之故龍女則獻珠匿王夫人則獻香纓難陀牧女則以乳糜此其人即以法而説大士也所以佛入葷俗而不拒於肉菜當晉唐之時而男子亦口脂面藥者矣此緣之謂也其人乃服又曰燒香何以謂之作福余曰釋典且不舉姑以洪範五福曰攸好德佛之德盛而福備矣好之而恭敬供養親近愛樂非有身之福乎至冀其餘庇之光而懺其宿造之罪皆第二義也世有觀音香山卷言觀音乃妙莊王三公主之説執有者以宣律師曾詢之韋天韋天言信而宣律師安有妄語且趙文敏公管夫人曾書此記文敏豈易惑之人今有陶石簣公言此大碑今現在汝南府其文乃蔣之奇撰蔡京所書然則流通於宋元矣執無者以大士為淨土導師淨土安得有女身女有五障不得作佛如王元美言乃淫僧妖尼誑惑所撰蓋以其詞中言不足信如香山在嵩山東二百里乃中國地何傳信無徵又如蓮池言妙莊王不見標何方國土何處國王愚謂秦時君始稱朕周時王女始稱公主今其卷有二稱法華經妙莊王有二子一女而此記妙莊王三女所以興疑要之菩薩化身通乎過現不可思議論則劫前或已有諸名稱與今符合不可知也故有無斷常二見皆非佛法經曰靜極光通達寂照涵虛空卻來觀世間猶如隱中事此言得之蓋佛止言因果而不執理儒家信理而不信因果儒家言古及盤古止矣如外紀之事便略不經心佛家言古動謂前乎千萬劫此所以不可同年而語也或問今世人還拜願自三步至十步然初未見顯應而人行之不廢何也答此有二説就菩薩而論則舍法分無為自是不可思議事就衆生而論則如疾痛呼天呼父母觀音乃此方之天之父母也
