body:
  text: 天目山三學學人廣賓纂詩文紀述品側聞白傅之詩宛是題兹天竺坡仙有跋獨云書彼䖍州但既傳神何妨借重況其太白之豪游時有山無寺參寥之富詠者是宋非唐唐道士葛參寥與龍泓丁飛善考降靈神木之初乏志瑞詞華之選惜無好事孤此窮蒐僅壓卷於二蘇庶張軍於殘李者也然而對景抽吟半落徐凝之洗惡登高撰賦卒難謝眺之驚人蠢爾東瀛贋為下里冐元人於宋首目不識丁溷麥氣於檀林刑當坐劓可勝歎哉且夫選例辭專史科雜贅名公鉅札擬一字於千金諸祖緒言揲全身於半偈縱曰壽諸金石奈何殃及兵烽或鬼祕於燼餘或神摉於蠧末摭兹屑玉類彼晨星殘編斷簡使名山之文獻可徵埜史稗官即委巷之叢談有據讀其遺製湖山之景常新攬夫鴻篇禪宗之規可溯故曰志者記也所以備遺亡之事也志紀述題詠唐李太白送崔十二遊天竺山還聞天竺寺夢想懷東越每年海樹霜桂子落秋月送君此地遊已屬流芳歇待我來歲行相隨浮溟渤又與從姪杭州刺史良遊天竺山挂席凌蓬丘觀覽憩鐘樓三山動逸興五馬同遨遊天竺森在眼松風颯驚秋覽雲測變化弄水窮清幽疊嶂隔遙嚮當軒寫歸流轉成傲雲月佳趣滿吳州白居易遊天竺山一山門作兩山門兩寺原從一寺分東澗水流西澗水南峯雲接北峯雲前臺花發後臺見上界鐘聲下界聞遙想吾師行道處天香桂子落紛紛宋蘇東坡贈辯才法師南北一山門上下兩天竺中有老法師瘦長如鸛鶻不知修何行碧眼照山谷見之自清涼洗盡煩惱毒坐令一都會男女禮白足我有長頭兒角頰峙犀玉四歲不知行抱負煩背腹師來為摩頂起來趁奔鹿乃知戒律中妙用謝拘束何必言法華佯狂啖魚肉又聞辯才復歸上天竺以詩問信道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開神光出寶髻法雨洗浮埃想見南北山花發前後臺寄聲問道人借禪以為詼何所聞而來何所見而回道人笑不答此意安在哉昔年本不住今日亦無來此語竟非是且食白楊梅又訪辯才不值留題不辭清曉叩松扉欲值支公久不歸山鳥不鳴天欲雪捲簾惟見白雲飛又雨中遊天竺靈感觀音院蠶欲老兮麥欲黃前山後山雨浪浪農夫輟耒女停筐白衣仙人坐高堂又立秋日禱雨上天竺宿靈隱同周徐二令百重堆案掣身閑一葉秋聲對榻眠牀下雪霜侵戶月枕中琴筑落階泉崎嶇世味嘗應徧寂寞山棲老漸便惟有憫農心尚在起占雲漢更茫然釋道潛謁上竺觀音大士十年江海去飄然魂夢長依鷲嶺邊月地雲堦重到處殷勤稽首白衣仙又陪司馬才仲節推諸君游天竺得青字西郊久不雨草木無餘青薄雲弄秋暉山色時晦冥超然五詞客文采披華星聯翩過吾廬車蓋紛滿庭相攜訪靈鷲細路通巖扄攀翻幽桂叢衣襟襲芳馨絕竟異人世吾詩豈能名諸豪追鄴下妙語逾瓊英願言一揮寫樂事良難并高空墮海日歸驂尚能停又懷辯才法師法師安遠徒我見常磬折頹綱製像運基構甚宏達煌煌四十載說法傾吳越人天會方丈萬趾常雜遝藹然如丘山四座羞蟻垤投老倦揮麈毅然辭且決饑鷹得秋風轉盼俄一掣結茆南山陲雲蘿古幽絕昔我海上還相尋訪林樾夜闌叩微要猨鳥寂不聒慧風洒幽襟法雨濯枯枿別來今四載寒暑驚屢闋相望如晨星杳杳各天末何當從杖藜一笑龍泓月又辯才生日像末真風恐不傳故生豪傑為人天慈航橫截三千界法雨均沾四十年獨鶴精神秋始健長松根節老彌堅莫將有物觀無象唾露冰輪處處圓又聽天竺慧照師琴太古淳音久已虧多君妙指善醫治高山流水意雖在白雪陽春和者誰不放驚飈侵磵戶只容明月侍簾帷滿堂賓客俱傾耳共失芙蓉漏轉時朱熹春日過上竺竺國古招提飛甍碧瓦齊林深忘日午山迥覺天低琪樹殊方色珍禽別樣啼沙門有文暢啜茗漫留題呂祖謙遊上天竺淨域何虛寂居然隔市喧僧來渾不語吾亦欲忘言至樂存簞食浮名類觸藩行行返初服賁趾老丘樊真德秀遊上天竺世事不可了還須入是山遙尋黃葉路迥出白雲間瀹茗止煩渴談空得笑閒飄飄有餘興歸去掩柴關魏了翁遊上天竺風波滿平地世路繞羊腸急欲逃塵網遙登選佛場雲深猶午暝竹密夏生涼興逸忘歸去高眠借石牀郭祥正遊天竺誰從天竺國分得一峯來占盡湖山秀最宜煙雨開楊誠齋雨中遊上天竺被雨遊山也莫嫌卻綠山色雨中添人家屋裏生松樹穿出茅簷卻覆簷又禪房寂寂水潺潺澗草巖花數點間忽有仙禽發奇響頻伽來自補陀山李綱由上竺赴洞霄宮山谷投閒日乾坤板蕩時秦庭徒痛哭漆室竟誰知欲仗空王力潛開聖主疑奸雄俱掃盡談笑定華夷岳飛歸赴行在過上竺寺偶題强胡犯京闕駐蹕大江南二帝雙魂杳孤臣百戰酣兵威空朔漠法力仗瞿曇恢復山河日捐軀分亦甘張栻過上竺上竺諸天近中林萬木低迥超塵世外恍入雪山西忽漫參龍象行將混鹿麛何年釋簪紱於此獨幽棲戴復古遊上天竺好山看不了遂借上方眠酒渴傾花露詩清瀉澗泉生無適俗韻老欲結僧緣睡覺鐘聲曉窗騰柏子煙仇山村游天竺行遍山巔到水涯尚無紅葉與黃花長松夾道六七里小墅通村十數家竺國雲深僧寂寞草堂洞古石嵯牙野翁共醉官爐酒扶醉歸來已暮鴉又登覽欣逢勝日閑蒼松九里費躋攀行過綠水盡頭路步入白雲生處山猿鳥尚能知異境仙凡原不隔重關幾時拂袖逃塵網野衲村樵共往還白廷玉宿上天竺名山倦遊歷掛起手中藤佛國三生石天巖百歲僧定回松院磬吟苦雪龕燈愧我心猶雜何因問二乘吳大有遊上天竺編茅為屋住結葉作衣裳不試燒金訣惟尋煮石方洗瓢溪月冷採藥野雲香常有仙家鶴飛來遶石傍張仲舉宿上竺寺山僧留客意殷勤把酒山亭對夕曛披徑亂藤盤石樹摩厓蒼蘚歰秋雲月中桂子隨風落洞口猿聲靜夜聞老去野心偏向逸竹窗禪榻漫平分又石梁濺水濕蒼苔陰洞傍穿澗底回殿閣金銀從地湧山林圖畫自天開龍隨僧到分雲處猿認人呼下樹來遊興未闌斜日盡馬頭呼酒尚徘徊趙子昂遊上竺寺九松曾入畫三竺久頻登忽遇餐芝叟遙尋辟穀僧風泉喧梵唄霜月烱禪心聞見皆真諦慚余悟未曾楊廉夫遊上天竺陸海翻鯨浪香林敞鹿園冥心超湛寂彈指隔囂煩東渡漫多事西來無一言吾將逃火宅難閉六窗猿又獅子峯觀潮二首海國梅青瘴雨收胡牀高踞碧獅頭三韓水接天無盡百越山窮地欲浮樓閣剛風吹碧蜃旌旗落日照紅鰍行人莫問驅潮事湖落山西淺作洲又獅子拿雲湧翠巒我來親拂頂花看隨潮月上樓閣濕度海雲生鐘磬寒蓬島未應三萬隔桑田今有幾回乾大千不究恆沙界細問彌天釋道安張光弼訪舊次泐法師雜興二首但教懷抱能傾倒莫向尊罍計有無不為訪僧三竺寺肯乘烟艇過西湖又酒館湖船盡有名玉杯時得肆閑情至今人說張員外不是看花不入城倪瓚宿上竺寺禪月湛高秋金天夜色幽珠林星彩動碧殿露華浮蓮漏忙催酒松濤怒撼樓清涼徹毛骨吾欲換貂裘劉基遊上竺寺憶昔西湖覩慶雲玉毫貫頂動星文燭微早已徵休瑞革命方知位聖君香火重參龍象窟煙霞久負鹿麋羣赤松黃石今安在徙倚蓮臺悵夕曛宋濂訪天竺竺隱法師存翁古禪伯爾我久忘形一笑空前夢千秋悟獨惺樓虛雲自入月白露先零擾擾炎途客誰能為解酲王偉遊上竺寺五峯有宿好此日始來過覺樹花增笑珠林鳥共歌浮雲空幻質古鏡喜重磨爾我證何相山僧曾會麽釋弘道天竺雜詠四首西湖蜃氣作樓臺又見一番風雨來後夜月明秋似水桫羅花向鏡中開南澗飛淙雜雨鳴顛風老樹作秋聲庭前攪碎芭蕉葉添得書窗兩眼明坐對晚花紅照水夢回青草綠生池道人居此忘榮辱不羨長安富貴兒晴雪生香晝不寒光浮四壁白團團夜深月照斜橫影只作梅花紙帳看釋宗泐訪道竺隱空齋高掛錫世路讓人忙月伴溪頭影雲分竹裏牀丹苓朝入饌玉乳煖凝香如此作生理何須更絕糧釋守仁上竺與古春話舊看雲入深谷眺月傍香臺幻相風前泡塵根鏡上埃浮生本無住濁世轉堪哀象教今衰落談元憶辯才釋來復同黃晉卿楊同僉遊上天竺湧金門外小瀛洲暇日同陪節使遊五竺山高雲樹曉三江風急雪濤秋說經曾記僧名辯題碣還聞寺姓劉祗合泛湖依釣艇六橋烟水看閑鷗方豪題觀堂已登天竺上更入觀堂深竹密寒猶在山高日易沈騷狂無酒分寂寞對僧吟倚杖春風外遙聞鐘磬音又贈智明上人白雲西院白雲寒客散燈昏獨倚闌乳竇峯前雙鶴下老僧拍手白雲端又贈暉明二上人大明山房勝觀堂松間犬吠雲蒼蒼天竺於斯稱最上題詩巖石添輝光忽聞鐘磬聲倒發知是遊人去倉卒棠陵狂客太奢華獨向山中弄明月又題天巖房萬山深處一溪橫客到柴扉犬自迎急掃塵埃題白壁海曦遙射墨花明王守仁題白雲堂白雲僧舍野橋東別院迴廊小徑通歲古簷松存獨幹春還庭竹發新叢晴窗暗映羣峯雪清梵長飄高閣風遷客從來甘寂寞青鞋時過月明中又泛湖上天竺靈鷲高林暑氣清竺天石壁雨痕晴客來湖上逢雲起僧住峯頭話月明世路久知難直道此身那得尚虛名移家早定孤山計種果誅茅卻易成又夜宿白雲堂春園花竹始菲菲又是高秋落木時天迥樓臺舍氣象月明星斗避光輝閒來心地如空水靜後天機見隱微深院寂寥羣動息獨憐鳥鵲遶枝飛夏言九里松道中次邃翁元老韻百盤雲磴入千峯飛蓋行穿夾道松長晝風雷驚虎豹半空鱗甲舞虯龍江濤夜合秋聲壯湖雨春添黛色濃欲待丹青圖直幹恨無韋偃得相從又遊上天竺次韻捫蘿屈曲歷崔巍玉削芙蓉面面開白日老僧初出定清春有客到山來林深祇樹雲霞遶地迥諸天日月迴世上宰官元是佛洞門猿鶴莫驚猜胡濙贈本源顧都綱曾向都門識道林泊舟慰我索斯吟談玄天竺星霜久拜命楓宸雨露深九邑緇流齊拭目三吳士庶盡傾心老余致政歸來晚何日相逢聽梵音王蒙遊上天竺選勝謁蓮臺松行結駟來臘醅移宿釀春服試新裁膏雨朝初歇香雲午未開催詩頻擊鉢麗藻愧鄒枚楊一清九里松道中出林遙見兩高峯又歷周行九里松午夜煙雲來野鶴四時風雨撼游龍孤根拔地疏仍竦秀色參天老更濃若遣移栽向吾土賓車無日不過從又宿上天竺寺望窮窈窕更崔巍勝概元從混沌開天際芙蓉誰削出海中靈鷲自飛來古壇陰洞雲千疊澗草巖花路幾廻三十舊游今七十偶然行樂莫相猜蕭一中題上天竺古竺深秋益可憐藤蘿裊裊隔諸天不妨暇日頻登眺莫惜清樽浪歲年曲澗寒泉縈細石疏林夕照帶鳴蟬端居聽法依雙樹猶說當年支遁篇釋如蘭次徐退翁夜宿觀堂韻來往山林鬢欲霜雁池秋夜獨徬徨浩歌雪壁留題句滿地月明人影長李茂之詣洞霄宮道出天竺山九里松行路三天竺國山日蒸巖霧紫花點石苔斑溪盡寺方到雲深僧獨閒吟行隨杖履蹤跡出人間釋德祥同張方伯遊上竺不因遊覽入松門猿鶴何由識使君黃葉路從流水上青蘿牀與白雲分逢僧且說裁新句見寺先尋舊刻文冰雪寒巖春到後樹如膏沐草如薰又蘿壁非常翫高僧獨愛之青松同壽色老石借春姿引蔓斜連閣開花直下池茶筵賓客散坐到月來時釋景隆題白雲堂竺峯孤絕勢參天華構嵯峩景物妍花映六橋紅似錦雲封四壁白於綿戀巢鶴在青松上抱子猿歸碧嶂前日暮鐘聲何太速猊牀驚起老僧禪又清華軒幽軒高敞拂雲開軒外諸峯自繞迴禪老談玄揮玉麈神龍聽法到巖臺松濤洶湧當窗起花雨繽紛入座來高廟當年曾勝覽翠華於此久徘徊又兩峯堂乘輿遙指白雲鄉曲徑迤邐到