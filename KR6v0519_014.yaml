去住兩無礙人士爭挽留去如龍出水雷雨捲潭湫來如珠還浦魚鼈競駢頭此生暫寄寓常恐名實浮我比陶公愧師為遠公優送我過虎溪溪水當逆流聊使此山人永記二老游大千在掌握實有別離憂參寥子道潛和云遠公吾家傑道妙非壺丘德傾龍象侶貌蓋江湖秋平生經綸學不為名相留滔滔若懸瀑下注萬丈湫昔年謝講事眾挽不轉頭刳心老巖穴百念本不浮東南多望士唯見此老優翰林天下公方外實輩流旌旗虎溪路竟日泉石游眾生病未已師意可忘憂錢勰和云幻泡昧空色真夢游黃丘宦學類狂走爾來三十秋齒髮非他時歲月不我留古剎插亂石蟄龍蟠霞湫天人大導師住錫今白頭安住差護念晚節非沈浮昔嘗謂出處不用相劣優權實分二智股肱均九流今知擾擾者詎得逍遙游從兹許禮足尚可治幽憂辯才次韻參寥子寄秦少游三絕時少游舉進士不得秦郎文字固超然漢武憑虛意欲仙底事秋來不得解定中試為問諸天一尾退風抹萬蹄崑崙玄圃謂朝隮回看世上無伯樂卻道鹽車勝月題得失秋毫久已明不須聞此氣崢嶸何妨卻伴參寥子無數新詩咳唾成秦少游次韻和云武陵漁子入花源但見秦人不得仙會有黃鸝鳴翠柳何妨白眼望青天長安仕路與雲齊倦僕羸驂不可躋但得玄暉曾折簡何須平子更安題且折花枝醉後酲人間時節易崢嶸屠龍肯自羞無用畫虎從人笑不成辯才四照閣夜坐懷少游學士詩云巖棲木石已皤然交舊何人慰眼前素與晝公心印合每思秦子意珠圓當年步月來幽谷拄杖穿雲冒夕煙臺閣山水本無異故應文字不離禪參寥和云猿鳥投林已寂然芭蕉過雨小樓前雲依絕壁中間破月自遙峯缺處圓照坐不須紅蠟具可人惟有蕙爐煙校讐御府圖書客疇昔曾聞此夜禪少游和云遙聞隻履去翛然書翰猶收數月前滄海盡頭人滅度亂山深處塔孤圓憶登夜閣天連雁同看秋厓月破煙尚有眾生未成佛肯超數界入諸禪元趙子昂訪天竺恭行己上人不遇留詩云輕輕踏破碧雲堆半為尋僧半探梅僧不遇兮梅未放野猿笑我只空回恭行己和詩云犬不曾嘷鶴不飛看山今日偶歸遲點燈吹雪照石壁恐有玉川留贈詩國朝釋宗泐雜興詩處士梅花千樹盡蘇公楊柳一枝無向來畫舫今何處落日西風野水湖張光弼次泐公韻云但教懷抱能傾倒莫向樽壘計有無不為訪僧三竺寺肯乘烟艇過西湖杭先輩方十洲九敘高潁湖應冕童南衡漢臣庠士劉望子伯結社後有祝九山時泰亦與焉徽山人王十岳寅有詩名諸公延登天竺白雲堂賦詩王云山深多白雲入寺淡氤氳證法尋僧問忘機與鳥聞茶煙竹下起乳水竇中分花落疑花雨隨風映夕曛祝云三竺參龍樹千峯隱雁堂白雲禪榻淨甘露茗杯香不染知真性無心證法王悠然塵鞅外歸路急難忘方云雙樹白雲裏遙知釋氏園方忻禪室靜況與幽人言一酌清冷水聊祛塵世煩沖然罷文墨時把貝書翻高云白雲山寺隱靈境法堂深偶入天香會俱生清淨心竟日陪清梵終慚異道林安禪僧自寂聽法鳥無音童云出谷遣塵紛中堂話白雲孤林清磬發雙澗落霞分超然憩靈石斜日對爐熏神理參茶悟微言彈指聞劉云塵寰聊可晤有約過瞿曇茶鼎殊䐡鼎玄談妙客談雲光墮竹榻日氣抱花龕愛此懷堪遣穠華且莫甘夏一叟謝性菴惠茗詩云一封珍惠有餘清粒粒鎗鎗故舊情閒向竹窗聽夜雨自燒金鼎汲寒泓雲濤乍起燈教翦松籟時聞句喜成為問趙州禪作麽好將真味證無生性菴和云陽羨翹英味最清獻芹惟效野人情青山煖摘春千片碧澗寒分月一泓莫笑茶經收未遍卻慚郢曲和難成飲來不獨消塵慮頓使清風兩腋生釋良縉秋日同釋道顓良玉本旃集大明山房泉流堂影澗縈迴巖際柴扉竹裏開萬徑喜逢秋雨歇五峯笑踏夕陽來空林不睹鶴前錫覺海還乘鷗外杯定起閒心無罣礙西湖又看棹歌回道顓次韻白雲重疊路迂迴日轉層崖門半開山鳥巡檐窺供下野泉通竹入廚來夜深愛客分禪榻月白談詩弄酒杯喜爾久甘蔬筍味清齋留我未能回良玉次韻小徑斜斜樹幾回捲簾殘照晚晴開半窗寒影雲初度萬竹秋聲雨後來麈尾天花平講席案頭明月滿茶杯問禪不畏丹梯滑乳竇峯前禮萬回本栴次韻普門西上路盤迴雙樹巖扉倚洞開不問高寒雲杪住獨憐幽勝竹深來化城有供應持鉢談道無聲自洗杯滿地夕陽孤磬裏五峯松暝鶴飛回王淮過上竺湖山佳處韻西湖天下湖西山天下山湖山境界妙天下有誰有力居其間性菴上人抱大智占得湖山佳勝地湖為心鏡山為身山不動搖湖不沸湖中萬狀不可名春秋旦暮陰還晴山中百態不可說輕煙淡月描其形上人燕坐寂無語湖山為賓己為主白猿來問白鷗參搖落半窗花上雨四明狂客本凡流來回湖山佳處游浩歌半日不歸去難舍湖山一片秋徹其源次上竺韻碧壑丹崖萬仞飛鳴泉白雲滿屋吞吐山峯巔石徑草煙滚滚上簾綠竹窗花雨灑灑含清漣一袖好風掃開千嶂霧數聲橫篴吹出青空天是誰脫卻塵緣早歸此我來敲鉢相對一談禪邵重生同上竺覺海邃清潮音師坐月達旦道人真趣坐清宵況復名山月可邀志合偶期天邂逅身遊非夢夜逍遙何方鏡水澄空色幾處鐘魚破寂寥靜極欲求言語斷不知風木故蕭蕭又蔬筍社集竹雲樓暑甚分韻六和成社肯悠游勇犯秋陽課不休小草至心求大乘北風無暑到南樓冰肌觸苎衣堪襲雪藕吹絲分正投不信大家同熱惱慈雲私向竹間流又社集竹雲樓分得山字逼歲誰偷此日閒況逢雪竇與寒山朔雲獨愛梅邊意活火同看竹裏顏剛喜團圞勤問答也懷澹泊數躋攀扶筇又是明年事佛日春風恣往還徐如翰由西湖至上竺靈隱午齋次和蘇長公韻滿湖荷氣遞風香夾路松陰帶雨涼音入耳根清溜轉光開眼界白毫長苦吟欲借降魔杵久病惟尋出世方擬向禪林最深處飽為粗糲菜羹嘗
