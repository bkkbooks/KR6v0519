body:
  text: 天目山三學學人廣賓纂風範隆汙品側聞世間風氣或由地氣使然方外道情多為俗情夾入流而不反習以為常故尊者發水乳不如之歎感衆生寢薄於福緣而如來遺獅蟲自食之言痛後世殆傾於慧命熱心千丈苦口萬端賴有旁觀不憤夙願未弘再來為道德泰山間出作人天北斗冰清教海粉碎魔宮更遊戲於不思之場乃攝伏其強陽之類是所謂有開必先無往不復者也上天竺當辨老住山罹權臣之虐及胡元入主費宣政之懲頃於萬歷大挫三門借有司齊之以三尺不能遇知識勸之以一緘此蓋羣居無紀坐弛有秋好修者密自好修衆非其伍不肖者甘為不肖職莫之繩遂爾因果好旋卧九里松間者何物賢愚品騭載三天竺下者斯人故曰董狐古之良史也志隆汙神異辨才淨法師之住天竺也善持咒水飲病者輒愈杭人尊事之熙寧九年嘉興縣令陶彖有子得疾甚異形色語笑非復平人令患之乃大出錢財聘謁巫祝厭勝百方終莫能治辨才適以事至秀州令素聞其名即馳詣告曰兒始得疾時見一女子自外來相調笑久之遺詩曰生為木卯人死作幽獨鬼泉門長夜開衾幃待君至自是屢來且言曰仲冬之月二七之間月盈之夕車馬來迎今去妖期逼矣願賜哀憐師許諾因至其家除地為壇中設觀音像楊枝霑灑而咒之三繞壇而去明日復來結跏趺坐引兒問曰汝居何地而來此答曰會稽之東卞山之陽是我之宅古木蒼蒼師又問汝誰氏答曰吳王山上無人處幾度臨風學舞腰師曰柳姓乎乃囅然而笑師良久呵曰汝無始以來迷己逐物為物所轉溺於邪淫流浪千劫不自解脫入魔趣中橫生災害延及無辜汝今當知魔即非魔非魔即法界我今為汝宣説首楞嚴神咒汝當諦聽訟既往過愆返本來清淨覺性於是號泣不復有云是夜女子謂兒曰辨才之功汝父之虔吾今將去願舉一觴為別因相對飲作詩曰仲冬二七是良時江下無緣與子期今日臨歧一杯酒與君千里遠相離遂去不復見秦少遊曰豫聞其事久矣元豐二年見辨才於龍井山問之信然見七識東坡有子四歲不能走辨才見之為摩頂即能奔走坡贈詩見題詠吳僧文捷戒律精苦奇迹甚多能知宿命然罕與人言豫羣從遘為知制誥知杭州禮為上客遘學誦揭諦咒都未有人知捷一日相見曰舍人誦咒何故闕一句既而思其所誦咒果闕一句浙人多言文通不壽一日齋心往問捷捷曰公更三年為翰林學士壽四十歲後當為地下職任事權不減生時與楊樂道待制聯曹然公此時當衣衰絰治事文通聞之大駭曰數十日前曾夢樂道相過云受命與公同職事所居甚樂勿辭也後數年果為學士而丁母喪年三十九矣明年秋捷忽使人與文通訣別時文通在姑蘇急往錢塘見之捷驚曰公大期在此月何用更來宜即速還屈指計之曰急行尚可到家文通如其言馳還遍別骨肉是夜無疾而終捷常持如意輪咒靈變尤多瓶中水咒之則湧出蓄一舍利晝夜常轉於琉璃中捷行繞之行速則舍利亦速行緩則舍利亦緩士人郎忠厚事之甚謹就捷乞舍利遂與之封護甚嚴一日忽失所在但空瓶耳忠厚戒齋延捷加持少頃見觀音像衣上一物蠢蠢而動疑其蟲也試取乃亡舍利如此者非一忠厚以豫愛之持以見歸豫家至今嚴奉蓋神物也見宋沈括著夢溪筆談孫莘老知湖州日問文捷曰呂吉甫如何捷曰只三年便在官家左右更有一人白皙而肥一人美髯而長後三年甫果參大政同列韓子華馮當世皆如其言上竺首座德賢有一室女為祟所撓求師治賢至女卧室設榻而卧祟便已見本傳賢法師臨終謂左右曰吾生前以道力免難死恐莫逃門人造像以鐵固其頸及金虜真珠王子兵至祖師殿衆像皆倒惟德賢像不動虜怒令斬之不能入乃積薪縱火薪盡而屋如故虜驚讚禮而去齊玉法師諱改玉為璧宣和六年住上竺值歲大旱井竭玉運心密禱忽夢泉出西坡旦掘之清流湧注因名夢泉初慈雲懺主常製疏勸人修期疏有曰求三寶之真福感諸天之護持世傳為墨寶後兵失去既久逮竺隱法師為住持重修懺期俄有人持疏跪於前曰從餘燼中拾此疏聞再舉懺筵敬以致獻全室宗泐公等交贊謂懺法弘通之兆也盛事辨才法師悟法華三昧有至行弘天台教觀號稱第一東吳講者宗向之時秀州有狂人號回頭左道以鼓流俗宣言當建浮圖為吳人福田施者雲委然憚入杭以辨才不可欺故也不得已既來先已錢十萬詣上天竺飯僧且遣使通問曰今以修造錢若干願供僧一堂師答其書曰道風遠來山川增勝誨言先至喜慰可量承以營建淨檀為飯僧之用竊聞教有明文不許互用聖者既遺明誨不知白佛當以何辭佇聞報章即令撰疏文也狂人驚慚見其徒弟子勸且禮之以化俗師厲聲曰出家兒須具眼始得彼誠聖者吾敢不恭如其誕妄知而同之是失正念吾聞聖者具他心通今夕當與爾曹虔請於明日就此山與十方諸佛同齋即如法嚴敬跪讀疏文焚之明日率衆出迎狂人竟不敢至衆皆服見德洪著林間録蘇子瞻元豐中為郡帥杖策訪辨才於方圓庵及送至風篁嶺左右曰遠公過虎溪矣辨才笑曰杜子有云與子成二老來往亦風流遂作亭嶺上曰過溪亦曰二老亭成辨才作詩呈府帥蘇公與參寥子錢協屬和之高宗自紹興二年臨幸上天竺寺詣大士前禮拜進香設素饌於白雲堂先期三日命鑾儀司除道警蹕設鹵簿丞相以下百僚俱扈從九里松行道為之擁塞自是以後每朔望遣中使賚香獻供勒為定規宋時二月十九日上天竺建觀音會傾城士女皆往燒香其時馬塍園丁競以名花荷擔叫鬻其音中律呂黃子常因作賣花聲辭時多和之寺僧永顧刺血寫經多種獨和墨寫華嚴經八十一卷今存塔院房自勉山中亦有美俗僧相戒不説不美事此頗有隱惡揚善之風天竺山民採樵逢虎驚而作聲山下居民皆應喊此頗有疾痛一體之意又僧輪流當家能者數十年不能者一二年使房業不致消廢又一支傳流不收師弟此免分析爭競亦是良法僧杲兩峯者少時豪宕房業漸廢一旦以家事付其徒日齋誦不輟積十年餘微疾飲水數日作偈怛然而化天巖有白頭僧生無過死三年夢其徒曰余今尚未得解脫因傾潑常住待客殘茶陰司積數缸限我食盡真水厄也汝等當惜福斷不可暴殄天物寺有一僧初甚貧後頗溫飽人問致此之術曰余少年無一錢取溪中礪石往城換木魚持以西溪化茶以茶易米豆延客遂致此耳寺僧春谷機智多謀與僧月空知交空素諳少林有膂力嘉靖中海寇猖獗范參戎署空為頭目谷初以李府勢凌人不滿於寺至是挺身欲往希蓋前愆行軍時谷設謀教空以鐵為棍示賊有力令衆各含靛一粒戰酣時皆吐靛抹面寇疑為神兵遂敗遁後復奮臂率鬥陳亡柘林今列湖上宗將軍廟衰鄙宋呂惠卿與吳精進寺僧善時辨才主上竺頗有人緣惠卿入相使文捷主上竺逐辨才歸於潛辨恬不為意逾年呂勢敗朝廷命辨才復還東坡贈詩曰師去天竺山空鬼哭天竺師歸道場光輝大士大悲實師焉依邵古菴山人曰文捷乃一奇僧故呂敬而主之然辨才又正而奇者捷不得掩之也辨才復天竺未幾不欲與人相形退避龍井則去捷遠矣見七識下並同或者謂今天竺僧中有一二不習上者清規掃地弊德唾人大士殊不加譴其靈安在哉邵山人答曰大士天地也汙穢之事不得罪於天地而得罪於王法佛法所不計而暗於冥加所謂神目如電疏而不漏者如曰有司存耳大士何譴哉特諸佛子往昔曾經供養恭敬大士故今受其福庇今不尊奉狼籍古德云袈裟下失人身為最苦也又曰天竺路旁有五官不備四體暴露膿蠅血蚋獸匐鬼呻痛楚不刀山而獄臭穢不冰炭而慘如是種種各隨其業以招報所謂人而餓鬼人而禽獸人而地獄也諸佛子勉之哉靈竺既無沃壤山淺附郭不容故家居民止以香客為活謂之鍋頭種田交易三春為一年之計謂之匱上田往年僧俗相約俗不宿客僧不香紙今則惟利各兼之而俗尤甚揖轎牽裾殊可笑矣近有豪民劫奪行李要截鄉愚深可切齒在賢護法痛懲之庶俾大士得妥靈耳僧官舊止本等服色猶存清高微意至屠府尊始命服九品服色上竺僧官製紅緑皺紗圓領大節日自城回諸僧披禪衣盛迎然以官拜不膜拜殊不雅觀其後新住者於布政司換文書特加數金添冠帶二字城外起轎如赴任狀觀者塞塗吳參政墓在乳竇峯下名玭為廣西布政先以強買人云道場非塋墓所宜今絶慧珊本圖周氏子為都事攝差徭世途機猾僧也以擅伐路松為僧俊者訟於府擠之且乞鎮守麥公為言珊罹刑追度遂落僧籍寺有諺云珊老虎撞著俊獵戶屈喇喇刺到三計鼓天竺僧多致舉債或難之對曰世間豈有不欠債之人惟狗子乃不欠耳世以為笑五十年前已有諺云淵一千徑八百秀鍾山真沒髮五十年後又豈特淵徑而已外飾虛名內無實蓄此之謂金玉其相而敗絮其中寺有陳光明者拜經精勤今其房地磚有拜立之迹蓋不泯一時善信云向以油供者多初開山因地瘠人曰油甚肥因用以糞地遂致雙目失明悔懼禮經終身不輟廢弛紀長民之蠧師子之蟲也宋薛師魯左藏官淳祐十年冬十一月規占上竺廨院為廳時住持天台法照不許即渡江東歸是日適理宗臨幸祈雪中使鄧惟聰奏聞之上即命內轄令快行禁渡趣照回之宋張閣大觀四年知杭州兼領花石綱先是政和初朱勔領花石綱使流毒山水凡民家有一花一石可玩者即以黃封之其家隨破當時僧衆皆以玩物為蛇蝎天竺石面靈桃并石舁去古鬥雞巖伏虎棧卧龍石無根藤與辨才手植山茶非自毁則勔與閣取故皆不存王臣者襄陽人幼為公侯府家人善幻術攝人物為其主惡刑傷脛號王瘸子成化十七年夤緣充錦衣衛千戶與大璫王敬奉敕採藥收書江南其實橫索寶物凡上竺纍朝所賜及富貴之家所獻寶物有玉觀音日月珠鬼谷珠貓睛寶冠玉鐘玻璃盞珊瑚樹等物竊取一空僧寶珠者創新庵於白雲巖頗弘敞幽寂後納二徒兄弟不睦互相訐告次徒先以山庵投馬通政以求勝長徒又求勢之最者獻茅狀元因而兄勝遂執左券來業焉內數老僧以茅演教寺故欲甘心於此茅知之陽慰曰余庇廬非剝廬也乃施米二石明年計逐之令僕居守後僕晝出為虎所食辨才法師骨塔在老龍井山中萬歷間村鄰老父競傳為郡城李鄉紳平夷之學人曰宋僧道德光明之盛莫辨才若也有趙清獻蘇文忠之外護生不能芘文捷以勢劫其住持有天竺龍井之法嗣死不能庇李宦以勢伐其委蛻三吳百粵奉之如神明而獨於下竺無緣是皆果有定業在耶噫嘻省之哉以上俱見內七志舊樓鐘南宋故物聲聞數十里成化間鎮海燬鎮守麥秀取入城嘉靖三十七年樓復燬鐘鎔坐地人言宋鑄時所施簪珥不計以有金銀故聲宏遠清亮謂其中銀可居半官命取煎一金不得又嘉靖三十四年七月島夷猖獗軍門命取廢寺敗鐘鑄佛郎機麾下乘勢脅取及上竺僧衆訴於雲間潘伯恩白而止之乳竇峯下有多福寺與上竺一澗之隔耳廢於嘉靖末年至隆萬間柱礎猶存蔭聽泉弔以詩曰水弄潺湲繞梵宮玉音飛去已成空門前翠輦無人問屋上青山舊日同芳草有情還自碧野花無恙為誰紅不堪消歇悲前事萬壑寒濤獨夜風遺臭僧采新方者三人號為石灰布袋言其著處有迹也古菴山人曰以石之確從火之潔既清且白矣而受此口玷寃哉僧亦號古春者北人牛都督供於墳菴穢行且待其徒甚薄夜約青州兵劫之以末香焚其臍而死寺僧圓周狼心返俗廢其祖墳穴路徑使穢踐書為梟逆窮餓而死此為華報蕭山李金庭名東瀛杭有數鄉紳皆其故人藉其勢流寓上天竺凡事必至為處分壽文號軸挽詩皆出其手當修上竺志則以時文之學勦竊禪文詩才庸腐以學究本色造家譜手段偽撰皮日休李綱碑文及嶽武穆宋元諸賢之作至太祖撰竺隱之文因本寺失之而亦偽撰一篇蓋事不考古筆不秉直徇情逐意造幻誣靈欺人而至欺心欺天而至欺君遂使所載真贋混淆玉石難別不疑而疑按佛書大妄語成墮無間獄又今律偽傳聖旨當置何地可歎哉以上並載邵古菴七識寺僧戴範嘉善人有勇力善拳法目無三尺燬破五戒淫暴酗賭致纍房業回祿一光敗壞法門毆辱長上合寺不容崇禎間伊祖及合寺公舉告憲批府郡侯法究驅逐下山種種惡款具載伊祖稟揭附卷今蓄髮歸俗
