body:
  text: 天目山三學學人廣賓纂道場規製品側聞臺起中天冠翠微於太乙經來東漢倡白馬於雍西名襲鴻臚製追鹿苑粵惟我東吳之有塔寺也康僧舍利兼營金粟於鹽官慧理伽藍乍指鷲頭於印度是以金甎側布紺瓦驚飛倣天宮之殿最吉祥云摹華藏之門不思議者逮夫此上竺之奐輪也較其時後五百餘年仍其額別下中上寺錢國王闢最初經院宋天子尊第一教山乃如千柱浮幢構白雲為堂奧三門表剎跨滄海為階渠然不免成住壞空而相互駭胡騎之南侵特不難士農工賈以作興鳩檀輪之外施是致隨墮隨樹載故載新闌楯羅網重重紆界道金繩樓閣軒窗隱隱駐垂空寶蓋得非僧海洛伽之島而人寰帝釋之宮哉詩云如翬斯飛君子攸躋此之謂也志規製名考按內七識曰天竺國有五號五印度今下竺古名天竺乃東晉西僧惠理所開今上竺開山在石晉時而列名在錢王時中竺坐中印峯下為中天竺唐時已有此名見唐詩而東南西北未明或謂宋時以南山演福寺為南天竺以北山靈峯寺為北天竺以吳山劉寺為東天竺以西方為尊而三竺同謂之西天竺華嚴論云觀音菩薩表位西方以西乃秋殺之地於殺處行慈救苦故名觀世音也又云晉以前山中皆道教慧理名飛來峯人心翕然從之道翊奉奇木為觀音人心翕然歸之飛來若缺此名天竺若少此佛必有此名此佛而後山川定皆自然莫知所以然而然所謂大因緣也天也二僧雖名僧不逢因緣安得流通崇信惟佛法之大他法不能加大法正當入此土杭地正有緣感人心正當皈依佛法二僧又名僧逢此大願所以萬世尊崇夫豈偶然哉因革按宋潛說友咸淳臨安府志曰上天竺靈感觀音寺後晉天福四年僧道翊結廬山中夜有神光就視得奇木命孔仁謙刻觀音像會僧從勳自洛陽來持古佛舍利至因納之頂間妙相具足錢忠懿王夢白衣人求治其居因感寤乃即其地創佛廬號天竺看經院咸平初郡守張去華以旱迎大士至梵天寺致禱即日雨自是遇水旱必謁焉天聖中僧詵夢像浮空而行出小山曰吾欲憩此明日僧寂至語夢協乃謀徙今處乳竇峯矗其前白雲獅子中印諸峯左右環繞嘉祐末守沈禮部文通謂天竺起於司馬晉時踰七百載而觀音發跡西峯甫及百年遂分為二所謂上天竺也大士以聲音為佛事非禪那所居即謝去住持智月以辨才法師元淨為其主仍請於朝以教易禪此名靈感觀音院時曾公亮為相時實獎其事既而蔡端明襄出守曾公以錢十萬為扁委蔡公為書之蓋曾公慶歷間道杭同行僧元達至天竺瞻禮中途見衣素婦人謂達曰上人同曾舍人來耶舍人五十七入中書語訖無所見已而如其言事載於石刻元淨乃益鑿山闢地增廣殿宇曾公又以經五千二百三十卷遺元淨即西廡為藏熙寧中詔歲度僧一朝廷每遣中使謁者致香幣歲給大農錢作佛事而公卿貴人致帛祈禱者旁午於道紹聖二年郡守陳軒請於朝詔以一路祠廟施利繕修精舍靖康初郡迎大士禱雨於法惠寺屬有狄難道元祕大士像於井賊退瓦礫中忽鏗然有聲始知井所在得聖像歸之院紹興五年高宗皇帝嘗臨幸孝宗初即位以久雨降香致禱即日霽上喜甚賜內府寶玉三品明年御製大士贊乾道三年翠華一再臨幸殿及門扁咸御書改院為寺又賜金幣為十六觀堂法輪寶藏仍命皇太子大書二扁理宗皇帝賜大士應夢畫像書心經其上仍賜御製贊及殿記又嘗書唐太宗所製聖教序及白玉爐以賜如應真閣超諸有海廣大靈感觀音教寺廣大靈感觀音寶殿諸扁已上並貯於雲漢之閣景定二年平章魏公施田二千畝作佛供自為記又夏時正成化杭州府志曰元季燬重建皇明成化丙申鎮守太監重建鐘樓修山門殿廡一新又陳善萬歷府志曰治平中元淨益鑿前山闢地二十有五尋殿加重簷乾道三年門扁皆御書慶元三年改天台教寺自宋咸平至今仁和錢唐每有旱熯淫潦所司恆即山中或迎致大士像入城祈禱無不響應建置廣大靈感觀世音菩薩殿宋元舊制不復詳考按寺志洪武十五年僧録左善世弘道上疏云臣前住上天竺寺殿宇自經兵燹無存乞賜重建上出御幣三千金遣中使陶磚瓦於姑蘇命杭州前右二衛軍士撤操二月搬運磚瓦木植入山鼎建鴛鴦殿廣五楹袤十二楹誠異數也歲久頽敝嘉靖三十六年雲間僧海澄暨住持清蕙協力繕葺澄卒平淨繼之以竣淨復以殿之磚砌壆闕易以巨甓甃之丹堊煥然萬歷二十五年住持道福如淵重新前半殿至三十九年住持明機復新後半殿逾七載緒猶未就機歿繼以寺衆海堅諸香萬靈海瑞如汀世高性恩萬富興美祖玉圓逸真宰如澄如湘輩各醵衣資協同首事航海采木者為海堅萬靈照本逮四十六年落成之高七丈八尺深七十步橫闊三十四步柱礎六十有二地磚自二十七年準十香火分均輸泉役以竣厥事崇禎年間住持照本捐資易以王磚八十有一殿額初吳越忠懿王書曰天竺看經院宋治平中郡守蔡襄書曰靈感觀音之殿燬紹興中高宗御書之如舊稱慶元中孝宗賜改院為寺曰上竺天台教寺逮理宗又御書其額浙江學政吳江趙寬撰重修上天竺靈感觀音寺記曰佛生於天竺西域之國以虛無為宗以慈悲不殺為教妙明玄寂弘濟萬品而觀世音如來從三慧門入道以聲音為佛事始於聞而能無所聞始於無所聞而能無所不聞所謂大圓覺義大解脫力天下千萬世流俗所共信向者也杭州西湖西北諸山曰天竺者蓋襲西域之名世傳五代石晉時觀音大士示現有瑞木放光之異寺因以建嶺岫岧嶤林谷回合琳宮梵宇參差起伏於其間隱若鷲峯鹿苑誠東南絶勝處也中間起而復毁剝而隨復者屢矣大明弘治中內府司監麥公奉命鎮於兹興四民之利奠百神之居嚴兵衛繕城隍通津梁綱維賁飾以輔太平之治燦然明備又以其餘暇從事於名山勝境將以宣神聖之靈聳瞻望於遐邇宏象教而尊法寶祝帝釐而資民福也謂上天竺實惟五山之首創於前者既極宏遠之規嗣其後者宜加維持之力捐資搆材百役並興抉疏葺裁增其式廓會有中使奉詔來者宣賜白金二十鎰充繕修之費於是宮殿樓閣外內上下廣大雄偉之勢妙麗莊嚴之相豁然而天日開絢然而雲霞舒巋然而山嶽峙農工士庶遊矚瞻禮目奪神惕眴轉愕眩住僧祖芳道潛沐聖明之殊渥承大乘之嘉惠謂不可無以垂永久述其梗概來請記寬惟天下之物廢興新故之相尋蓋理勢之常凡囿於形者莫得而逃焉不有以整頓而植立之則廢者終於廢而不可為興者亦將日趨於廢而莫之救有志於世道者不如是也是故古之明哲先事而為之備患未至而預防之兹山之新雖非時政所以緩急然上而聖天子致治保邦之鴻圖下而鎮臣憂深思遠之至意因是可以推見其一二矣林泉之勝古蹟之潤色亦加之意況民用乎方外之術亦所不棄況吾道乎雖然時有所待數有所會或契闊而不逢或輻輳而並集蓋有非人力之所能為者然裁成之功運用之妙非人則亦莫之能為也兹山遭遇聖世時數相符天人交通寥寥於昔者一旦赫然於今豈偶然之故哉意者大士在天之靈有默而相之者乎審如是大士之能庇吾民也昭矣南京大理寺卿仁和夏時正上天竺修造記曰欽差鎮守浙江司設監太監李公義忠勤篤厚允為聖天子心膂親信之臣惟聖天子心在黎元視遠伊邇故用輟公侍從朝夕而寄之以監督藩維之重公忠勤奉國篤厚臨民一飯不敢忘君一念一慮恆在民乃成化丁酉夏兩月不雨至於杪秋魃愈肆虐良農告災歲事惟愆公援文檄遍走羣舉而神罔時鑒旱勢益蒸然不可遏也公乃進藩臬問之進諸郡邑問之進諸耆艾問之進諸國人問之皆曰郡城西有觀音大士大慈大悲至靈至感像居佛國山中寺曰上天竺郡有旱乾水溢疾疚患難咸走集祈焉惟恪誠則其應如響前代已然匪今日者公曰盍從事焉即屏諸煩穢齊心潔行三日而走大士前為民請命意勤辭懇冥漠潛通旋軫之際陰雲布興甘雨加霔槁者聿蘇仆者旋起遠邇交忭三農謳於野商賈謠於市官府文於詞士林聲於頌公則退然不有而曰大士力也乃用禮致住持釋霑師而告以臆前吾有事大士顧大士殿天王殿棟甍榱桷傾欹不特金碧青紅漫漶不飾寶藏有亭頽圮就盡鐘樓巋然於其左而於右則鼓樓斯闕此皆不可不為之意也吾將以是昭答大士之貺法財自我而捐法喜由汝發願否則我亦何從以奉國臨民何緣以自效於大士乎乃用掄材鳩工擇日肇事材良工僝期月落成又顧所謂普門圓通門者所謂莊嚴供養者則用委重汝霑其悉此心師承順惟謹罄其衣鉢贏資兼以十方檀施以趨赴之無幾何時兩門前闢諸佛菩薩祖師法身端臨儼若香燈幡蓋掩映繚繞萬衆瞻仰益生敬信壬寅夏雨不時山頽石殞墮其舊觀師復以天王殿西琢石甃甓高若干尋袤若干丈念此莫大功德莫大勝緣不有書之文詞則無以傳示不朽乃來請言辭不獲已按石晉天福四年有釋翊者結庵乳竇白雲間一夕有光燦燦旦起視得奇木因命斫為大士像適釋勳者奉佛舍利自洛陽來納諸像之頂中誓言當靈感已而果然他日大士示夢吳越國王為擴其居侈麗遂冠一方因易庵為寺自是顯靈日以動人人心皈依日以無替而寺之名勝位置亦從以崇宋乃標為講教五山第一歷元入我國朝仍之然寺雖乘運廢興不常而大士憫念世間譬之連城夜光函諸寶櫝而祥光外燭曷有祕藏掩抑時哉嘗聞九州之外更有九州渺然莫之倣佛其中物類幽冥奇詭然自今契勘可驗不誣矧大士救世苦惱無量無邊本之大慈大悲為吾郡耳聞目覩者哉惟世之人淺薄隘陋所見曾幾不見恆多而欲以區隅所及以蓋世外無窮井蛙測東海也亦有信於耳目者矣而又眩於福田利益斂而歸之己掊以益其家不暇溥厥施焉惟公之有祈於大士一念信向推而極之奉天永命於億萬斯年臨民而保和勞來以樂生興事公以是感大士以是而應妙矣哉影響之隨形聲然公既不忘大士之貺有以自效而師復承順公意以克有終因果願力顯然暴白有可書者是宜書以垂示後人是為記大悲靈感觀世音後殿廣五楹歲久傾圮成化二十三年太皇太后遣中使齎白金重建木材磚瓦之類皆出於官取土千丈坑峻拓其基爽塏壯麗以為正殿之屏翳也萬歷十二年當湖顧其忠施金祈嗣屬僧平澗重修仍範銅八百斤為角端形置殿外以代香爐門額曰圓通翰林院編修仁和江瀾撰重建觀音後殿記曰西山上天竺大講寺實普門大士觀音如來示現圓通之古道場也寺建於五代晉漢之際至吳越錢忠懿王始拓大之遂聲聞於天下凡邦有病疫雨暘禱之輒應民無不仰寺既據有名勝諸峯環拱雙澗合流傳天台之真印為五峯之首剎由宋暨元高僧輩出微法妙梵振蕩鏗訇而金界紺園寶華綵樹種種奇絶儼乎化成之幻出於人間世也逮入我皇明益增壯麗渙頒藏典金鑰玉函照耀璇霄曠古所無一時畢萃乃成化壬午皇上爰遣使臣出內帑白金以為兹寺營修之助適後殿傾圮金碧剝落今欽差鎮守太監張公議將重建以圖維新首捐祿資仰副上意仍辨其寺之地田湮占於齊民者凡千四百有奇悉收其租以贍公役於是斫石於山斬木於林陶茨墁堊山積河匯雲滃雨至未期歲而告成雕檐碧瓦寶珠纓絡曇花晝垂海潮夜湧觀之者敬而生信願施毫末希布福田以廣利益又建伽藍祖師二殿翼其左右較之舊制不啻什伯住山僧洪智承命領事喜夤善緣礱石刻辭欲告將來求豫為記夫大士有弘誓之願神通之力甘露法雨霈乎羣有其所以顯應諸方者唯杭之上竺為最歷年滋久靈貺愈多庇國康民攘菑簡福自朝廷以至黎庶崇事罔愆是以天子發內帑貴臣施祿資興墜舉廢不日而成何其盛哉雖然天人一理無二致也大士陰翊乎皇圖皇上加惠乎大士而親貴守臣又能克體上命茂厥駿功無非將以惠鮮乎斯民欲以措諸方仁壽之域而已揆其乃心何可殊塗論耶文以記之弘治三年歲次庚戌春三月既望住山洪智立石四大天王殿廣三楹高五丈九尺闊九丈深六丈六尺正德間住持祖芳重建嘉靖中住持歸定再葺萬歷庚子住持玉遠鳩勤舊等倡施甃地磚階石住持圓徑募彩繪之梁標額曰上天竺大講寺前代書無欵識北面額曰如來真境大方伯錫山龔勉書真見如來王問書護法韋陀天殿廣三楹古基地三分內有樓屋二間久廢萬歷己未僧心印暨合山贖地重建於靈感正殿左南向山陰翰林周鳳翔題額吏部稽勳司員外郎錢唐虞淳熙撰碑曰上天竺沙門一如法師撰法數敘韋天將軍曰神姓韋諱琨為四王三十二將之首修童真不受天欲凡建伽藍皆設像崇敬彰護法之功度如師時嘗有彰功之殿擎杵之像而畏頭破七分者任十分破壞久矣夫受人欲似天欲也豫與心印冥資護法之力護護法者創殿殿左同日升梁矣或撓之神忽馮人從階下逆翻階上如墮石之升衆駭梁升焉後有以他事誣印印呼神僅滅耳而免碎首固華報哉夫神以其童真望人之童真凡魔男魔女惑亂比丘悽惶奔赴應機除翦如勝國楊璉真伽發豔姬墓擬汙陳人德藏真諦抽神杵起擊其黨百人頭破鷹撇虎騰炬滅鋤段楊抱首潰走而近有猥梵嫂之徒豫令誓淨慈韋天前曰如所否者七日舌爛乃竟如誓彼恣淫樂者何知神之悽惶一旦奔赴則其機甚捷必翦必除真可畏也今竺僧幸聽余言不奪泉寶能推此類且無屋藏嬌然毋倚神之忘瑕神實有不忍忘者知悽惶難動其心除翦必碎其首謂無天於上乎諸天戴殿而行毁殿奚益惟是披戒鎧敵寶杵若一如法師輩神立變悽惶為歡喜奉以銖衣瑤漿仙厨女寶諸師不受也心印輩不受天欲不令天憂常喜界極樂界於斯證焉不然者豫及韋天涕泣而隨之庶幾感悟離此岸登彼岸猶從階下翻階上也殿其津梁哉護法伽藍神殿廣三楹闊六丈六尺深五丈二尺在靈感正殿左西向萬歷二十年住持道霑重建至庚子年寺僧海堅再修歷代祖師殿廣三楹在正殿右東向崇禎丙寅住持照珍重建大毗盧遮那佛殿廣輪二丈五尺純甓砌成不需材木高三丈餘在白雲堂北萬歷乙卯年住持圓徑募織造司禮監劉成倡施重建阿彌陀佛殿廣三楹在普門外路南面北萬歷二十年住持道霑募建崇禎中燬香山大士殿廣三楹在圓通門外衢北戶南萬歷甲寅寺僧道福創建郡人楊應時題額明左方伯劉汝康撰記曰武林天竺香山殿者觀音大士示現之別境也不佞家故東魯凡殊方神怪之事故不敢語於其為書亦不之厭間嘗搜及山海河圖龍伯諸帙及天地四方之陲各有金剛敢死之士身重每兼吾土五千萬人又有人復倍乎千腹圍千五百里其名曰聖曰先曰仁曰信曰無不達其說固自駭乎庸聽矣後閲楞嚴所談普門觀音大士能以三十二應入諸國土其中或見一首二首乃至八萬四千爍迦羅首其臂目之現亦然然未知所以為現者歲癸丑不佞官浙藩身涖天竺觀大士異光之像并讀先守杭東坡居士禪喜所載大悲閣記乃知觀音大慈端不間乎當人之仁聞其所謂手之與眼又何外乎提拔昭明之用哉蓋吾心吾身本來廣大而人自障之果能脫情塵則如來法界身雲當處圓遍凡諸世間神鬼之為技非吾身毛孔之所宅肢節之屈信已乎兹香山之殿郡抑陳太僕嘗囑寺僧道福捐己業以建置比昔道翊所創莊嚴倍勝非普門示化無遮之旨得爾爾耶余同榜虞司勳嘗印道福之成功而訶護既久是歲又屬不佞為記以垂永因係之銘曰天竺之號肇自西乾香山為殿大士兼焉化跡之妙超乎言先如聲之谷如月之川大悲為記東坡宛然斯文之作空花相鮮賴有檀越劫石是傳敕賜藏經殿自皇祐七年宋仁宗賜祕典五千三百三十卷為教藏特殿藏之乾道八年二月孝宗賜錢重建藏殿東宮書額曰法輪寶藏淳熙元年賜福州印造藏經五百函宋季殿燬元洎國初亦無考至正統十年二月英宗睿皇帝賜本山北藏五千四十八卷全欽賜敕諭一道用硃龕二奉置於靈感正殿之左右天啓甲子住持興美整飾繕補於崇禎庚午以四廚遷貯於兩峯堂閣上白雲堂在大悲後殿之後坐白雲峯故名莫考厥初至辨才法師更建高宗臨幸進素饌白雲堂孝宗賜僧録若訥白雲堂印以轄禪教律三宗寶祐元年徑山住持心月乞分宗各保舉師本山住持法照奏曰宗宗黨黨非古也恐違孝皇賜印之意未敢承命乞回避理宗即有旨云古法難易預與釐正矣禪教律從僧録公舉朝省劄白雲堂仍舊八月詔闢白雲堂基址景定二年賜住持妙銛御書白雲二大字咸淳元年度宗以法堂繪事方新詔揭先帝御書白雲堂扁額自爾歷元逮國朝鼎革相尋嘉靖間住持圓俊重建副使李景萃重書堂額萬歷十一年燬乙卯年住持圓徑募織造司禮監劉成倡施復興廣五楹規模如舊堂背甃磚為毗盧殿兩峯堂在白雲堂後前與雙檜乳竇峯相參故名紹興二年圓通如法師建紹熙五年丞相京鏜書兩峯堂扁國朝成化間燬嘉靖四十一年寺衆為郡倅雷公柏山建遺愛堂即兩峯故址也翰林諸大綬有記萬歷間燬至崇禎己巳秋住持寂纓照珍照本續元同前住持興美募建五楹易堂為閣今稱為藏經閣深四十尺高三十二尺閣上奉安欽賜經律論藏四龕下設禪單以為閲藏者宴息進士李陳玉有記翰林院修撰山陰諸大綬撰柏山雷侯遺愛碑曰柏山雷侯之倅青州也奉朝命以青州兵來保浙分屯於杭西湖之諸寺兵有紀三千唯一心皆如賓旅無暴客犯吾民者雖僧居亦秋毫無犯也民德之乃諸寺僧倍德之晨夕焚香作禮佛前祝侯願報侯德比旋師請留像侯不可請留衣履又不可則別為堂設位將永崇奉疏詳惠跡礱石於山待史氏紀之壬戌中秋余將北上視舟武林乘暇遊湖山過靈隱經集慶至三竺上剎僧顯懷迎告余曰歲在己未梵宇為行營微雷侯等幾毁矣我僧衆何託而居乎侯不鄙夷方外保僧衆如保民今日山門不改方丈之地猶能爇爐烹茗以迎太史公之車轍者侯之賜也因稽首乞余言時侯同守杭郡余笑而自思僧耳何喁喁焉頌德於使君歸數月聞侯微疾才就寢遽起沐浴更衣端坐而逝余悼惜且驚異及抵杭再至湖僧方向侯位泣奠見余請甚懇余愾然歎曰有是哉德愛之遺乎不可泯矣侯性敏慧恭而溫溫倅吳越分職平政政乃平越人稱雷侯平嘗視篆上虞上虞士大夫紀其行事有善政録前秋官郎龍川徐君秉高節素慎許可録中所敘述者最詳是時島夷寇兩浙郡縣侯受知梅林胡公奉檄往來省府練士卒守城池出籌畫以佐主帥乙卯杭圍之解侯有力焉其提師自齊南征道經淮揚淮揚寇熾甚巡撫李公克齊留侯之兵協勦侯親臨陳戰姚家蕩戰廟灣皆大捷斬首數千級焚溺死者無算廟議行有超格之擢寇退始至杭郡在杭兵戢而民安所濟者多於戰功逮為同守連署屬縣政善而平一如倅吳越時也嗟乎古所謂文以附衆武以威敵者非其人與恨未究厥施耳佛氏之教了無受想漠然人世僧乃用情於侯其愛其慕猶夫民者保性而止其所應無所住而生其心懷思崇奉固其宜矣名將之略循吏之風起於慈悲一念侯像在堂與寺並存遺之無斁碑宜有文侯名鳴陽字時豫貴州永寧衛人吉州李陳玉撰上天竺寺藏經閣記曰如來以三藏妙性乘大悲智為無所藏復以無所藏智說無所說流而為藏無所藏故無密不顯有所藏故無顯不密其為目曰經曰律曰論而其為指也不過聖凡同體曰空曰不空曰空不空三者而已是故人有寶藏物無盡理四十九年五千餘部真巨海之一滴而太虛之微毛匪凡夫不能窮如來實如來不能窮凡夫者也然而高曾規矩人天鉗錘先天地生尚有青牛之訪處周秦後方來白馬之迎華嚴分龍宮之一部首楞血波刺之全軀聞法如此其難護法抑何其易則大藏所有法寶攸繫故非殊智絶力鮮能辦焉武林天竺蓋南國之佛域也開山於石晉時僧道翊者獲奇木肖大士像遠近響應宗風代振至宋辨才主之始以教易禪寺故有藏中更興廢遂未有閣蓋教之敝也久矣有僧寂纓照珍照本興美續元慨然念復嗟貝葉之委地念寶氣之燭天而毗陵董公以大乘器應宰官身來長浙藩顧盼生歎捐退食之俸餘作如來之一粒因以庀材鳩工之責付諸僧等於是上為重閣以安諸部下為奧室以安禪誦上焉肅肅下焉雍雍上為兜率為娑竭宮下為鷲嶺為衆香國誦者便於披閲禪者便於靜觀誦者入波斯國片片夜光是見佛佛各具一藏也禪者入一真地大地黃金是又人人各具一藏也即兹為教即兹為禪不必易也噫吾以是而知公之用意深功德遠矣豫以春官之役道出武林閲湖山者兩月遊屐所至荒址茆堂無非公之芟除莊嚴殆西湖之穀玉而南國之金湯也乎愧不敏不足以讚歎萬一僧等將公之意樂公之功故為述夫藏之所由來并志夫閣之所由始使知佛法難興功德希有當勤守先律丕振宗風各自護其室藏以無負公之意耳將見乳竇盡呈醍醐獅子遍為哮吼東澗西澗之水萬派歸宗南山北山之雲四天共布矣是則公之意乎公名承詔字聖臣丁未進士護國金光明懺堂皇祐年間始建紹興三年六月高宗詔正殿前為懺堂又前為香華筵尋燬又復今併遺址無基或云基在正殿西偏十六觀堂乾道三年二月孝宗賜金帛倡建上命皇太子書額曰觀空淨域既燬開禧二年七月二十二日寧宗賜錢重建仍摹光宗舊書扁額尚書內翰樓鑰撰記嘉定元年天目山人文禮述觀堂舊記并書寶祐元年三月理宗賜牒及米重葺觀堂在白雲峯麓由正殿西北隅拾級而升今為子院宋翰林樓鑰撰上天竺講寺十六觀堂記曰嘉定改元歲在戊辰四月乙巳被命禱雨於上天竺山住持左右街僧録妙圭有請曰公頃年直學士院時許以修造記既而去國遂求於內相洪公而公今既再入朝而寺之十六觀堂崇成願求記文以踐前言豫何辭豫四明人也城中延慶教院為東南最勝處嘗讀諫議忠肅陳公所為淨土院記云元豐中比丘介然修西方淨土之法不卧三年謂其同行曰我等各據一室成此勝緣來者加衆而室不增多寺之西隅尚有隙地得檀施錢二千餘萬為室六十餘間中間室閣立丈六彌陀之身夾以觀音勢至環為十有六室室各兩間外列三聖之像內為禪觀之所殿臨池水水生蓮花不離塵染之中豁開世境之外自是更七寒暑無一不如其志初介然燃手二指誓必成此元符三年三月落成之日復燃三指以增淨誓於是見聞歡喜靜習之士無有虛位期滿者去發志者來依勝境而獲善利者不知其幾何人也了翁洞明教觀其序大略如此抑聞介然願心深切當時一木一石微至磚甓皆以大悲咒歷歷咒之而手授匠者建炎虜燬城郭焚蕩獨所為淨土院者至今堅緻如故間一至其處幾於未施敬於民而民敬者上天竺山觀音大士功德殊勝四民所欽孝宗皇帝留心內典乾道三年二月駕幸此山修供大士賜緡錢二萬俾建此室遂寫延慶規模以為之嚴淨精妙過者必肅又嘗命建於禁中退朝餘暇多燕坐其上或引禪律高僧設齊講道非人間所可及也光宗皇帝時在潛邸奉旨書額自此四方修梵行者接迹其中然物必興廢不離乎數開禧二年七月二十六日燈灺為災悉已煨燼圭公竭力營建成於期年又過於舊金碧輝映稱其所謂淨土之說得旨再摹光宗御書揭之山去都城最遠幽邃秀潤固已素離塵染況又為此淨處坐進此道者可不勉乎豫去已告老不謂復為此來圭公住山十有七年建立勝事乃作復庵於山之南為歸老計道俗歸向日領三數百衆修進不倦纍朝眷遇至今不衰豫非久於此者將復尋延慶之遊又不能如了翁推明九品十倫之旨特以圭公請之殷為書其實以遺之法堂隆興二年九月高宗詔知臨安府事曹澄督建法堂咸淳元年九月理宗幸寺時法堂繪事方新詔揭光宗御書白雲堂扁額知省揚端朝承準今廢講堂舊有之淳祐十年九月丁亥理宗詔闢講堂今廢水陸堂在殿左紹定二年理宗詔建郡寺淨勝句當尋燬寶祐元年九月仍命建堂以為修齊之所擬斫後山大楓樹為梁僉曰神物所依枝葉莫敢攀況斫乎是日有風自南仆於北隴若神助然今廢靜處堂淳祐九年三月住持法照建今廢中印堂載武林舊事寺志遺今增入莫考其地香積堂即齊堂延賓堂即客堂頤耄堂即老堂延行堂即病堂東堂西堂廚堂庫堂並廢禪堂即古天仙樓秋香閣基也萬歷庚子歲寺僧明遠合衆請觀如法師接待雲水至萬歷九年住持興美寂嘉如貿屢興屢葺拓充宴寢兩所兩廂堪居千指觀師普心苦行乘戒俱急弘經開律衆每盈千注有法華正旨行世雲漢閣隆興元年八月住持應如建閣奉安歷賜御書宸翰孝宗親灑奎文曰轉大法輪又曰雲漢之閣二扁以賜之景定二年住持祖印重建宋季燬今廢千佛閣紹熙五年二月甲寅住持妙圭建提刑趙時逢撰記今廢應真閣即羅漢閣在伽藍殿後紹熙二年住持應如建隆興二年九月孝宗詔臨安府尹曹澄又督建五百羅漢閣淳祐五年九月住持法照重新之理宗御書超諸有海四大字以賜為額今廢準提閣在普門外寺僧續元建自崇禎年中秋香閣與延桂秋芳為叢淳祐九年三月住持法照重建洎元並燬至正十二年住持古愚重建逮萬歷中廢今為禪堂秋芳閣在祖師殿後紹興二十三年住持圓智建今廢延桂閣與秋芳對古有叢桂可數圍紹熙年中住持妙圭建後廢崇禎元年寺僧寂芳重建延桂閣為精修淨業之所伴雲閣在白雲左偏淳祐三年住持法照建為寢息之所
