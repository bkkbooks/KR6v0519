body:
  text: 天目山三學學人廣賓纂清規天台大師立制法曰夫新衣無孔不可補之以縷宿植淳善不可加之以罰吾初在浮度中處金陵前入天台諸來法徒各習道業尚不須軟語勸進況立制肅之後入天台觀乎晚學如新猿馬若不控鎖日甚月增為成就故失二治一蒲鞭示恥非欲苦之今訓諸學者略示十條應須增損眾共裁之第一夫根性不同或獨行得道或依眾解脫若依眾者當修三行一依堂坐禪二別場懺悔三知僧事此三行人三衣六物道具具足隨有一行則可容受若衣物有闕都無一行則不同止第二依堂之僧本以四時坐禪六時禮佛此為恆務禪禮十時一不可闕其別行僧行法竟三日外即應依眾十時若禮佛不及一時罰三禮對眾懺若全失一時罰十禮對眾懺若全失六時罰一次維那四時坐禪亦如是除疾礙先白知事則不罰第三六時禮佛大僧應被入眾衣衣無鱗隴若縵衣悉不得三下早集敷坐執香爐胡跪未唱誦不得誦未隨意不散語話叩頭彈指頓曳屣履起伏絫差悉罰十禮對眾懺第四別行之意以在眾為緩故精進勤修四種三昧而假託道場不稱別行之意檢校得實罰一次維那第五其知事之僧本為安立利益反作損耗割眾潤己自任恩情若非理侵一毫雖是眾用而不開白檢校得實不同止第六其二時食者若身無病病不頓臥病已差皆須出堂不得請食入眾食器聽用鐵瓦薰油二器甌椀匙筯悉不得以骨角竹木瓢染皮蚌悉不得上堂又不得撐觸己鉢吸啜等聲含食語話自為求索私將醬菜眾中獨噉犯者罰三禮對眾懺第七其大僧小戒近行遠行寺內寺外悉不得盜噉魚肉辛酒非時而食察得實不同止除病危篤瞻病用醫語出寺外投治則不罰第八僧名和合柔忍故和義讓故合不得諍計高聲醜言動色兩競者各罰三十拜對眾懺不應對者不罰身手互相加者不問輕重皆不同止不動手者不罰第九若犯重者依律治若橫相誣被誣者不罰作誣者不同止若學未入眾時過眾主不受學眾未攝故彼自言比丘故入眾來犯重誣他者治罰如前第十依經立方見病處藥非於方吐於藥有何益乎若上來九制聽懺者屢懺無慚愧不能自新此是吐藥之人宜令出眾若能改革後亦聽還若犯諸制捍不肻懺此是非方之人不從眾網則不同止祝聖每月朔望住持領眾焚修維那舉首祝贊云大圓滿覺應迹西乾心包太虛量周沙界仰冀洪慈俯彰洞鑒月朔望之辰謹集臣僧恭趨寶殿持諷祕章稱揚聖號所萃洪因端為祝延今上皇帝聖躬萬安皇后齊年太子千秋文武官班同增祿算伏願堯風蕩蕩舜日巍巍八方歌有道之君四海樂無為之化修懺每歲正月初一日至初二日合寺僧眾頂禮金光明懺三日上祝聖帝明王慈臨無際羣臣眷屬常享尊榮兆姓四民永安富樂佛法檀越父母師生平等熏修普皆利益具載懺文浴佛四月初八日祝云現天人相充滿太虛深遠雷音遍周法界巍巍乎高等須彌晃晃乎明於日月降生有疏伏希采聽大明國浙江杭州府僧綱司上天竺大講寺末裔住持某眾比丘某等四月初八日恭遇本師釋迦如來降生之辰謹備香齋專伸恭養諷演經文稱揚聖號所集功德用酬慈陰伏以千聖嗣興莫不由實道而成正覺一法可讚所謂以慈心而遊世間既膺人壽百歲之時遂補賢刼四佛之處取萬二千國中央之地示三十二相劣應之身固敢為天於先而自稱人中勝豈羨繼天之貴蓋昭惟佛之尊應迹如存仰明星而猶悟化儀雖往想白虹而尚騰適奉賜影之辰少效惟馨之薦奉匜香水爰浴金軀集兹有作之熏仰報難思之德本師釋迦如來大和尚伏願彌隆至化闡宗風復振皇風未喪斯文寢邪法流通正法罄有相證諸相非相之實相統含生悟無生受生之真生等未來時如出興日授戒第一求師授法第二策道勸信第三請聖證明第四授三皈依第五召請聖師第六白佛乞戒第七懺悔罪愆第八問無遮蓋第九羯磨授戒第十略說戒相第十一發弘誓願第十二結撮回向羯磨每月朔望先一日住持領眾上殿依授戒次第設席趺坐各令首過鋪花鮮委以驗淨穢具載教院清規念佛每年二月十五日啟建道場供養三寶祝延帝壽且福利軍民其建會之法勸請會首二百一十人各募四十八人逐人請念佛懺願曆子一道每日念佛名一千聲懺障道重罪發菩提願為度眾生取於淨土請畫佛於曆子上至建會日頂齎曆子并備淨財四十八文到寺攢錄上疏至日表宣或入社弟子傾逝者請勸首繼將姓名并其人曆子到寺相報即當告示在社九百九十人各念佛一千聲為彼懺罪資其願行令生淨土又至建會日令社眾念佛薦其往生仍請勸首速募人填補所冀常結萬人同修淨業者都勸緣住持傳天台教觀沙門知禮展鉢偈云若展鉢時當願眾生信心清淨除諸粗暴供齋偈云此齋色香味上供十方佛中奉諸賢聖下及六道品等施無差別惟願皆飽滿令今施者得無量波羅密受食偈云若受食時當願眾生禪悅為食法喜充滿釋迦如來二月望日涅槃疏曰鷲嶽膺期顯一乘而極唱鶴林顧命指三德以歸真自高山先照示以出興至峻嶺餘輝云當入寂知唱生而唱滅恆常不變法性本然見令始而令終會必有離世相如是醫師背喪賈客他行花柳無私俄遊逢於遠日蘋蘩可薦罔敢墜於遺風式表芹誠仰祈藻鑑伏願分身俯降護身使佩於靈符慧命長存贖命見頒於重寶庶令後裔克紹先宗智者大師十一月廿四日示寂疏云古塔開扉半座平分風月靈山在目三周俱付筌蹄摧我慢自高之幢示吾今親證之地陳隋應運蠻貊歸誠小根小莖每望洋而歎大枝大葉皆拔茅連茹而征眾丘統司命遜其高寒諸子駕安車鞭其觳觫斯民以來未有愈高泰山北斗之具贍此舟過後更無益重浮木盲龜之難值玄珠匿彩智鑑沈光象武絕塵於何有鄭聲將亂於侏離允賴正音洗空邪說謬記刻舟之蹟輒營諱日之齋擷芳於沼沚之毛式資明信展敬於涓埃之效用答洪休伏願法空寶覺智者大禪師有伴即來招手勿忘於金地如月初上分身豈間於橫流再振玄猷庶昌厥後示眾佛光照法師示小師正吾曰為人難為人師不易難者何曰天資曰學問曰識見曰氣象無天資無學問無識見無氣象若是而能為人者未之有也有天資而後有學問有學問而後有識見有識見而後有氣象若是能為人未也是何也天資不高學問不博識見不明氣象不雅猶之不能也不高則庸不博則窒不明則回不雅則野高而智博而達明而正雅而文四者備能為人矣而欲為人師者未之可也曷為不易曰宗旨曰教義曰法相不得乎宗旨不通乎法相不辨乎教義猶之不可也能提宗旨矣能析教義矣能解法相矣不有師承不明境觀而能與人為師者未之有也師承正境觀明而不超悟洞徹佛意者猶之不能也亦能超悟洞徹矣而不忘境觀絕知見離法愛為大導師者未之有也三者具矣而不知進退得失者猶之不可故曰為人難為人師不易圓法師示學徒曰於戲大法下衰去聖愈遠披緇雖眾謀道尤稀競利名為己能視流通為兒戲遂使法門罕闢教綱將頹實頼後昆克荷斯道汝曹虛心請法潔己依師近期於立身揚名遠冀於革凡成聖發揮象法非子而誰故雖修身踐言慎終如始勤爾學問謹爾行藏避惡友如避虎狼事良朋如事父母奉師盡禮為法忘軀有善毋自矜有過務速改守仁義而確乎不拔處貧賤則樂以忘憂自然與禍斯違與福斯會豈假相形問命諂求榮達之期擇日選時苟免否屯之運此豈沙門之遠識實惟俗子之妄情宜乎見賢思齊當仁不讓慕雪山之求法學善財之尋師名利不足動於懷死生不足憂其慮倘功成而事遂必自邇而陟遐不沽名而名自揚不召眾而眾自至智足以照惑慈足以攝人窮則獨善其身達則兼善天下使真風息而再振慧炬滅而復明可不謂大丈夫焉可謂如來使矣豈得身棲講肆迹列常徒在穢惡則無所間然於行解則不見可畏以至積習成性自滅其身始教慕彼上賢終見淪於下劣如斯之輩誠可悲哉詩云靡不有初鮮克有終斯之謂矣中人以上可不誡歟抑又戒慧分宗大小異學悉自佛心而派出意存法界以同歸既而未曉大猷於是各權所據習經論則以戒學為棄物宗律部則以經論為憑虛習大法者則滅沒小乘聽小乘者則輕毁大法但見人即偏讚遂執之而互相是非豈知佛意常融苟達之而不見彼此應當互相成濟共熟機緣其猶萬派朝宗無非到海百官蒞事咸曰勤王未見護一派而擬塞眾流守一官而欲廢庶績原夫法王之垂化也統攝羣品各有司存小律比禮刑之權大乘類鈞衡之任營福如司於漕輓製撰若掌於王言在國家之百吏咸修類我教之羣宗競演果明此旨豈執異端當須量己才能隨力演布性敏則兼學為善識淺則顓門是宜若然者雖各播風猷而共成慈濟同歸和合之海共坐解脫之牀夫如是則真迷途之指南教門之木鐸也居乎師位諒無慚德趣乎佛果決定不疑汝無矜伐小小見知樹立大大我慢輕侮先覺熒惑後生雖云聽尋未補過咎言或有中汝曹思之一初法師上堂示眾曰天台一家所談修行指歸之處無出止觀一書所謂大乘修行之要門也所以祖師云止觀之道一乘也一乘之道無法不備是如來藏大覺世尊歷刼行滿涉六年而伏見舉一指以降魔始鹿苑中鷲嶺後鶴林至於法付迦葉不出此止觀之道然此止觀前代祖師談之者眾能得止觀之要者十不能一二只如宋圓智法師住上天竺時秦檜問曰止觀一法耶二法耶智曰一法也譬之一水湛然而清者止也可鑑鬚眉者觀也水則一耳以眾生心性有巨昏重散之病用止觀為藥救而治之歸一法界之全體法界寂然名為止寂而常照名為觀止觀明靜之體豈有二耶圓智之說可謂善矣諸人直道止觀畢竟是一法耶二法耶若云二法昏散各途若云一法明靜一致正與麼時如何舉似不得春風花不開花開又被風吹落蔬筍社儀節第一繫心安養會日以侵早取齊序立向佛前燃燈進香眾念香讚即稱禮南無常住十方佛一拜南無常住十方法一拜南無常住十方僧一拜南無過去七佛一拜南無釋迦牟尼佛一拜南無當來彌勒尊佛一拜再進香唱念一心頂禮西方極樂世界本師阿彌陀佛三拜三唱一心頂禮西方極樂世界觀世音菩薩三拜三唱一心頂禮西方極樂世界大勢至菩薩三拜三唱一心頂禮西方極樂世界清淨大海眾菩薩三拜三唱各就席坐念大悲呪心經畢誦阿彌陀經一卷持往生咒千遍讚佛畢念南無阿彌陀佛千聲觀音大勢至眾菩薩各十聲小淨土文回回向齋佛普供養真言宣疏舉前頂禮佛號四拜化紙午飯第二講習大乘就席舉發願文八句即念前會所限大乘經卷一遍即舉經中疑義問難有得開示無疑務要有疑無說必要有說斟酌商量如行過路後遇有省不使茫然良久復再限下會所看經第三游藝翰墨既晡各禪坐或散行或樂所近見偶得相請益或即記此日事或成小詩或弄筆琴棋餅麵取飽為別此會未散於靈山是過去乃幸逢於此土是今生共繫念於西方是未來含三世矣且兼內外學而並進合儒釋教以同科禮不煩而事易舉世外清修莫善於是莫謂浮生短能修尚未晚莫謂來日長修為自己忙有志君子幸共勉之會約七條此會凡一月一集不欲數所限諸經各要平日於家程誦數十遍多更佳所會費不過一人二分若有外友臨期欲入者以米一升銀一分為率佛前相繼止小燭一對天寒用榾柮一爐所會用維香維茗維菜維腐不許精美盤飧是富貴餘途自傷雅道凡允會非有疾兼日道不赴此外雖遠雖冗風寒暑雨願毋自畫嫁言者有罰凡會中時雜話或家事身事心事舉共商量當可不使得罪名教則可或有世事時情必舉廉頑立懦安分自求清慎敬戒之語以相警策不許廣引希求干謁可賤之事非我友也況會中乎為會澹泊有味有情不欲如時酒食充溢不許設滴酒美菜不遵作第一義罰蓋君子草衣木食已自不能無求於世一酒不戒一食不粗則其餘可知非佳士也古菴山子重生述昔廬山遠法師開蓮社以度羣品雷次宗等十八諸賢獨為稱首其間得生淨土者不可勝紀唯淵明陶公一人把之入社而不可得無酒即攢眉去迄今世遠法傾所謂蓮社者亦寥寥無聞矣居士豈淵明後身慨兹敝風因立蔬筍社開建三時接引後學合儒釋教以同科兼世出世而並舉隨時高下夫亦以昔時之不可為今日之可也慈悲亦甚矣性慧薙染也晚何敢望遠公下風唯居士不吝振作之始其社者天竺靜庵遂清二師與焉是歲癸卯之十二月念又五日也釋慧和南初集四眾邵古庵名重生錢塘諸生隱居呼𤠔洞釋覺海名性慧薙染上虞住天竺釋靜庵名真讓度上竺天巖房釋遂清名如汀隸上竺雲隱房後舉都綱第七集益二眾釋潮音名海瑞度上竺長生房釋旨玄名寂嘉度上竺心安房次年益四眾楊又玄名應秀郡城武弁隱居韜光庵江澹如名鏷仁和弟子員後舉孝廉釋靜葵名寂芳度上竺雲隱房吳美子名本泰海寧弟子員今成進士
