body:
  text: 天目山三學學人廣賓纂詩文紀述品書宋蘇軾與辨才法師書曰某向與兒子竺僧名逮於觀音前剃落權寄緇褐去歲明堂恩已奏授承務郎謹與買得度牒一道以贖此子今附趙君齎納取老師意剃度一人仍告於觀音前略祝願過悚息悚息又書某有少微願須至仰煩切料慈照必不見罪某與舍弟某捨絹一百匹奉為先君霸州文安縣主簿纍贈中大夫某先妣武昌郡太君程氏造地藏菩薩一尊及座及侍者二人菩薩身之大小如中人形所費盡以此絹而已若錢少即省鏤刻之工可也乞為指揮選匠便造造成示及專求便船迎取欲京師寺中供養也煩勞神用愧悚不已又書別來思仰日深比日道體何如某幸於鬧中抽頭得此間郡雖未能超然遠引亦退老之漸也思企吳越諸道友及江山之勝不去心或更送老請會稽一次老師必能為此一郡道俗少留山中勿便歸安養不肖更得少接清遊何幸如之千萬保愛錢塘釋永頤號雲泉杭之耆宿也淳祐十年冬十一月聞上竺佛光法師以左藏薛師普占廨院欲作廳佛光勿許輒渡江東歸頤甚高之遺書慰曰公幡然高舉佛祖所謂毋自辱也顧戀乎何有昌黎公所譏語刺刺不能休者當愧死矣皇明蜀王奉僧録司存翁致仕還天竺書曰近日天禧方丈與大蘆長老書一觀知和尚謝事居間豫乃甚喜和尚進退出處之際亦無愧於前修也後生奔競之風可少戢矣若非肉身大士乘悲輪來整宗綱其孰能與於此觀經一卷并祖師語録之類則於法施豈淺淺哉見日軒詩同諸老作序則濬公作賦則和尚作也潭王梓致存翁禪師書曰奉問存翁和尚法几不奉殊勝之談三載於兹嚮注之誠與日俱積疇昔龍河之上獲親几杖深沐開誨得以蕩滌瑕垢銷融塵滓逮今不忘不穀居湘中為況頗適但風壤遐僻禪林蕭索遠近無與語令人憒憒惟師學問宏深筆力滂沛片文隻字足以驚風泣鬼劉牆屈壘殆不敢當敬羡敬羡近搆四暢亭以娛間適性欲煩師作一賦以張大之即為下筆慰此懸想之情至幸至幸春暄加愛不具又書曰梓端肅奉書存翁本師和尚法席使京人回承翰墨法體康健且辱品題四暢文彩豐縟三復敬羡再欲干作沖漠齋記幸勿我靳曹國公想時接談笑望一詩為沖漠之光仍自祕用圖書為圭全室同菴昨罹回祿之恐比想安佳俱求題詠同菴自別來未嘗有片文隻字見及其棄我耶一初講經必能同賦天台聖像望借真一觀即當返璧前託揮掃卷軸付回是幸進首座來隨菴惠詩文并清貺足紉遠情區區僻處遐壤思欲與諸禪伯如曩時清談擬接邈不可得良增慨歎不及一一奉書例望道意伏暑保愛不具梓端肅書存翁大師與雲峯禪師書曰西丘一拜顏色飫我以清供贐我以善言如寢而醒如病而藥使人身輕欲飛如在四禪內苑不知有徒旅之艱劻勷之變也歆羡歆羡厥後從者回霅賤迹亦繼踵僻居日修念佛三昧結淨土緣作清泰歸計耳餘無足為長者道也持誦之隙忽我清容老人下顧首詢和尚動靜均適甚慰洊出教命展誦如對眉宇且論及為教門一行不覺愧浮於面蓋以和尚才學之優德望之重況今當道多其故舊必能與吾清容出隻手以扶斯宗欲墜之緒則像季之士皆承公等之賜而區區山澤稿朽得沾餘潤幸莫大焉至叩至禱惟慈諒不備虞稽勳淳熙與堅遜泉等續成殿事書曰不佞扶疾入山屈十四上人同集雲中五體投地為大士請汔殿功此膝不屈於人久矣敬十四上人發心蓋愆凡佛菩薩而機公悔心自蓋其愆亦佛菩薩之流也承金諾一一書紳一一必求若金口中出直至冬月特書貞珉而後滿此願耳峪口聞村民喧喧競趣天龍則天竺香煙淡幸及時竭力勸募速踐前盟至望至懇倘有一人先私後公暗打退鼓欺護伽藍神而不靈者必借寶杵於當道彼能給示豈不能用法乎況冥冥中更有陰譴在耶謹於家所供佛菩薩前復五體投地以請撫臺思恂喻公與住持初道微書曰前嘉興署中已煩師遠顧並承惠小兒衲衣因恐禪師尚欲浮杯相送故積忱猶未展耳今不意起行倐迫上月草八午刻登舟解纜隨於草九交代即鼓棹而南此別宗風知是何年晤敘小兒將已三月漸知嬉笑惟禪師保重有便寄我一字以慰山林老懷是望外覺溥年又幼稚並囑時時看撫為幸其前所需對聯容方中軍送役京口回時封寄此不既又與住持道微書曰別近四年企慕甚切遙想老師禪定之餘或亦相念第不識佛印東坡何日再得促膝談無上諦也去歲特發兩價詣大士前進香迄今年餘竟未旋里兹二月十九又遇菩薩誕辰敬拜家力虔賚一瓣代賤父子恭叩寶蓮之下伏祈老師焚宣鄙悃為囑至小兒歲已七周神氣壯健知識大開四五月間將入家孰學讀父書矣知老師所欲亟聞敬此附報高徒近日經學大進否及時參禪念佛光陰不可虛度惟老師留神教之若不佞歸田三載眠食尚健恐終老樵漁於峩山錦水間耳老師審時度勢亦有心懸廊廟之身者乎呵呵餘不盡外具薄儀奉賢師徒引意蓋因寇氛未靖道塗多梗不能擕禮物也仲春十二日恂載頓首劄宋僧録若訥法師請試經度僧劄子曰洪惟聖朝遵用唐制立試經度僧之科竊詳大宋高僧傳洪覺範僧寶傳所載自建隆開國至於南渡名德高行皆先策試法華然後得度以由此經是如來出世一化之妙唱羣生之宗趣帙惟七卷繁簡適中故學者誦習無過與不及之患自唐至今五百年來昭垂令典雖下及萬世可舉而行唐世之式遠矣及我朝而甚詳如文瑩湘山録載國初潭州僧童試經此州郡比試也歐陽歸田録載執政宋綬夏竦同試童行此朝廷開試也若僧史略載朱梁時不許私度願出家者入京比試竊詳三書之意當是天下童行先就州郡試中然後入京執政開場親監覆試第名奏上乃下祠部給牒若特詔疏恩如建隆八千僧太平普度十七萬則又不在試經之限或謂有虧國用者則將對之曰但於每歲以千牒為試經之擬即以千牒之資均於餘牒俾不能誦經而裕於財者亦得求度厥全天下僧冗矣試經以行古道貴牒以限常人誠足以復祖宗之成法救末流之冗弊也疏宋丁晉公上竺飯僧疏曰佛隨遍智道育羣生凡欲救於顛危必預祈於景貺某白衣干祿叨冢宰之重權丹陛宣恩忝先皇之優渥補仲山之衮曲盡巧心和傅説之羹難調衆口嘗於安寢忽夢清容妙訓泠泠俾塵心之早悟真機隱隱恨凡劣以何知蓋衆怒羣猜時乖運舛害至禍臨而莫測黨成災及以非常黜向西京感聖慈而寬宥竄於南裔當忠憲以甘心咎實自貽業非他作念一家之散失望萬里以何歸既為負國之臣永絶經邦之術程由湘漢道假靈山正當煩惱之身忽接清涼之衆方知富貴難保始終特思皈命恭發精虔寅施白金爭羞青飯延苾芻之高德答庇佑之深慈冀保此微行乞無他患伏願天回睿眷澤賜下流免置邊陲白日便同於鬼趣賜歸中夏黃泉再感於天恩敢罄丹忱永繄法力宋靈隱書記道濟化天竺大路疏曰一條滑路堂堂直透長安九里松關蕩蕩平超佛國腳跟有礙未免遲疑眼底無私方為平穩斷羊腸曲折之崖履龜背坦夷之路江山聚勝人行翡翠途中車馬交馳身在畫圖影裏請題椽筆為注芳銜明九臯聲法師撰日彰儞法師住持上竺江湖疏曰負天下之重名才可託寄交一國之善士尚論古人傳佛心印豈細事哉修我友盟所深望也某海月辨才之流亞慧光圓悟之重來未嘗對御以談玄彈指喧殿及殆敷文而載道肆筆成書萬流仰海而會同片玉在山而皆潤以雷鳴夏若歲有秋尚期乘白雲而遊帝鄉毋忘見明月而思故國允矣東南之師表再造圓宗隱然教法之長城一匡象運願弘法施副我深期又雲谷臻法師住持上竺江湖疏曰黃河決崑崙而東注水會其源天台兼定慧而雙弘道臻於極自非得一代人才之選何以居中朝師法之尊彼方對己以自私賴此達人而大觀允符物論簡在帝心某道重王臣化行吳越文如圓嶽詞如休己可追配於古人教有辨臻文有璉崇將復見於今日蓋剡源之五世疑南屏之再來攜香煙自天上來歸操玄印據白雲深處蓋十方通為化境會九流同入圓宗梧桐生而鳳凰鳴世其昌矣日月出而爝火息人皆仰之欽動三宗力扶末運國朝宗泐撰日彰儞法師住持上竺諸山山門疏曰宗師負大法之重遁迹非高人才為當世之賢超遷不次雖用舍無關於我而出處故有其時某物外通才法中偉器入慧光室而味甘露洞開真源承五色照以館鴻臚發明奧義與其化行中吳之久孰若位冠五山之雄妙演一乘非藏非通非別互明三觀即空即假即中況竹屋有先人敝廬而白雲乃昔年分座載脂載舝早駕指南之車將翱將翔願接埀雲之翼共扶末運敢不同心又曰翊祖高行絶塵始現普門境界辨才碩德邁衆肇開教海淵源從兹冠冕諸宗仰止風規百世代多作者今見其人某器宇恢弘才學優贍明宗辨旨孰能相抗立幡赴詔講經何異忘言揮尺況教府委宗極之重而吾徒得北道之賢由梁甫登泰山諸岸在下駕大車歸寶所家業斯存觀四象之機宜闡一代之時教桂子月中落分來鷲嶺清香鳥語山容開坐見白雲深處一音普被萬壽無期釋行鎡刻存翁文集募疏伏以四象二儀乾稱父坤稱母三綱九法車同軌書同文攻諸聖賢之言始於經綸之義紀述必録語言可無有如存翁之賢是乃教門之傑五十年碩德以無素餐數百篇文章幸有青眼況宋學士為之賞歎而徐大章重以服膺由學博而識明致理長而辭贍空韓柳歐蘇四家之糟粕泝晉唐秦漢千載之淵源挫古今於筆端籠天地於形內與其櫝藴山中曷若版行天下大書深刻見本他如讀家書造境即中想師儀猶觀掌果凡膺顏模之重望盍念手澤之難聞拔一毛而弗為徒有噬臍之歎揮千金而不吝便成鼓掌之資謹疏萬歷初上天竺募修補藏經疏曰摩詰之不二法門示疾必因人有問達摩之不立文字安心非緘口無言故經律論三藏之別名為戒定慧諸根之異等即規矩以為方圓大匠有教人之定法舍筌罝而求魚兔學人昧入道之先機欲登諸佛之道場思續正宗之慧命貴因文而悟道必得意而忘言也顧兹天竺名山業奉朝廷寶藏牙籤犀軸王言絢玉簡以昭回鳳彩龍章聖教燦瑤編而煥發奈何歲月既久不免蠧魚交侵碎金不止二三完璧僅存六七念國璽之全書既毁矢山門之缺典重新先須有餘之財庶補不足之數遍叩高賢共成勝事一卷兩卷請隨緣而繕寫三函四函更量力以助裝片言逾九鼎頓令再轉法輪一字值千金定見同栽福果謹疏贊宋蘇子瞻辨才大師贊有序余頃年嘗聞妙法於辨才老師今見其畫像乃以所聞者贊之即之浮雲無窮去之明月皆同欲知明月所在在汝吐霧之中明曹國公景隆贊存翁大師像充然之容粹然之質學富而豐材大而碩親承綸綍之音屢賜天廚之食其靜也孰窺其源其動也莫辨其迹所以領昭代之教宗為叢林之柱石者也明少師道衍小像自贊富貴舌探刀上蜜功名手摸水中天山林鍾鼎元無二萬事從寬且坐禪銘宋辨才法師心師銘曰咄哉此身爾生何為資之以食覆之以衣處之以室病之以醫百事將養一時不虧殊不知恩反生怨違四大互惱五臟相推此身無常一息別離此身不淨九孔常垂百千癰疽一片薄皮此身可惡無貪惜之當使此身依法修持三種淨觀十六思惟一行不退安養西歸成無上智是為心師元笑隱欣禪師為清公那伽室銘曰定以制動不動何定如太虛空如大圓鏡風動塵起鳥飛魚泳種種塵勞頭頭佛性非出非入非假非證別求玄悟白日深穽當知此室寂而常應天魔膽落佛祖乞命棒喝交馳春行秋令又作天巖銘曰維爾之祖曰東西巖爾維似之字以弗慚巖不絶續而應無窮靜而能通杳而有容嗟巖之人千古一息不起於座周乎八極天花何來若將我凂譬如虛空繪之五彩是故智者讚毁不動五嶽可輕一芥可重我銘於巖傳之無已識真者誰惟寒山子明妙聲法師敬修字銘曰敬修之要存乎厥心戒謹恐懼何往勿欽相在爾室雖極幽深勿二勿欺上帝汝臨坐不愧席寢不慚衾日慎一日式昭德音於穆西聖誕揚玄風一哉心乎曰此是任客卿子墨敢告於司針序宋齊玉法師四十八願後序略文曰或曰淨土乃聖人之權方所以接鈍根化凡器也苟能一超直入如來地何藉於他力乎對曰佛世文殊普賢滅後馬鳴龍樹此土智者智覺皆願生淨土應盡是鈍根乎釋迦勸父王淨飯并六萬釋種亦願生淨土應盡是凡器乎此等聖賢應皆不逮今人之利根勝器乎況若以此為權指何為實權實之判非止一途自非教眼瞭焉何以甄別咨爾有識當信佛言招報非輕切勿容易昔孫莘老學士始以此疑之因會楊次公主客王敏仲侍郎論道契合遂釋其疑故莘老云四方言禪者唯黃檗慧林為最盛臨濟之後有慈明慈明傳江西黃檗之道次公實傳之雲門之後唯雪竇雪竇傳懷懷傳本本公居慧林時敏仲早得其法次公敏仲皆儒者學禪得師如此方且汲汲以淨土為依歸則知淨土非聖人之權設真禪侶之棲止也苟能即心淨土本性彌陀生則隨念往生去則實無所去則亦焉有彼此之異而橫相是非於其間也哉觀夫莘老之言則信真善知識不違佛訓不欺自心事理俱圓實可宗仰願諸仁者當以死生大事為心無以人情取捨自礙賴如是願力念阿彌陀佛發決定信誠起娑婆險惡之程作淨土水雲之客濯足於八種功德池水挂錫於七重行樹叢林入清淨海衆中參彌陀善知識覽勝境而得不退轉聞妙法而易悟無生七寶樓邊四花池畔優遊泮渙樂莫大焉庶以此願為憑前程定無間阻苟或謂之不然則吾末如之何也已慧光訥法師教誡新學比丘行護律儀後序曰吾佛詳開道學深達物機首令收攝於威儀畢遂圓成於德業莫現乎隱內先戢於狂心莫顯乎微外必柔於細行皆是四儀之素踐可為百行之先知非甚高而難行蓋至明而易見毫釐致謹杜橫流於濫觴之初纖悉加鉶翦滋蔓於發萌之始蕪穢都盡真實獨存視先代之古賢意不多讓俾後生之來彥思欲相齊是則代代有承化化無絶非止紹終南之芳躅抑將聯寂默之華輝坐解脫牀播真風於百億注甘露雨霈慧澤於三千普令粗暴之庸同肅安庠之雅來爾明哲慎爾攸為願諸有志依而行之俾儀止超倫生人天之敬仰佛法住世為道俗之瞻依普與同舟深崇斯道我菴法師佛祖通載後序曰士也窮日力事著述設無禆益於宗教雖勤何為哉其有才贍思雅置辭不苟縱可傳世使不涉於道雖工何取哉覽觀祥符上通載之書一是鋭於輔教者志亦專矣然自唐李五代之倏更十國之割裂宋室遼夏之未混金源之王北光嶽既分域地有限間有作者又何從而周歷天下以盡奇觀故是書之成於萬國同文之日宜其集全功也於戲韙哉竺隱道法師送如一菴序曰有聰明之姿而無師友之教非學也有師友之教而無聰明之姿亦非學也噫學豈易哉譬夫梓匠輪輿之工利其斧鋸正其準繩善其規矩不得良材而用之則巧無所施焉亦由楩楠杞梓之材其大合抱其高拂雲其直如矢不遇良工而斫之則器無所成焉故弟子之於師也將求碩德而依歸之雖數百年中不一二遇焉師之於弟子也欲得英才而教育之雖數百人中僅三五得焉具菴法師以天台性具之學講授東西兩浙之間逾三十年矣其登門受業者蓋不為無人而於一菴如上人尤器重之蓋天姿聰明勤學問強記覽大小教部之文一目成誦若宿習然法師凡有注述未嘗不與之討論也間嘗語人曰吾家之顏子其在如乎余與具菴同録僧事於龍河之上雲間掌教者以一菴補楊林崇壽之虛席余與其試文擢為上第兹將往涖寺事衆皆曰具菴之道東矣能言之士咸賦詩以餞余謂一菴以聰明之姿得師友之教學之不已其所成就奚止於是哉昔神照悟經王之旨傳四明之道以至於今山家學者皆宗仰之今一菴即其名求其實焉有不為神照者乎余特以是期望之遂為序辨衆作之篇首云又送吉祥海序曰杭之諸剎星列棋布若山林城郭緣江被湖處處有之考其年代之久近自東晉而下至唐五季錢氏王吳越時塔廟林立若植筍宋南渡駐蹕為行在所佛事尤為稱盛焉興元寺在鳳山之陽經始為最近蓋以宋季主嘗夢僧告之曰吾有五百徒衆未知攸止塔以升元閣處之卒為蒙古氏得國之讖先是其地有招提悉歸之內苑國除改建復其舊焉興元五之一也前臨大江後踞重城吳越江山之勝在几席為東南之偉觀也闡揚天台氏性具之道四方之學者接踵而至往往來遊輒忘返廢興相尋曾未幾向時之所有鞠為黃壤矣主之者如過客視傳舍然不久乃去業之成壞漫不為意況大法弘荷之足憑哉幸際聖明盛治之世黼黻像教都府州邑皆置官以僧曰録曰綱曰正曰會凡其所在寺院虛主席者慎選老成戒德為時所重者以次而補之時祥海吉公居上竺之板首真誠有識衆舉而來京師考試中第將行所知者咸贈之以言而屬豫為之序豫惟廢興之數固懸於天道之隆汙未嘗不在其人也祥海往矣當以大法流通為己任庶不負朝廷護教之心起先業於已隳依宏綱於將墜焉知不在是行也耶又送徹自明序曰吾佛氏之教與王化並行於世所以使人去惡而就善薄口體之嗜絶聲色之娛非欲以矯異於人蓋法之所宜然也故凡遊學大叢林者必先擇師而師之擇友而友之然後可覬其成功焉苟非大叢林則不能以容衆非良師善友則無有講貫之益薰陶之功師之視弟子也猶父之愛其子弟子之事師也猶子之孝於父不以死生遠近二其心非勉強然理勢然也自明徹上人早從日章法師遊歷清職於上天竺山衆多材之又嘗司懺悔事於雨花尊者之室聲譽日著吳郡之柄教者選補昭慶之虛席而為法師出世之高弟人益重其誼焉彼或以勢驅利誘雖遊從日久一旦幡然而叛去略無愧色其視自明為何如哉余固知自明可謂不失其所者矣兹將捧檄往蒞寺事京都之交遊能以文言者咸賦詩以餞遂特舉其大義而為之序云釋妙聲送斯道成遊學上天竺序曰上人居東海之濱通內外學喜從賢者遊與豫遇於具區之上徵言以為贈豫語之曰子亦嘗觀夫水乎豫嘗自具區遵湖而南放於東澨登垂虹俯洞庭以臨三江見汪𣿄停蓄震蕩噴薄彌望數萬頃包絡三州浩然巨浸乃慨然太息以為天下之水莫此若也及北浮大江泝天險極吳越之交其潮汐迅悍猋馳霆擊神造鬼設瞬息數千里莫測源委於是目眩心掉赧焉自愧其見之晚也後觀東海見江漢百谷之會日月星辰之所出入浩浩湯湯與天地混徒望佯而歎敞罔自失曰嗟夫水有至於是者乎向之所見若蹄涔耳何足以語天下之壯觀哉夫吾聖人之道猶大海也諸子百氏猶江若湖也人有學聖人之道遺其大者遠者而安於小成是猶習江湖之流而不知海之大全其敖然自足也宜哉孟子曰觀於海者難為水遊於聖人之門者難為言信夫今吾子富於春秋有志於聖人之道譬諸水焉固已絶江湖之流而侵尋乎海矣果能力學篤行而弗措吾見其入聖賢之域不難也東海淨信之堂有日章法師弘台衡之學彼上人者善觀水者也善言聖人者也子以吾言訊之為何如也明楊守陳西湖歸隱序曰杭僧綱司都綱性菴大師今年壽六十又七一日忽自歎曰世氛何溷溷若是也遂移文所司致仕不俟其報竟超然引去一時重師之名而年未耄也相與留之不聽四衆走謁而堅留之又不聽其有為詠詩相與歌詠其去既裝潢成卷師之上足得度曰廣嗣曰琥曰霑三上人因得中書舍人王公尹實西湖歸隱四篆字因以名卷來徵余言序之余曰大師學佛者也佛之徒以出家名是以一瓶一錫到處為家何有於歸空虛寂滅既無所顯何有於隱而況西湖煙月水雲之間不禁朝歌暮宴之樂世氛固猶溷溷若也師也歸也隱也何居三上人曰大師至性圓明善根夙植提孩而坐即跏趺能言而解稱佛號甫童而懇求出家其於隱也固其所矣是故昔也江湖京闕杖錫雲遊遍禮名師再居名剎勤心苦行刺血書經廣敷奧典啓覺羣迷興舉墜墮俾生敬信師也若云顯矣迹之云爾心固隱也夫何珠淵光媚蘭谷香披文辭交來衆心皈仰挈法門之領袖提一郡之宗綱障頽波於既放泯妙化以無功如是草年始終一日師也若云隱矣身之云爾心何嘗不隱也今也蟬蛻汙泥風生履舄託明月以為儔挾孤雲而遄往循北山之南叢睇南山之北陲遡西湖之遊探天竺之舊業招呼猿鳥檢點煙蘿白石不移青松如故錫乃卓而長植蓋因置而不舉於是霞嵐喜笑巖壑回姿山靈呵禁龍天護持師也蓮花刻漏靜禮六時金獸吐香單傳一指空虛實際寂感而通自然心境俱空出處兩忘何有於湖山乎哉明陶望齡普門品序略曰菩薩慈憫羣生若醫師急病有瘴鄉焉則荷囊而馳之若父慈衆子有尩劣貪瘁弱喪久逝者則亟拊而來之故世界穢濁菩薩必入水火厄難險賊菩薩必赴三毒方煽五欲方湎菩薩必援臨安為東南都會三吳百粵所湊其物力謠尚易以從嗜導淫增長鬭諍是故上天竺觀世音菩薩深願弘慈赫有靈迹緇白崇仰幡蓋香燈唄贊稱頌殷山填谷奔走百郡寺為天台講院慈雲辨才高賢輩興比丘月旦祝釐誦普門品非以誘教聾俗振以圓音哉黃汝亨普門品序略曰今夫浪遊子行盡九州而不思家還家而不見母見母而不見母之音容語言溫涼歡慘之意世必唾為背逆之子沙門幸生長佛世稱佛弟子入靈山而不見天竺大士見大士而不能誦普門品誦普門品而不能解其慈悲普度圓通妙應之義則亦浪名浮搭之僧而已豫少不識佛事第見先慈嚴晨朝神拜慈悲觀世音則必焚香合掌稱觀世音普門品經余從耳入以至從口而出頗能成誦無異誦習吾師孔孟齊魯之篇已而讀書靈鷲山與天竺密鄰則見十方萬衆填山谷蹈湖海而禮拜稱念觀世音者無算乃知佛子之皈依大士猶遊子之必還見母其情孔亟何者子母一體而衆生一切與慈悲觀世音無二體故也蔬筍社題辭曰社淨業也社以蔬筍名者何道人氣味不能外蔬筍蓋世人所嫌而至人所急也何也欲君子之知蔬筍為至淡而至味攸存也至微而至足攸寓也至薄而至養攸關也至味則美至足則富至養則尊至美則不歆慕乎外富則隨取於吾生尊則可率尚乎貪味也然則曰蔬足矣而又筍之云者何蔬以筍為重筍以蔬為常蔬以筍為甘筍以蔬為樂蔬以筍為賓筍以蔬為我蔬以筍為新筍以蔬為淨君子如此則口無毛血之穢蔬筍之元也身無肺腸之災蔬筍之亨也心無非分之取蔬筍之利也食無耽嗜之情而終身不渝蔬筍之貞也蓋四德具而四端舉儒釋之道無餘藴矣以是振天竺之風也易末法之頽俗進之於德則淡泊修之於業則清淨見之行品則安樂措之文辭則簡易莫此為急者也山子居猿洞久天竺上人愛山子甚屬覺海性師寓焉因結是社而為名以此萬歷癸卯仲冬長至一日古菴乞士邵重生頓首書蔬筍社刪勸敘曰豫自甲辰乙巳客湖干耳天竺古先主偕諸勝侶薰蔬筍之社藻瑤華之篇徒令挹清芬翹逸響一窺戶外之屨迹無從也亡何老成雕謝風範穆如己卯秋會印中師傾鉢屬以寺乘之役因托名山故實先正遺編見蠧餘一册題為社之稿耳惜其零落手為綴之汰之銓次而帙之噫豫讀是集有深感焉錢塘盛事著於史策者莫尚乎唐宋逮乎國朝則僅見靈竺之纘公需公與姚方伯輩之湖山社勝果秀公與孫太初輩之石門社然彼乃一觴一詠所嚮生春不過點染太平而已近則貞父居士開壑公之香巖社伯霖居士開靈公之淡泊社然又舉而不永過而不存烏能及此蔬筍之人齊龍象歲耐冰霜勵白業講求為急務好緇衣𢋫唱為雅風其為學也即俗即真其為教也可羣可激有不觀感而興起者其禿居士也耶敬刪之奉為南北山之勸書何如潛州三學學人溪子賓槃談書於雲東之平遠樓引明會元曹勳題上天竺重修前後殿引曰佛以七十二圓通接引世衆悲愍沉迷超其苦趣惟虛能圓惟靈能通以化善男子女人從五濁中稍有覺念莫不皈依三寶蕩滌慳貪陡作布施想始見菩提隨地下種隨人含性乍逢慧雨甘露感即承受上即發生住相布施與不住相布施俱從妙明一點圓通也余薄遊上竺山守僧本印中誠慤清湛身不私一錢有即莊嚴聖貌或捐助經需或修道路或鑄鼎鐘作現前勝果本山僧衆鱗遝如上人真誠孚缶賓禮名賢經緯重務無有能出其右者年已六帙餘始終如一上人可謂苦行修矣兹來挾募本以請余笑謂侍僮曰印中必有未了信緣欲求竟究者及至前和南而告曰本山圓通大士殿創於石晉拓於錢王修於我皇明成化年蒙皇上發帑敕使營繕興廢舉墜煥乎聿新兹已多歷年所墁堊傾頽金碧無色此貧衲所白首而泫然者欲丐宰官長者善士信人各捐歡喜金以完此果使金界紺園種種如初則自來禱之輒應靈山名重藉大人以逾重矣我聞大士作三十二應百億化身以一手眼現衆手眼以衆手眼通一手眼或現宰官身或現婆羅門種種説法正般若無門從心變現金錢珠玉俱屬浮沉人或戀浮沉而昧變現願從喜捨一法破慳去昧惺自己本來身助上人誠信果豈不今古一大奇緣乎合掌而勸諸檀那勿作文字觀題跋蘇東坡題壁曰錢協江公著柳雍同謁天竺辨才元祐六年正月七日又曰元祐庚午辨才老師年始八十道俗相慶施千袈裟飯千僧七日而罷眉山蘇軾子瞻洛陽王瑜中玉安陸張璹金翁九江周燾次元來餽香茗二月晦日書又跋辨才和詩云辨才作此詩時年八十二矣平生初不學作詩如風吹水自成文理而參寥與吾輩詩乃如巧人織繡耳又書天竺懷楚上人示若逵所寫經後曰懷楚比丘示我若逵所書二經經為幾品品為幾偈偈為幾句句為幾字字為幾畫其數無量而此字畫平等若一無有高下輕重大小云何能一以忘我故若不忘我一畫之中已現二相而況多畫如海上沙是誰磋磨自然勻平無有粗細如空中雨是誰揮灑自然蕭散無有疏密咨爾楚逵若能一念了是法門於剎那頃轉八十藏無有忘失一句一偈東坡居士説是法已復還其經趙清獻公詩序元豐己未仲春甲寅以守杭州得請歸田出遊南山宿天竺今歲甲子六月朔旦復來六年於兹矣老僧辨才烹茗迓豫因作四詩云蘇潁濱倡和詩序轍自績溪蒙恩召還將自宣城沿大江以歸家兄子瞻以書告曰不如道歙溪由錢塘一觀老兄遺迹轍用其言至吳中迫於水涸不能久留十月八日遊上天竺子瞻昔與辨才相好今隔南山不見乃作三小詩寄之秦少遊跋云辨才法師謝天竺講事退休於龍井山壽聖院凡堂室齋閣山峯水泉皆名以新意復作詩繼之號龍井十題其言清警發人之妙思信非世間音也元豐二年八月高郵秦觀為寫遺其徒懷楚刻於石紀談唐天寶中天竺山秋夕雨月桂子一子成樹今月桂峯在焉至宋慈雲則有種桂子記東坡有分桂花詩而上竺寺有樹大數圍面樹開延桂秋香秋芳等閣以章其勝蓋嵩禪師所稱桂叢發奇香因憶洞冥記曰有遠飛雞朝往夕還嘗銜桂子歸於南土固其異也唐牛奇章僧孺性愛石以甲乙丙丁列石品太湖為甲羅浮天竺為乙公未嘗宦浙未曾取於山以厚價購故為癖愛石者焉宋寇萊公有妾名倩桃能詩書歌即一曲笙歌一匹綾妓也公貶嶺南道杭倩疾甚謂公曰妾必不起幸葬天竺山中無憾矣既卒公從之東坡一日禮大士見座前普門品袖手展讀云咒詛諸毒藥所欲害身者念彼觀音力還著於本人東坡喟然歎曰佛自仁心豈有免人之一難而害人之一命乎是亦去彼及此與夫不愛人者何異也我體佛之意而改正之曰咒詛諸毒藥所欲害身者念彼觀音力兩家都沒事問辨才曰何如辨才笑而不答東坡過上天竺謁辨才款話間因言窗前兩松昨為風折其一悵恨成一聯竟未得其續因舉以示公云龍枝已逐風雷變減卻虛窗半日涼坡續云天愛禪心圓且潔故添明月作清光東坡乞辨才塔碑於黃門與書曰兄自覺談佛不如弟及黃門作海塔碑以兄與之遊故云我不識師面知師心中事惜乎火失其書翰也後東坡在黃州夢至西湖夢中亦知其為夢也湖上有大殿三重其東一殿題其額曰彌勒下生夢中云是僕昔年所書衆僧往來行道大半相識辨才海月皆在相見驚異僕散衫策杖謝諸人曰夢中來遊不及冠帶既覺亡之大士之靈凡郡中旱潦必請入城大士無不憫然者特當道者不務修德彌災而反恃佛為重則末矣甚至有不秉寸誠虛應故事輕褻淨聖者則風又斯弊焉宋淳熙辛丑夏秋之旱迎大士就城明慶寺禱雨時有詩曰走殺東頭供奉班傳宣聖旨到人間太平宰相堂中坐天竺觀音卻下山時趙溫叟當道其為民之意未至而大士之念已勤故人譏之雨中若東坡詩曰蠶欲老兮麥欲黃前山後山雨浪浪農夫輟耒女停筐白衣仙人坐高堂東坡之念已勤而大士之憫未發故若有憾焉然則後之禱者寧為蘇公之怨毋致溫叟之譏可耳宋永嘉甄龍友善滑稽大書上竺壁間曰巧笑倩兮美目盻兮彼美人兮西方之人兮孝宗臨幸稱賞命物色其人白玉蟾大士贊曰柳葉雙眉翠桃花好面皮夫是之謂誰東海比丘尼山子曰按此二贊既無象教尊嚴之旨又非宗門掃空之見不過隨俗趁口以文為戲不幾於侮聖人之言狎大人乎甄不足怪玉蟾惜哉宋儀王嘗遊上天竺寺有山禽忽驚起衝落半巖花之句盛為時人傳誦王生有紫光照室視之則肉卵以刃剖而得嬰兒靖康時大軍欲擁王立之王仗劍固卻之後扈南渡卒葬天竺山中葉少藴云錢塘西湖靈竺蓋士大夫願遊而不獲者仕宦適至未有不厭足所欲余在錢塘十月值虜犯京師信息未通日望北涕泣何暇顧其他僅以祈晴一至上竺而已晚往來浙東七里瀨金華三洞諸勝處輒留數日非興盡不歸乃知山林丘壑亦各有分非軒冕者所可常得天固付之山人野老也宋孝宗乾道間司業林兼之正字彭仲舉遊天竺小嶺論詩談杜工部妙處彭醉亟呼曰杜少陵可殺鄰壁聞之告人林彭在天竺謀殺人矣問所謀之人則曰杜少陵喧傳縉紳間聞者絶倒李金庭之流寓上天竺也與諸房齋款後五雲山僧亦競友之有嘲之曰嚼盡三天竺喫過五雲峯弘治五年六月草四日大風西山水發山崩地裂西湖汛溢壞天竺靈隱諸剎及民廬數百家死者數百人城牆坍圮街市乘舟而行是歲大飢崇禎八年六月二十四日西山風雨大水發崩壞僧俗廬舍及道路惟天竺靈隱雲棲虎跑為甚慈雲瑞光塔亦為衝損是秋民儉且疫嗣後歲纍洊飢嘉靖中海寇倡亂來杭抵行春橋九里松而上欲至天竺山忽見一婦人身長丈餘黑如漆手執巨棍立於當路四圍山頂一望皆樹旗幟晴空杲日倐而掣電轟雷寇知是神兵遁去遂建黑觀音堂至今山中老宿能盛談其事乃知菩薩三十二應現隨類化身或黑或白或為黃金初無定色皆可有祈響答凡禱捷臻如執一色以求此庸愚之見耳
