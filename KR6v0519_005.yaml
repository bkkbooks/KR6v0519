body:
  text: 天目山三學學人廣賓纂尊宿住持品別傳五代心印水月禪師名子儀溫州樂清陳氏子也童時約伴修行至靈鷲山曰是真棲修勝地矣投寺出家乃升戒品博究大乘經論自思佛法玄微非造次可及遂杖策負囊參禮尊宿初往福州鼓山神晏和尚一見曰異人至矣修師禮敬問答便承言大悟玄旨數月後復歸靈山錢忠懿王聞其道譽命開法席上堂示衆曰久立大衆更待甚麼卻恐誤於禪德轉迷歸路時寒珍重僧問如何是從上來事師曰住問如何是薦曰可惜龍頭翻成蛇尾有僧禮起將問師曰如何且置問如何是法界義師曰九月九日浙江潮將下堂僧問下堂一句曰攜履已歸西竺寺此山空有老猿啼問鼓山有掣鼓奪旗之說曰敗將不忍誅曰遇良將又如何曰今汝孤魂賜汝三奠問世尊入滅當歸何所曰鶴林空變色真歸無所歸問未審畢竟何之曰朱實殞徑風繁英落素秋問師將來欲歸何所曰子今欲識吾歸處東西南北柳成絲問如何修行即得與道相應曰高捲吟邊箔濃煎睡後茶後以雍熙三年示滅門入闍維收舍利起塔宋普慈禪師名玄本字幻旻慶歷八年住持靈隱皇祐五年直學士給事中孫沔守杭以旻住持上竺僧問臨濟入門便喝德山入門便棒此意如何師曰天晴不肯去一日師見僧看經乃示頌曰看經不識經徒勞損眼睛欲得不損眼分明識取經宋智月禪師補幻旻住上竺寺提唱宗綱兩師約十年獨月機緣法嗣及氏里無考宋文捷法師吳郡精進院僧也戒律精苦常持如意輪咒靈變尤多利上竺之鼎盛以知制誥呂惠卿勢部使者奪而主之遷辨才法師於下天竺恬不為忤捷猶未厭逐辨才歸於潛逾年捷敗事聞朝廷再以上竺𢌿辨才文捷之在上竺也吳人不悅施草木皆索然及辨才之復至士女不督而集山中草木為之生色宋興咸法師字虛中黃巖章氏子賜號明祖母夢故白蓮惠師遺黃柑令食之及寤齒頰有香生七歲依香積出家首謁知涌涌奇之曰祖位再來也學成以妙年居第一座涌沒證悟為繼已而悟遷上竺乃舉師以代聚徒既多歲復大歉吳中施者惟恐自後王孟公問十六觀義師曰佛在十方億剎外而提封不越方寸若克循觀道則往彼非遙也資政鄭公問楞嚴八還師曰迷心為境八法瞀亂達大觀者一念自反二公皆感悟歲歲為遺供師倦於酬應隆興元年五月別衆端坐念佛而逝瘞龕於寺之東岡乾道三年夏復從茶毗五色舍利無算所著菩薩戒疏注三卷金剛辨惑一卷復宗二卷法華撮要一卷素精於易折衷諸解以自名咸因號澤山宋明義法師按統紀嗣法慈辨諫法師無傳宋師覺法師按統紀出家上天竺為慧先訥法師嗣也蓋神照下第七世無傳宋海月法師名慧辨字訥翁學教觀於明智居第一座以代講翰林沈遘治杭威厲見者多惶懼失據師從容如平生遘異之任以都僧正蘇子瞻時為通守為序以贈之師既蒞職凡屬內寺院虛席者即涓日會諸剎及座下英俊開問義科場設棘圍糊名考校十問五中者為中選不及三者為降等然後隨院等差以次補入由是諸山仰之咸以為則吳越大旱禱大士久不應師於禪定見金身老人告曰明午必雨果驗遠近感師誠致熙寧六年七月旦起別衆合掌趺坐而逝初師遺言須東坡至方闔龕四日坡至見坐如生其頂尚溫坡盡敬而返作為真贊弔以絶句命子由為塔銘宋神煥法師安吉人早學慧覺有悟曰自昔教門諸師立義未盡者悉辨論之得百篇世號煥百章嘗論諸天位次不正乃考尋藏典撰為天傳以君臣賓主男女本跡為綱目謂大梵尊天君臨三界統上貫下諸天皆其臣屬也大梵為三界主三目摩醯為大千主帝釋主地居三十三天四王主領八部雖君臣不同要各有主義若大辨在山澤功德在北天園中皆客寄耳實無所主領也梵釋四王是男天功德大辨地神樹神皆女不可使男女失序況鬼子母有女名功德天有男名散脂修摩今子居母上可謂之以母從子其可居天主之上乎梵釋四王本是地住菩薩金剛滅跡本護成佛不揣其本而齊其跡可乎知此四義然後始可與言天矣煥於寶慶紹定間住上竺宋北峯法師鹽官陳氏子名宗印字元實首謁當湖竹菴觀公得教觀之旨一日思寂光有相之義不得空有聲云寂光本體如水中月通守蘇玭白師座請居正覺未久返浙右二上竺講止觀法深砭學者支離名相之病圍坐挾策主者以得士為忌去隱雷峯毛氏菴宋擇卿法師台人天資聰敏博學强記受業慈辨之門嘗曰四明之意吾已得之唯起教觀信之未及然不敢不信也生平未嘗屈節豪貴聚徒三百施者自來居常喜茶臨終之頃謂左右曰晨鐘即來報時至啜茶一甌書偈而化宋慧照法師善琴為時所慕參寥和尚贈以詩見題詠宋若芬法師字仲石婺州曹氏子為上竺書記善畫求者日益衆師曰錢江八月潮西湖雪後諸峯乃是天然偉筆二三子當面錯過卻求玩道人數點殘墨耶後歸老家山古澗側蒼壁間古勝作菴扁曰玉澗因以為號又建閣對芙蓉峯別號芙蓉峯主嘗自題畫竹曰不是老僧親寫曉來誰報平安其意趣可想見也宋仁濟法師芬玉澗之甥也書學東坡竹學俞子清梅學楊補之自謂用心四十年作花圈稍圓耳宋曇瑩法師善易金主亮入寇瑩卜當自斃於江北已而果然時甚神之宋晦菴慧明法師鹽官人剃染祥符寺後詣上竺慧光僧録輪下聽習二十年間不舍晝夜頓了一家教觀之旨初住慧通後赴循王府待制位請遷富春蘭若尋投菁山常照與叶公守枯槁為淨土歸歟之計兼誦法華等經慶元己未抱疾垂革弟子請作頌乃書骨頭只煨過五字付之纍足泊然而逝天樂沸然舍利無數元偉首座既精三觀為正傳復慕一心為直指寂照嘗贈之云上人間多出慷慨誓將生死窮根株平生足迹半天下豈肯汩沒文字海中甘作鑽故紙之蠧魚德山見龍潭便乃燒卻鈔疏良遂參麻谷便乃散卻講徒男兒曠達有如此光明烜赫何代無原璞法師名士璋海寧王氏子伏犀貫頂目光炯炯射人幼投傳法寺出家其師與翰林柳公貫游公嘗親授儒書講究奧旨及剃染依我菴於上竺及天台大小部志慮專一我菴門人曰天心瑩者素高亢不服人亦歆羡師之行履共燈火磨勵詰難時稱雙璧至正十三年宣政院命主棲真寺洪武初集慶虛席請師提唱未幾入涅槃瞽菴法師名顯示海寧盧氏子投會稽悟本院一山元公為脫白具戒即踰江濤而西事天岸濟公久之見其天資峻利曰子曷從吾師遊乎乃謁佛海大師於上天竺教寺研窮三觀十乘之旨不至於洞達弗措也至正間聘主崇恩演福寺以洪武四年順寂師古貌長身寡言笑清儉自持一榻二十年蕭然如逆旅雅不事干謁其出世為人皆迫於羣情不得已而起也天岸法師弘濟字同舟投寶積滿公剃度依半山全公讀天台之書悉通其玄義嘗修法華金光明淨土期懺聚精會神存誠不二於觀定中恍睹尊者𢌿以犀角如意因是談辨日增了無留礙泰定二年鹽官海岸崩民朝夕惴惴恐為魚鱉浙江行省右丞相脫歡甚憂之祈禜觀音大士於上天竺仍請師冥心禪觀取海沙祝之親帥其徒遍擲其處凡足迹所至岸為不崩人咸異之國朝西源湧法師主天竺既投老居蘇城西之蘭若里趙宗文嘗寓宿菴中吳之詩人數輩連牀夜話師出玉杯傳飲杜用嘉碎之殊不自安師歎曰我法萬物有無常此乃常也曷怪乎一如法師會稽人出家上竺善講法華經永樂間詔修大藏命總其事洪熙元年為僧録左闡教卒著述有法華科注大明三藏法數明懺首自京歸上竺時明州同竹庵任僧録賦詩送之曰相見即相親忘形語轉新眼青三竺客頭白四明人細雨沾衣重涼風送棹頻爾師吾故友一別幾經春靜中講主每為下竺懺首蔚著賢聲後為上竺首座益新風範空谷老人題其小像其略曰靜中上人居此地祖道繩繩善相繼小朵峯前司懺摩天竺平分風月位士瓛法師字秉中為人天資警敏素履端醇愛讀儒書兼長唐律從上竺掌教性菴究天台教觀諸山推轂住無相上竺僧寺大界相石皆其所立熟法華經如注鐵峯法師名歸定北京僧與鎮守公善雲遊為寺住持創下白雲堂一日鎮守造堂見其犬甚肥問犬不葷乎對曰然守即以美饌覆地犬不食大異之詳載郡志青崖道人上竺駿彥也嘉靖中將行腳名山都綱縉賓山送以詩曰青崖原即是洪崖圓嶠空峒數往來不顧蒼苔石頭滑月明與爾試芒鞋句中風致可想見其人寧佩韋有錫類之孝軍門溫令舉側微異行寧曾刲股救師舉當道得獎勵順僧四字扁後趙錢塘見扁命碎之豈惡其自衒耶杲兩峯名智杲杭城陳氏子少持金剛般若日勵清修專課誦年六十有四忽示疾逮彌留索陳皮湯飲之不輟腹有宿穢盡泄無餘命筆書偈而手不聽運叱其手曰汝先吾斃耶乃屬侍者如賢代書云八卦年來入寂甜酸苦辣經識今朝了卻世緣遮箇皮袋狼籍一腳跨步出門撞見寒山拾得三人拍手呵呵伴我歸投彌勒咦九蓮朵內見當人金剛般若波羅密嘉禾沈星吳名其廬曰兩峯草堂了空禪師山陰人姓王氏少貧手供藝事口誦彌陀後禮蓮大師法名廣似甲午朝天台就萬年寺落髮歸上天竺華嚴山居禮歷菴咸稱赤腳師以師勤苦精進雖踐踏冰雪不襪不履也冬惟一葛夏惟一苧山居而下有澗足不踰澗三十餘年世壽八十錢太史受益銘所謂沉心孤詣抗志物表者哉怡中法師諱靈建初字靜照苕上凌氏子幼皈華藏院熟治經史進具之年遍參名宿蓮居唯識宗既登堂奧後於台宗有契興福院月輝光禪師請升楞嚴講座地産靈芝天降甘露雙瑞一時衆稱希有海昌松溪大師付法卷曰夫佛祖慧命師資道脈唯以心印心而不謬所承者斯得之然所承維何謂有教以為說有觀以為行行說備而事理具造之一念三千三千一念修性善惡之不變隨緣隨緣不變皆於是可識矣至若簡小大明權實定謗止辨粗妙誰為所解離誰為所解即孰是偏漸修孰是圓頓修纖悉不濫如指諸掌殆今家舍其無從而圓宗心印因緣生法即空即假即中又舍今家亦無從者昔柳子厚嘗曰法道微而異端起唯天台所傳為得其正陳瑩中又曰只一具字顯今宗入此宗者甚希有此二賢豈虛美而諂附之耶在親嘗實見方悉吾言非誕耳怡中法子憶己卯歲始從佛國之山來入戒壇之室余固教觀雙弘近數年中雖薪桂交作海山不寧亦必說之玄義說之止觀未敢少有懈心則知汝在輪下於一家宗途曰判曰釋曰解曰行精心苦志自多深入蓋不獨撤其籓籬已也兹彌陀興福高雅唯謙情存樂法重以檀護之命請演楞嚴是宜授夫衣法以見衆緣之有合以見吾道之有屬云但吾得法於桐溪弘道於智者而桐溪實得法於幽溪幽溪實得法於百松百松悟入妙宗又實得法於四明故嗣興教觀光昭天下如日月之不可掩乃四明與慈雲同出寶雲之門而慈雲闡教於靈山其法嗣辨才復傳化於上竺若慧光訥師則又得法於竹菴弘經於白雲之堂歸隱於彌陀之院降而若佛光東溟一菴諸師雖人分先後道無古今同智者之家法同一台嶺之心宗汝得吾法繼席演教誠淵源有自授受非虛矣今而后唯不昧而不違自可傳而可大吾道弘祖道與佛道俱弘所望汝者豈淺衷哉慎之慎之紹溪師名圓昭姓顧氏鹽官橫山里人度雲隱德儒為本師課誦金剛大乘經靡間寒暑性節儉耐勤辛敝衣惡食淡如也生平未嘗失色於人暮年於德馨橋躬執爨事施茶湯以濟焦吻世壽八十四恆自言人主七十古希豫年八十餘則又希一日示微疾盥浴更衣曰吾將行矣法𦙍問以往天台乎西方乎曰皆不願仍來為竺僧耳惺然而逝潔空禪師名海淨宜興人姓莊家業頗殷十九娶妻生子一妻故忽猛自省曰世間有何不了事遂盡捨家園田産挈子投海潮了義師剃染隨至上竺掩關紫竹林淨居戒律精苦茹淡日惟一食持利刃刺舌端血書法華及華嚴五大部等經立願送供五大名山師曾患胸疾冬月遇老叟贈巨桃一枚服之立愈又於窗隙見老嫗問以書經工夫當無間斷語訖忽不見深夜坐禪有虎繞前若有所請師笑謂曰此間無物虎即遁避種種奇異一日索浴將別文學沈允燁言老師定生西方師大喝曰你來惑亂我何處非西方滿室旃檀香氣吉祥而逝傳法徒名寂奇移住草庵即其子清苦有父風庵即上竺醵金所建教觀教門釋迦如來說法四十九年適時而進天台判釋凡為五時一最初成道於三七日中說華嚴經謂華嚴時二於鹿苑十二年中說四阿含小乘經謂之阿含時三於諸處八年中說諸大乘經彈偏斥小歎大褒圓謂之方等時四於舍衛國諸處二十二年中說諸部般若謂之般若時五於耆闍崛山并娑羅雙樹間八年中說法華涅槃經謂之法華涅槃時五時所說不出八教八教者頓漸祕密不定藏通別圓頓等四教是為化儀如世藥方藏等四教是為化法如辨藥味判五時粗妙華嚴兼粗說妙阿含但粗無妙方等對粗說妙般若帶粗說妙法華純妙無粗化儀四教頓者頓大之教不從漸來正說於大即華嚴也漸者從淺至深次第得益即初鹿苑次方等三般若也祕密者佛或為此人說頓或為彼人說漸彼此互不相知能令得益橫在四時別無部帙不定者佛以一音演說法衆生隨類而得解於頓說中得漸於漸說中得頓益亦橫在四時別無部帙化法四教藏者經律論三藏條然不同三人修諦緣度析色入空通者通前藏教通後別圓三人同以無言入道體色入空別者別前藏通別後圓教界外獨菩薩法修行位次互不相攝圓者圓名圓妙圓頓圓足明不思議因緣二諦中道事理具足但化最上利根之人四教化人旁正藏教正化二乘旁化菩薩通教正化菩薩旁化二乘別教獨菩薩法圓教方入為佛法四教詮理化物廣狹藏通詮真理化六凡改惡遷善革凡成聖別圓詮中理化十界俱成佛道藏教四諦苦則三相遷移集則四心流動道則對治易奪滅則滅有歸無迷真重故從事得名通教四諦苦無逼迫相集無和合相道不二相滅無生相迷真輕故從理得名別教四諦苦無量相十界果報不同集有無量相五住煩惱不同滅有無量相諸波羅密不同道有無量相恆沙佛法不同迷中重故從事得名圓教四諦陰入皆如無苦可得塵勞本清淨無集可斷邊邪皆正中無道可修生死即涅槃無滅可證迷中輕故從理得名八種四教一漸中開四如破他宗不識教體之妨謂法華是漸圓華嚴是頓圓二方等中四四教並談曰方四機普被曰等三別教竪入四十信修生滅四諦藏十住無生四諦通十行無量四諦別十向無作四諦圓四十行橫學四別教十行化他心切橫出四四一十六門五涅槃追泯四生生不可說藏生不生不可說通不生生不可說別不生不生不可說圓六涅槃追說四有因緣故亦可得說四句如前但義同施權卻更分別前四教也七法華施出四從法華實理施四時三教權理明無量義從一清淨道施出二三四八法華開顯四開四時三教歸今法華收多歸一也五時四教筌罤魚兔釋經首題五重玄義一釋名名為一部之總不尋能詮之名焉悟所詮之體故名居先二辨體因筌得魚尋名顯體得體而後忘名苟不辨之知得何體三明宗即得體已須修宗行見道修道宗要當明四論用宗既歸體必起大用佛說是經蓋得乎此此經力用次當論之五判教相名為能詮三為所詮能所之教必有其相頓漸大小法當剖判法華五章法喻為名妙法是法蓮華是喻實相體十界十如之法一一離相絶非一乘因果宗衆善為因自行言果是佛自行因果斷疑生信用迹門開顯斷權疑生實信本門開顯斷近疑生遠信無上醍醐教相此經純圓故喻醍醐逈異偏小餘味故法華二妙一相待論妙待前四時三教之粗獨顯法華一乘之妙二絶待論妙妙前諸粗皆成今妙無粗可論故稱為絶法華本迹因果開合圓教六即判位無機子頌理即佛一切衆生皆有佛性動靜理全是行藏事盡非冥冥隨物去杳杳不知歸名字即佛知識經卷聞名知字方聽無生曲始聞不死歌今知當體是翻恨自蹉跎觀行即佛依教修行即五品位念念照常理心心息幻塵遍觀諸法性無假亦無真相似即佛相似解發即十信位四住雖先脫六塵未盡空眼中猶有翳空裏見花紅分真即佛分破分證初住至等覺豁爾心開悟湛然一切通窮源猶未盡常見月朦朧究竟即佛智斷圓滿即妙覺位從來真是妄今日妄皆真但復本時性更無一法新觀門三諦真諦者泯一切法俗諦者立一切法中諦者統一切法三觀空觀者破見思惑顯真諦理假觀者破塵沙惑顯俗諦理中觀者破無明惑顯中諦理纓絡三觀一從假入空觀亦名二空觀二從空入假觀亦名平等觀三因二空方便入中道第一義觀天台三止一體真止止於真諦二方便隨緣止止於俗諦三息二邊分別止止於中道第一義諦一心中三止觀一空一切空無假無中而不空總空觀一假一切假無空無中而不假總假觀一中一切中無假無空而不中總中觀南嶽三種止觀漸次初淺後深如梯隥不定前後更互如金剛寶置於日中圓頓初後不二如通者騰空天台三種止觀漸次禪波羅蜜十卷初淺後深解頓行漸隨他空不定六妙門一卷前後更互解頓行或漸頓隨自他假圓頓摩訶止觀十卷初後不二行解俱頓隨自中修止觀前二十五方便一具五緣一持戒清淨在家出家大小不同二衣食具足蔽形即足隨食資身三閒居靜處不作衆事名無憒鬧四息諸緣務生活人事工巧伎術五近善知識外護同行教授三種二訶五欲一呵色欲男女形貌玄黃朱紫二呵聲欲絲竹環珮男女歌詠三呵香欲男女身香飲食香等四呵味欲飲食肴膳種種美味五呵觸欲男女身分及諸好觸三棄五蓋一貪欲蓋追昔五欲忘失正念二嗔恚蓋想他惱我忿怒相續三睡眠蓋心神昏塞烏暗沉黑四掉悔蓋作無益事心中憂悔五疑蓋非障理疑乃障定疑四調五事一調心不沉不浮沉繫鼻端浮安心下二調身不緩不急挺動肢節正頭直項三調息不澀不滑氣息若調則易入定四調眠不節不恣不可苦節復不可縱五調食不饑不飽安身愈疾處中得宜五行五法一欲欲離妄想顛倒欲得禪定智慧二精進持戒棄蓋初中後夜勤行精進三念念世欺誑可輕賤禪定智慧可重貴四巧慧籌量世間樂禪定智慧樂得失輕重五一心念慧分明見世間可患定慧可貴十乘觀法一觀不思議境謂觀一念心具足三千性相即空即假即中更不前後廣大圓滿橫竪自在故法華經云其車高廣二真正發菩提心謂依上妙境發無作四弘誓願愍己愍他上求下化經云又於其上張設幰蓋三善巧安心止觀謂體妙理常恆寂然名為定寂而常照名為慧經云安置丹枕四破法遍謂以三觀破三惑三觀一心無惑不破經云其疾如風五識通塞謂苦集十二因緣六蔽塵沙無明為塞滅滅因緣智六度一心三觀為通若通須護有塞須破經云其疾如風六道品調適謂無作道品一一調停隨宜而入經有大白牛等七對治助開謂若正道多障圓理不開須修事助謂五停心及六度等經云又多僕從八知位次謂修行之人知六即位次既不生上慢亦不生退屈經云乘是寶乘游於四方九能安忍謂於逆順安然不動策進五品而入六根引經同前十無法愛謂莫著十信相似之道須入初住真實之理引經同前十境三障四魔
