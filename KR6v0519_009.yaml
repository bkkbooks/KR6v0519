body:
  text: 天目山三學學人廣賓纂規製品像設廣大靈感觀世音菩薩尊像按李東瀛志準神異記載天福年間道翊既得奇木異香襲人膚理神色與凡木迥殊翊就竹竿巷雕塑匠孔仁謙造觀音大士孔剖之有大士像宛然天成不假刻削冠服具美慈顏婉好孔欲易以他木所為者翊輒夢大士云吾像孔已匿之幮庋中背面者是毋為致欺翊往迎果更別像乃以夢語諭之孔不能隱也按武林外史靈奇識云仁謙因其形似即造大士像既成妙貌莊嚴寶光煥發夜亡列燭之明晝掩曦輪之影其為神異不可格思邵生云大士之靈假乎像不依乎像也然法身本無限量今高二尺四寸坐相左右侍善財龍女並異香具足相好殿北擁壁今易木龕奉大士滲金銅像坐相高六尺左右並大士銅像嘉靖甲子寺僧平澗募造殿左右中架奉十六王子聖像坐高約四尺五寸左右後架奉十地菩薩聖像立高約七尺左右前架奉護法諸天像二十位立約二尺四寸殿奧奉彌勒應身銅坐像約四尺左右後古藏經廚內奉銅大士洎善才龍女約高四尺嘉靖年鹽官陳普惠為寺淨人專事殿之啓閉灑掃香鐙鐘鼓之役暇則喃喃經佛而已銖積日施三十餘金裝嚴十地諸天等像新飾廚龕易木座為石臺舊志紀之後殿奉丈六銅大士像嘉靖四十五年華亭大學士徐階鑄捨又奉千手眼大士像約量八尺減塑又銅大士坐像約五尺左右擁壁奉天台五百聖僧像增塑北面擁壁塑星宿海奉熾盛光佛藥叉大將下奉三大士鐵像坐約五尺白雲堂北磚殿奉毗盧遮那佛坐約一丈六尺銅冶金裝并蓮花四十八瓣亦銅也萬歷末年淮僧真寶募造前殿奉四天王天神增塑又彌勒應身坐像高五尺萬歷乙未平湖陸冢宰光祖造施護法殿奉韋馱尊天坐像高四尺五寸減塑鼓樓下奉阿彌陀佛洎觀音勢至銅立像高六尺三面塑擁壁鐘樓下奉地藏菩薩坐像高一丈洎左右十王立像高六尺並銅鑄伽藍殿中奉敕封福祐靈濟公像左奉大權修利華光周宣關聖諸神右奉五顯神等坐像祖師殿奉菩提達摩天台智者開山道翊尊者三坐像藏經閣上奉阿彌陀佛坐像東向奉千手眼大悲立像並約五尺餘高香山殿奉文殊普賢觀自在三大士三面擁壁塑香山勝境文昌祠上奉帝君坐像閣下奉定光古佛應身像三官祠奉三官大帝坐像高六尺國初僧録存翁和尚頂相一軸國公李景隆書贊崇禎己卯五月草八雲中房火廢姚少師道衍遺像存如淵房木商吳宗伯竊去自贊見贊類董方伯承詔建兩峯堂請像留白雲東院供具靈感大士內殿一座高二丈四尺深一丈二尺闊如之雕鐫彩繪精好光嚴古名最吉祥寶華龕也龕以內設百寶牀一座木類栴檀飾諸珍異長四尺闊二尺高尺許乃成祖文皇帝所供奉安大士真身於上背張屏扆上懸大圓智鏡幔以錦綺加瓔緌等飾龕以前橫安雕几几用磚面示有警也盛列彝鼎羅香華鐙燭之供龕以下琢石為臺高五尺闊二丈四尺深二丈左右納陛拾級而升石臺不遍處以木綴之臺端三面繞以闌干萬歷中雲間徐分司知白公蠲資整飾因禁一切人毋登龕殿溷泄真身使扃鐍之卒不能久也龕以外雜以罘罳伏蹕金絲幢幡掩映交羅氤氳繚繞其為殊勝不可名狀天順年製為聯曰福聚海無量是故應頂禮又髹漆經笥二又黑鈿香盒一又古銅牌二闊六寸長一尺琢經偈者又黑漆神位高尺許螺鈿嵌其字曰靈感觀世音菩薩是可稱山門神器也自天啓丁卯年舊住持興美寂嘉不交付下手所存凡大士祈禱出山古遺座前白銅軍持一具左右金螭為耳注淨水於中如誠感雨應則先夕先旦必水從瓶溢或泡沫泛躍斷斷無爽又座前香爐一花瓶二皆古銅者寺舊物也殿中大方爐一花瓶二古銅者太皇太后張賜施大方銅燭臺一對高五尺狀元諸大綬施廢銅報鐘一口大鐵磬一口古所遺者巨鐘一口約三千斤雲板一面約三百斤岐陽武靖王捨洪武十七年十一月二十七日住持惠隱鑄又銅籤筒一對每約二百斤太監劉捨洪武十五年住持妙修承領今廢其一又銅塔一座約高五尺成化草三年周太后鑄捨今奉安後殿殿前鐵爐一具約三千斤其製鑄以鼎蓋承以石臺泥不陷雨不濡也萬歷庚子織造太監孫隆鑄捨四月初八日浴佛古銅盆一崇禎年間住持通藏廢後殿前銅角端一具約七百斤即香爐也萬歷十二年平湖顧其忠鑄施崇禎三年暮夜被偷兒竊去其首其身鎔鑄供器五事見存藏經閣天王殿左隅磚紙爐一座方廣約一丈六尺爐亭石為柱約丈四尺天啓元年重建前此嘉靖中郡城孫立甃萬歷中錢塘李思明修爐基古公界地也近議香山殿牆外南地長三丈三尺闊九尺係福一山房己業衆以堆貯爐灰取便每春二月初三聽其房收化紙錢一日以為地稅古剎竿石柱一合每柱匾方高一丈在紙爐南大士行殿一座金彩莊嚴方廣四尺高八尺行則十六人舁之碑記宋洪內翰邁撰上天竺講寺碑曰華藏世界毗盧覺海萬億河沙諸佛菩薩均以大慈能仁闡豁悲願為出世導師而隨念融攝從聞思修使末劫有生持戴瞻仰如在其上者惟觀音大士為然自給孤靈山勝身贍部兜率毗盧之宮補怛洛伽之谷無量無垠魔區鬼窟未有不靈赫示化暢宣正機而放大光明覺有緣衆接物利人因病施藥直若家至戶到者惟錢塘天竺為然故其肇始於道翊師示夢於錢忠懿顯祠於咸平浮像於天聖易十方於妙臻還舊貫於元淨塵塵剎剎久而愈昭於是有靈感美名之錫當時寶光示現濬發兆祥絢爛隮升上徹霄漢湛然虛明普照四天知制誥呂夏卿龍圖閣學士沈文通寶文閣待制陳軒紀載於前可覆視也遭靖康孽火鞠為灰燼蒿目淺智意其復初為難人天護承否極必泰大駕南巡狩臨是邦紹開中興寧濟方夏雖英謨雄烈士業得以憑藉然𥥆冥沕穆非菩薩焉依凡請雨謁晴不嫌於屢故六七十載昭事愈飭傳序三聖年增歲加錫鑾和鈴薦往法駕捐內帑金幣俾建經鐘二樓會法安僧之堂羅漢之閣水陸之宇視所應為次第崇立孝宗創於西北隅啓十六觀賜之玉缶觚彝珠宮金相寶冠纓絡價值數十萬緡親製贊文特書兩扁終之以法輪寶藏聖安太上亦揭賁雲章今皇帝又申永作天台教寺之旨凡禪律賢首慈恩異宗毋得窺覦更易然後學者知所蒙賴是教也本於智者建化以妙為宗以如為體以法華三昧為極致以安養國土為依歸以止觀為修證之要蕩一切塵以空為觀立一切法以假而觀究一切法性以中而觀以五時八教判釋如來一代訓典訖於無生真諦超最上乘教海淵深義天高遠業空緣廢理勝惑亡等於太虛無惡不斷厥今水精之域圓滿清淨其門庭燁如其堂殿穹如其觀閣迥如其廂廡邃如羣居以智導迷人知選佛之場矣先後住持者曰惟日曰若訥曰師覺曰妙圭皆擢録教門實稱僧中龍象圭遺信求記不置既書之而又系偈言其詞曰北山鎮錢塘三竺分鼎峙西峯居上頭氣與下中異南無觀世音的以何年至至今無作相在此猶在彼雖自西徂東而實未嘗動法門元不二一一成菩提應生無住心了不滯空有以我清淨眼普鑒阿耨塵白日當空虛豈復留纖翳皇居尺有咫天近聖澤彌多羅蓮花臺不與昔時似高皇屈萬乘孝祖親製文玉觚寶瓶彝冠珞粲珠琲價值百千萬莊嚴不遺力誰言佛土遙小叩則小應炎天六七月要雨雨隨注乃至請晴霽應念便護感左右十六觀攝彼散亂心天台妙教宗永永傳真諦蕩蕩水精域化樂侔天宮太上及今皇瞻敬更無極咨汝白足士思報君佛恩善修成法身一證一切證譬如航巨海龍驤駕高檣無風送吹噓難擬徹彼岸珍寶祕幽谷虎豹嚴衛守無人為我先可到不可致菩薩具方便總持觀十方為巍大道場誓願遍應物紫金光結聚若非煙非雲闡宏慈悲心為汝衆生父念今聖天子與佛俱有緣拈花世尊前咸透第一義求闡無盡藏護國并福民剎那彈指間聞見悉成佛惟日暨訥覺於今妙圭師稽首大士前洗我綺語業元黃溍重建大殿記曰至元之三年寺毁於災惟聖像巍然獨存諸珍異服器亦無損毫末人以為是有神物陰護之亡何而主僧仲頤告寂延慶子思以五年夏五月來涖寺事謂復故莫先治殿以揭虔妥靈各探己槖出錢有差俄有大商獻巨楠六十有三尋收亡僧所遺錢緡田畝各若干而達官大姓相繼輸施於是隨木之植以選其材斂田之入以給其食量緡錢之多寡以經其費凡其制為間二十有四悉準其舊其崇八尋倍其崇而益尋有二尺以為修半其修而去尋有二尺以為廣功未竟者三之一子思以至正二年還四明之延慶本無由延慶出領兹山悉力殫慮圖終其役三年本無逝四年慧日自下天竺升補其處節縮浮費併裒衆施之羡餘完以圬墁飾以髹彤而前堂後室煥乎一新安奉如式纎悉畢備緇白之侶有所瞻依薦紳之流咸欣慶焉蓋天竺據羣山之奧乳竇峙其前白雲獅子雙檜諸峯拱揖其左右其外則襟江帶湖清淑所鍾神棲聖止光靈彰灼有以大庇乎斯人而杭在異時為行都旄頭屬車之幸臨宸章奎奏之裦飾寶冠龍符玉缶觚彝之賜豫燁其餘輝下賁林壑矧今昭代帝德所覆承護有嚴名香花幡中使狎至王公貴人至於閭里好事之家稽首募趨恐弗及宜不難於以壞為成然猶六更藏鑰三換主席乃克就緒某是用備記其廢興之顛末來者尚鑒於斯而扶植之俾勿墜哉夫大士以種種之形示現諸國土以巍巍之力饒益諸衆生非世諦文字可得而記之者不敢贊一辭也宋丞相李綱撰建上天竺天台教寺十六觀堂碑曰上天竺寺始自石晉天福四年僧道翊法師開山後忠懿王錢因感大士靈異闢舊基聿新之名曰看經院逮高宗南遷迭見祥瑞萬衆欽仰聖駕不時臨幸乾道元年二月住持若訥宣對稱旨特補右街僧録四月復進左街上竺録僧事者始此特賜御幣金帛鼎建十六觀堂以為止觀之所極其弘麗東宮親書扁額以賜曰超諸有海先是辨才淨法師於嘉祐熙寧間兩住本山兼統禪講二教律三宗賜詩褒美東宮復書歸隱之額聽其退居興福訥以觀堂之設厥功甚偉聖王之意惻憫佛法日就湮晦正欲闡明教觀虔修金光明懺法於智者乍興之時以續佛慧命訥自謂日逼桑榆不具紀述鐫勒貞珉則無以昭示聖明之令典時豫提舉洞霄宮倩豫托其寺之顛末以詔來者知所紹述不惟表章前聖之殊恩抑亦振揚如來之墜緒愚以西方聖人之教專以了明心性出離死生為事至漢明帝時方入中夏歷唐而宋授受殊軌惟曹溪頓悟上乘獨傳心印其次根器懸絶各立爐冶遂有南能北秀之別枝蔓興而宗旨微矣必也逆遡釋迦之正脈勿以止觀宣演為殊科止以精修默悟為實地其他如戒慧空假中半滿權實偏圓大小之論至於止觀之法亦有十六之差殊不知千柯萬葉本於一根千流萬派本於一源千經萬卷本於一理千態萬狀本於一心心外無性性外無心心即是性性即是心如千江月處處圓明不以水之闊隘淺深而現影獨殊如無塵鏡人人普照不以貌之黑白妍媸而鑑形少異此心性之本無不同均稟同賦皆可以成佛作祖也如登萬仞之山非一蹴之能至必由梯磴而可升其行步之疾徐皆由於足力之强弱雖到有遲速其同至於巔則一也如涉萬里之津非一息所能濟必假舟楫而可渡其登岸之後先各隨其帆檣之備否雖行分遠近其同濟於險則一也此猶根器之稟有不同而頓漸之教所由立也如大醫王對病用藥在在差殊故佛世尊隨機說法種種方便故頓者一聞千悟如真金落火重鎔迭鍊不損毫釐直是天生彌勒不勞心力到手圓成漸者如盲人走路覓響尋聲全仗指迷磨杵作針全憑鍛鍊者也學道之人若能不求言於言而求言於心不求言於心而求言於性不求言於性而求言於空則空空不已是之謂真空言言皆泯是之謂無言三藏靈文悟後全無半字大千法界個中普現真如是之謂大解脫是之謂最上乘是之謂真般若是之謂善知識是之謂正法眼是之謂無上覺斯能仰報朝廷列聖之錫豫重輝祖燈萬劫之光明也否則蘭若翬飛徒作心猿之檻穽窠巢喪魄以昏迷筌蹄山積空勞書蠧之鑽研糟粕入唇而吐去其不為鐵圍湯火之俘囚偏受冥途磔碾之果報者幾希請各猛加淬礪免教永墮輪回是為記宋次公楊傑撰辨才法師退居龍井記曰天台宗師辨才淨老坐道場者四十年指空假中以接人其心契於聖智具戒定慧以行己其德動於幽潛真有道士也初住錢塘法慧院之寶閣次住上下二天竺又住南屏之興教往來學徒踰萬人分傳教觀多能演其所聞開悟學者師平生未嘗輒有求於人然所至必有四衆依嚮莫不興感善其有所致也余在都下時見趙清獻公與師唱酬偈頌已知師之所存矣及觀蘇子瞻與師詩言其兒初弱不能行因禱師加護即壯而能行然後知師功行至矣師一日謂諸徒曰我筋力衰疲倦於應接安得幽僻處一菴地以養餘年檀越聞之曰師有退居之意我輩蒙其德不謂不久盍合擇可居之地乃於龍井山得敝屋數楹主者不堪其居願人為代以捨去於是請師居之又為師鼎新棟宇不日而成元豐八年秋被命陪高麗國公子祐世僧統訪道吳越謁師於山中乃度風篁嶺窺龍井過歸隱橋鑒滌心沼觀獅子峯望薩埵石升潮音憩訥齊酌沖泉入寂室登照閣臨間堂會方圓菴從容議論夕而後還異日遣其徒丐文以記其本末余為之記明蕭山魏驥撰湖山佳處記曰杭為兩浙名郡山水之勝無逾於上天竺咸謂山之奇秀寺據之矣孰知寺東更有最勝之處以草木蒙翳人跡不通其勝久祕今郡都綱性菴者嘗住兹寺課講之暇散策林下注目盤桓乃得其所勝水天一碧畫舫去而漁歌來歌聲欸乃而繞於東者西子湖也岡巒起伏獻秀騁奇若拱若揖而峙於南者乳竇峯也削翠巉巖參天錐立不異砥柱而屹於其西者雙檜峯也藂桂林立虯松夾徑清芬撲人而擁於其北者天香巖也性菴竊自歎曰天地祕兹靈境其有待於我乎吾其可舍乎哉遂於謝事之日芟荊剃棘作生塔於其中前搆室數楹以為晏息之所於以究竟其實際於以吟咏其性情適其所適樂其所樂與鷲嶺祗園者無以異也一日其甥閩憲副錢公過之以其勝也乃以前中書舍人王尹實篆古湖山佳勝四字額之逮浙憲使曾公聞之復如王中書所題隸古揭之楣間由是性菴之居曰湖山佳處者得名天竺山中也徵余記之余曰佛氏之教苦空為要一切有相皆無足以動其中雖巖居穴處茹木飲澗在在而得何暇計其居之佳與不佳哉諺曰天下名山僧占多非也殊不知貴戚巨家慕尚其教聞其有道者乃延之名山以居之耳彼何嘗有心耶若性菴以內宗外學之著聞衆延之於杭之梵天京之報恩今之上天竺也所居復何庸心乎哉以杭之名緇擬之若聖達觀之神異辨才淨之廣博孤山圓之清峻性菴殆兼之矣彼區區世相何足以混之乎今求余記者特以重人之標榜似不能忘情耳若謂有所執著非知性菴者也庵曰執事之言誠得我心願記之
