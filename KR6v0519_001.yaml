body:
  text: 天目山三學學人廣賓纂普門示現品側聞應化無方選此方之教體隨緣弗類攝同類之機宜豫竊惟之有深意爾夫南海蓋善才所參小白華也凡天下之願躬謁者視鯨波鼉浪為忠信可憑則千萬人中無幾矣惟西湖乃天竺所飛小靈鷲也凡郡內之指首屈者推岑蓮月桂為仁智攸耽則南北峯間其最矣於是我大士閔五季刀兵之劫妙三吳山水之區巧示普門即坐不垂堂者麕至適衝都會兼遊偏挾伎者飈來信未信在人縱遊戲於佳麗繁華之地仁不仁由我盍範圍於慈悲喜捨之天是以赫赫厥靈而羣趨並望班班斯著而曲記特書此直垂慈眼視衆生何異痛心呼父母哉故經云欲識佛性義當觀時節因緣其斯之謂也志示現自在功德章元盛熙明纂曰釋典所載菩薩名號如恆河沙數不可勝計惟觀自在洋洋赫赫功德獨顯乎世間凡遇厄難竭誠稱念稽首請命亦往往如影響誠由行願弘深大悲無礙之力也廣如藏教今略陳之梵云阿哩耶婆盧吉帝此云聖觀世音又梵云阿縛盧枳帝濕伐羅此云觀自在諸經所稱或單云觀世音或云觀自在或兼云觀音自在觀音三昧經及大悲經悲華諸經説此菩薩久已成佛號正法明如來又云後成正覺號遍出一切光明功德如來楞嚴經云觀世音菩薩言我昔於無數恆河沙劫有佛出現名觀音教我從聞思修入三摩地初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前忽然超越世出世間十方圓明上合十方諸佛本覺妙心同一慈力下合十方一切六道衆生同一悲仰由我供養觀音如來蒙授如幻聞薰聞修金剛三昧成身三十二應入諸國土所謂佛身獨覺聲聞梵王帝釋自在天大自在天天大將軍四天王及天王太子人王長者居士宰官婆羅門比丘比丘尼優婆塞優婆夷女主童男童女天龍藥叉乾闥婆阿修羅緊那羅摩呼羅伽人非人等我於彼前皆現其身而為説法令其成就令諸衆生獲十四種無畏功德彼佛歎我善得圓通法門授記我為觀世音號由我觀想十方圓明故觀音名遍十方界法華經云若有衆生受諸苦惱一心稱觀世音菩薩名號即得解脫若水火雷電龍蛇惡獸夜叉羅剎王難枷鎖軍陳怨賊諸難之中能施無畏於苦惱死厄能作依怙現三十二身隨類説法地獄鬼畜生生老病死苦以漸悉令滅大悲心總持經云若有誦持大悲咒者即滅百千億劫生死重罪不墮惡趣臨命終時十方諸佛皆來授手隨願往生諸淨土中能獲無量等持辨才解脫八難滅除三毒一切所求無不成就大悲總持具載別本藏教密乘經中所載觀自在菩薩為蓮華部主現諸神變忿怒則稱馬首明王救度則聖多羅尊滿諸願則大準提尊及如意輪王不空𦊰索乃至師子吼并毗俱胝一髻青項白衣葉衣千首千臂皆有儀軌真言略舉其名若西天未譯番本師傳本續真言要門未易悉究靈奇識按武林山內七識曰上天竺觀音菩薩之示現也蓋僧道翊石晉天福間結廬西峯見瑞光發於前澗劚得奇木高數尺一奇也命工孔仁謙不他像擬因其形似即造大士像因緣正湊出現呈祥二奇也聖像既成妙貌端嚴白光煥發夜亡列燭之光晝掩太陽之影人民崇信三奇也後漢乾祐中僧從勳自洛陽來持古佛舍利一顆曰吾寶之久矣今願置菩薩頂相中神靈一合四奇也北宋人民有靈感二字南宋加號大慈悲救苦難後法照托大悲經加廣大二字天下觀音同而此號天竺獨五奇也靈感録唐僖宗光啓三年丁未時中原鼎沸黃巢李克用等屠戮生民戰爭不息杭州臨安人錢鏐膂力絶人有保障兩浙之意起自草野奮梃一呼驍勇雲集殺弘誅昌吳越安堵至是以屢建大功立為杭州刺史從民望也既拜官痛加砥礪衆益欽戴誓奠安東南不使有一夫之警猶豫未決夜夢一婦人語之曰汝有心慈悲不忍殺人將藩翰一方百戰不衄中原天子雖易五姓汝之疆土固自若也福祿遐永子姓綿遠圭組蟬聯封王拜相莫可涯涘二十餘年當覔我於天竺山中鏐覺而異之自是所向無前屢有神助種種響應若合左券故書之於策昭示子孫世世崇祀四世五王與五代相終始後錢俶納土於宋聯姻帝室通籍金門振振蟄蟄冠絶區宇而大江東西鹿苑寶坊翬飛雲湧以千計皆錢氏所創職此之故也而上竺看經庵則其所發軔者云黃巢作亂所過殺戮其城血流半天下一日忽至杭民無所竄匿哭聲震原野所恃以為扞禦者惟錢鏐一人而已老稚幾百萬人泣拜大士願乞垂慈冒怙巢將入境鏐振兵拒之甚力巢亦素聞鏐勇武方欲格戰聞空中有念佛聲仰視雲端旌幢寶蓋擁護大士其火首金剛天龍修羅等衆扈從無算鏐兵見之氣壯百倍巢歎曰此佛士也戒戢羣下遂逾日而去由是鏐益篤信大士以為神武而不殺者焉唐昭宗乾寧元年春正月越州董昌作亂焚府庫殺官吏浙人震駭竄匿橫罹鋒刃者甚衆杭刺史鏐躬禱大士以祈默佑乃仗鉞出兵方對敵之際空中忽聞萬騎馳驟之聲昌一見禠魄不俟接戰即斬首俘馘而越中底定矣遂進爵為鎮海節度使唐天祐四年朱溫改名曰晃受禪於唐國號後梁改元開平鎮海節度使錢鏐欲舉兵討溫復詣大士禱而決之夢大士以火而詔之曰汝有大功德於民能救拔百萬億蒼生於刀山劒樹之中當獲莫大果報第保守境內不可輕動賊斷不敢犯不旬日即進爵為王也未幾而吳越國王之命下矣吁可異哉後唐長興三年壬辰三月吳越武肅王錢鏐卒中子元瓘立素畏朱全忠之酷烈凶殘不遑寧處乃出居別館齋戒浹旬徒步拜叩大士冀得夢兆以破其惑忽夢邑之山林皆被錦綺光彩晃耀天日瓘喜躍此吾先王時事也吾當奠枕鼾睡耳彼胡其奈我何哉錢忠懿王嘗夢白衣人求葺其居曰能昌爾國厥明訪知惟天竺大士衣白因建看經院崇奉焉此上天竺祈夢之始宋太祖建隆元年吳越國王錢俶以太祖即位進止未決乃禱於大士以求指迷齋宿殿中夜夢紫衣神人命金甲將校數十百人持綵繩由楊子江北岸以繩隔界直抵豫章閩越而止急呼俶詔之曰此汝故物也復俾以袍笏冠冕無算覺而喜曰吾無恐矣即擇日上表獻圭璧儀物稱賀帝大喜賜宴詔使者歸報爾主朕將倚彼為籓翰以翊贊至治當不負前勳也已而毫髮不爽王頂戴益虔聿新殿宇像設以答靈貺開寶五年夏五月大雨河決帝禱於天地鬼神益雨羣臣有言上竺大士之靈異速遣中使馳驛齎香虔禱之數日天即開朗河流亦復止塞逮中使歸詢之即至杭既禱之明日也嗣是凡水旱疾疫必禱焉太宗雍熙三年五月帝以曹彬有白溝之敗見辱於契丹遣中使詣上竺致禱於大士以求神助張齊賢遂有代州之捷諸將遙見火光中有金甲大將長數丈許立於雲端持赤幟揮霍虜望之膽落魂消辟易奔潰真宗咸平元年給事中張去華守杭正月至五月不雨遍禱望旱彌甚迎大士於梵天寺率官寮拜禱之雨隨澍四境沛足咸平三年夏大旱浙東天台講宗四明尊者知禮同遵式修護國金光明三昧懴三日九雨明州太守蘇某為碑頌其德大中祥符九年九月蝗飛蔽天帝以連歲旱蝗多方捕瘞不能止遣中使禱於大士是月晦日午時赤日杲杲忽黑雲起自西北迅雷掣電雨雹疾於矢石聲如銃炮蝗蝻堆積川陸高數尺許帝甚神之而天書之説益信矣仁宗慶歷八年曾公亮丁內艱扶柩歸泉南道由錢唐有鄉僧元達附舟來禮大士於天竺忽於松行間見女士靚妝雅服問達曰上座從曾舍人來耶舍人五十七入中書上座亦受大師號語訖不見後服除還朝嘉祐元年亮位參知政事達亦賜號寶梵大師果如其言英宗治平二年秋八月三日都城大雨水泛漲下詔求直言宰相曾公亮嘗因虜陳知杭州沈文通奏天竺看經院觀音大士始自石晉至今福天下澤生民前後靈迹甚著上命禱之其雨即止賜曰天竺靈感觀音院端明殿學士禮部侍郎蔡襄書額及襄繼守是邦一新院宇高宗紹興四年冬十月帝憤數敗於金人無以自釋乃卜日齋戒遣中使齎疏懇禱於大士以求救拔天下元元之命於塗炭鋒鏑之中即日手敕韓世忠力圖報效以雪國家不共戴天之恥世忠拜命感泣誓不與虜俱生候金步卒親提大騎兵駐大儀會朝廷命魏良臣使金給良臣有詔移屯守良臣出境即上馬令軍中曰抵吾鞭所向移軍大儀勒伍陳設伏二十餘所約聞鼓起擊金兵聞移屯之説喜其兵退擁鐵騎掩擊世忠麾旗鳴鼓伏兵四起各持長斧揕入斫馬遙見大兵數百萬計雲擁而至蹂躪溺死者以萬計遂至大捷史稱為中興武功第一殆亦有神助之力云紹興五年夏大旱遣杭州府守迎天竺觀音於海惠寺禱亦不應時六月中有苦行頭陀潘法惠默禱願焚右目以鐵丸燒紅置目中然香其上香焰起行雲滿空大雨霑足法惠眼即枯後三日夢白衣女借一珠拒不許有二僧在旁曰與不妨自今六六送還至七月草一日又夢二僧來請赴六通齋白衣女在前引導山川蔚然百果皆熟紛紛而墮惠就地拾食心地清涼忽白衣女擲一彈正中枯目失聲而覺枯眶內已有物若珠瞻視漸復舊數其再明卻三十六日始悟六六送還之兆紹興二年兩浙進士類試於臨安湖州談誼者與鄉友六人謁上竺祈夢是夕誼夢以茄為餽惟徐楊者夢食巨蟹次日詳之謂茄者俗稱落蘇蟹者黃甲也陽果登科後二年誼復與周元者赴漕司舉又祈夢於寺是夜元夢鄉人徐廣之持省榜至凡列三等已為中等第一已而賀客四集有道士在焉明年省試罷還吳興待榜路逢徐廣之已而省榜至元果中等於吳興為一既歸賀客中一道士素昧平生元詢之對曰去年君過我卜豈忘之耶凡事一與夢符偽齊劉豫同金虜入冦高宗下詔親征九月親詣大士殿焚香供禱仰祈默祐顯現天兵蚤平北虜既而淮東宣撫使韓世忠敗金人齊人於潤州方對敵之頃虜見我師行陳之上雲端金甲神將數十餘身長二丈許目光炳耀威勇異常虜知為天應神祐不戰自卻故人馬自相蹂踐填河蔽野其敗衄特甚世忠獻俘行在具言其故是以知之世忠因陳戰沒之人乞加贈恤上蹙然曰死於鋒鏑誠為可憫即敕直學士胡松年具詞建水陸大齋七晝夜以薦度是夕見鬼神來者甚衆有夢戰死者咸欣然相慶以為自此得生善道理宗嘉熙四年正月辛未彗星出於營室復以流星見於營室史占曰彗見災莫大焉帝甚憂之亟下議己之詔播告中外乃遣中使齎香疏懇大士以消弭天變是夕也有光出自大士頂間直貫營室結為卿雲凝聚不散者久之而彗滅矣元至正四年八月住持東溟日法師時以承平日久海內兵革騷動特建安國福民道場三晝夜以祈消弭兵革於乍萌之始衆僧方宣疏禮拜忽覩五彩毫光發自大士頂間照耀殿庭已而直沖紫霄凝聚搖曳萬人屬目贊歎希有至正五年張士誠據蘇州縱兵焚掠將入佛國山抵行春橋忽有泉自流虹泉湧出自高一丈許崩崖堙谷勢轟雷電賊相顧以為有神力所致驚歎而返由是亦不敢妄殺杭州藉以稍全性命或者以為慈雲祖師猶能顯水觀之靈禦此暴耳至正二十年杭城薦罹兵燹西山寺宇盡毁聖像不知所在衆共追慕丞相太尉開府康里公出金旁求乃於草莽中得之遂卜日齋戒徒跣率僚佐士庶自北關門恭迎聖像安奉今丞相公所建清平山之西天寺中時聖像上大放光明照耀雲漢分為三道其一遠屬東方若向普陀山者其一屬上天竺寺其一徑屬今西天寺一時咸覩益加敬仰焉吳元年夏三月不雨禾盡稿死郡守王與福竭誠致禱上天竺大士甘澍隨車而沛禾復有秋皇明洪武七年六月大旱參政徐本李賢王德宣同誠徒步入天竺寺叩祈大士雨隨沾足景泰六年夏兩浙天久不雨禾稼將稿四民倣徨無措時鎮守都知監阮公會諸都閫藩臬重臣遂與同鎮守兵部尚書德興孫公齋沐六月既望徒跣躬詣上天竺寺奉迎靈相至仙林建壇禱雨即日陰雲四起至日晡甘雨大澍明日如之又明日亦如之致兩浙之地禾黍芃芃枯稿即蘇民咸歡忭鼓舞由是公大感靈貺念無以酬即捐己資重建行龕洎製冠服及諸供具而莊嚴之仍奉送以歸成化丁酉年夏兩月不雨鎮守太監李公義齋心潔行三日而走大士之前為民請命意勤辭懇冥漠潛通旋軫之際陰雲布興甘雨如注稿者聿蘇仆者旋起遠邇交忭三農謳於野商賈謠於市官府文於詞士林聲於頌公乃大出帑金鼎新大士殿天王殿鐘樓普門圓通門以昭答大士之貺弘治癸亥歲旱不雨鎮守太監麥公憂勞萬民爰以七月二十四戊子奉迎金身自天竺而來至於海會寺道經鎮府赤日停午忽有片雲如蓋隨仗而至驟雨傾注若翻盆然明日己丑陰雲竟日庚寅辛卯皆微雨壬辰奉以歸則又雨豈非大士之靈乎嘉靖己亥歲水旱薦災郡守陳仕賢憂切民隱精誠率僚屬走上天竺密禱大士若痌瘝在身雩禜輒效民咸歌誦之嘉靖壬寅閏五月旱既甚郡伯希齋陳公閔民無辜齋沐率僚屬吏民微服徒跣躬迎大士奉安海會寺晨夕展敬越四日庚午夜僧綱良縉夢大士語云甲戌日有雨至期雨如注明日再雨原野霑足天竺道場凡遇二月十九日為大士誕辰遠近人等先期齋戒入山不翅億萬衆殿宇不能容皆露坐達旦名曰宿山嘉靖甲寅年誕期星月昭朗忽見白鸚鵡自殿中飛出翱翔旋繞於太虛之上萬人矚目贊歎念佛之聲振撼林木山谷響應如是者迭現數四杭城有王姓者患瘡瘍告許燈油苕帚病愈拜還其人乃衣冠之士方詣大士焚香稽首所施物為惡少盜匿已而廉得其人將理於官盜畏罪倍償而釋之王有女孩驀自言曰今日父親還願許人酒食財物菩薩慈悲奈護法伽藍拏我要去之急更備前物至寺求懺謝伽藍而女孩蘇醒問之云如夢中莫之知也上海有潘姓拉里閈三數輩進香舟次崇德河下見鄰船少婦謔視之精誠已蕩既歸弭棹黃浦其人忽墮水衆力挽乃出幾於不救遂驚悸成疾彌月問諸巫巫曰汝往天竺中途淫媟良家婦神瞋汝不敬遣鬼擠之得土穀神哀求獲免可往祭告庶獲有瘳如其言始半復嘉靖二十四年自春徂夏亢陽彌時田疇龜坼瀦澤塵飛米價騰涌僵死蔽野方伯九畹謝公乃命郡別駕仁和錢唐令素服徒步入天竺迎大士設壇於海會寺祈禱越明日淨瓶水微湧出果得微雨又明日水大湧出遂果大雨金庭子作頌夷堅續志云上天竺觀音像身披瓔珞皆宋朝御賜七寶為之五色璀璨實為希世之寶杭州歸附後為七寶瓔珞夜有神光為異物取之以供朝廷至京則晦而不明乃祝曰如七寶欲回天竺期以某時色再光明至期果神光燭天遂遣回天竺萬歷八年五月淫雨大水當道迎大士入城致禱三日後隨應萬歷十六年春大雨夏六月旱加以瘟疫盛行途路死者相藉上司府縣躬請大士入城虔禱屢獲響應三十六年夏五月大水秋疫撫臺甘士價率郡邑同請大士入城致禱輒應鼓樂冠袍幡蓋送歸天啓六年夏六月至七月大旱府縣請大士入城懇祝切效崇禎元年秋七月草三日海潮湧沒沿江居民久淹不退方伯董承詔率郡僚迎大士奉安海會寺為民請命仍獲有秋董方伯捐俸偕郡守萬國相邑侯王揚基建藏經閣以酬神貺悲仰贊宋孝宗天竺廣大靈感大士贊曰觀音大士以所謂普門示現神通力故應迹於杭之天竺山其來尚矣朕每有禱祈隨念感應曰雨曰暘不愆晷刻是有助於沖人者也因為贊曰猗歟大士本自圓通示有言説為世之宗明照無二等觀以慈隨感而應妙不可思宋理宗皇帝製靈感觀音大士贊曰神通至妙兮隱顯莫測功德無邊兮應感奚速時和歲豐兮佑我生民兵寢刑措兮康此王國宋郡守陳軒上竺寺記贊曰白衣仙人無住著補陀洛伽渺雲海為大導師安樂國歙然遍應河沙剎世界熱惱或有聞曾不旋踵垂覆護衆生心念非一種皇皇不足常有求如飢須食渴須水顧亦何從滿其願我觀聖心等太虛其視萬物猶一物細視一物如一身是身四大猶不有萬物何能作留礙殊功妙用濟十方欲求功用不可得羣生夢幻可兩忘爾固無餘我無欠嘗觀瑞像見寶光如淨明珠時白赤琉璃琥珀雜蒼玉熒煌璀燦照眉宇山頂或見初日升匹素曳空煙縹眇凡人顛倒作思惟須臾變滅無復初非空非色非有無菩薩應身亦如是堂堂祕殿表東南山君海王盡回向觀音智功不思議佛子當作何等觀元笑隱禪師大欣贊大士曰門門證圓通法法無差別文殊擇法眼云何示優劣如城之四門中道乃徑捷又如百川流大海悉融攝是故觀世音日用常三昧眼塵識和合世間相無礙盡空諸所有亦不壞三界隨其所應度説法示慈愛心地諸種子大小各不同時至雨露滋發生均化工幻師一毫端幻相三十二而彼諸應心即我自心是觀心而覩相心相而寂滅稽首常現前證我如是説又贊曰耳於六根功獨超勝况不耳聞反聞自性前塵起滅自性不動故諸塵用譬如大將遇變出奇金鼓旌鎧錯置逆施稽首大士證我三昧為我後人委曲垂誨三十二應十四無畏隨感而通分身異類如天元氣四時運行萬物藝藝莫知其生我觀畫師毫端遊戲即是神通現相不二我眼見像如聽法説心精遺聞均一解脫心佛衆生同證無礙不立一法名觀自在國朝空谷景隆禪師贊大士曰聞思修入三摩地以智觀照世言音不從耳根墜塵識是故尊號觀世音聞塵聞性無所住智體本來無起滅是故寂滅常現前超證圓通無異等導師亦號觀世音因果符合無差別慈育衆生如赤子亦如赤子同悲仰分身應現十方界如幻如化無去來反觀聞性常寂滅頓使衆生離諸苦施諸無畏不思議無功用行而成就聞極疑聞無所有法法圓融無罣礙譬如明月當秋空光明應現一切水水月曾無應現心無作妙力之所感六根互用等無別前後中際不可得盡聞聞性充法界是故有求無不應感應頌國朝浙江提學副使吳江趙寬觀音感應頌有序弘治癸亥歲旱不雨鎮守太監麥公憂勞萬民用周禮索鬼神之義遍雩於上下及釋氏念觀音大士以慈悲為道爰以七月草四日戊子奉迎金身自天竺寺而來於海會寺道經鎮府赤日停午炎光赫曦忽有片雲如蓋隨仗而至驟雨傾注若翻盆然明日己丑陰雲竟日庚寅辛卯皆微雨壬辰奉以歸則又雨雖不能溥且足亦可謂奇矣豈非大士之靈乎非公精誠之感乎然不能溥且足何也大士果有靈乎則蒼生不勝大願願溥也願足也遂作頌曰惟聖惻惻濟利為德惟神不測變幻空色感則斯應應則未溥殆是變幻貿眩下土胡不大之遍灌十方俾出火坑咸就清涼忍視衆生受諸苦厄大慈大悲無量願力金庭子感應頌并序嘉靖二十有四載自春徂夏亢陽彌時田疇龜坼瀦澤塵飛米價騰踊僵死蔽野兆人有不測之變方伯九畹謝公躬率百司禱諸山川社稷之神復用諸方士符咒之術而燔灼益甚乃命郡別駕暗齋羅公仁和令後岡程公錢唐令蘆溪龔公素服徒步入天竺佛國山具儀仗迎觀音大士於海會禪寺諭都綱良縉上竺住持惠琳道顯董諸比丘昕晡齋沐諷經務期昭假先是祈禱皆以淨瓶滴水為驗越明日瓶水微湧點滴如珠果得微雨又明日水大湧出遂果得大雨金庭子見而異之敢作斯頌以彰大士之神應云頌曰乙巳之夏火入南斗稿苗斯焚百姓疾首三月不雨旱魃降殃巨津為塗若墮火坑巫覡舞雩靡神不舉天不悔過赤地千里方伯曰嘻爰禱大士濟濟庶僚從如歸市輿衛擁護壇於吳山惟衆比丘厥誠孔殫淨瓶一滴化為甘露利濟大千歡聲載路大士神靈其應如響發大慈悲萬劫瞻仰尚寶卿六橋徐江山禱雨靈應頌有敘觀音大士以慈悲廣大之力靈庇兹土有日矣故旱潦輒禱禱則輒有殊應嘉靖壬寅閏五月旱既甚我郡伯希齋陳公閔民無辜乃齋沐率僚屬吏民雩城隍不雨雩山川庶神不雨觸土龍舞巫覡愈不雨公曰周禮荒政索鬼神雲漢之靡神不舉皆憂旱者之當務也吾聞天竺大士靈驗屢著盍往請之卜日丙寅公微服徒跣盛旗幡鼓吹奉迎大士恭安於吳山之海會寺肅香楮晨夕展敬焉越四日庚午夜僧綱良縉夢大士語云甲戌日有雨至期僧庶駢集以俟雨日亭午淨瓶水上沿楊柳滴下津津如貫珠然未刻雨如注明日乙亥瓶水滴薄暮再爾雨如注原野沾足矣是非大士之顯靈哉公之精誠昭假有足徵也嗚呼休哉謹再拜而作頌曰於赫大士濯濯厥靈旱乾水溢靡禱弗徵歲閲壬寅閏月維五旱既太甚千里焦土郡守陳公憂心殷殷肅爾寅恭雩兹庶人瞻彼昊天杲杲日出我心靡寧憂心如炙公謂黎民舍爾土龍豫索爾神曷其弗宗其神伊何觀音大士厥像孔嚴於天竺寺乃肅香帛乃率羣僚郊焉迎焉翩其旟旐惠然來思登歡喜地載拜載祈陳詞獻醴吉日庚午彼僧都綱爰夢大士如在洋洋其夢伊何於時語語五日為期甲戌斯雨僧庶咸集如林如丘有淨者瓶津津溢流瓶之罄矣其雨溼溼既優既渥自未至戌明發再興瓶水猶滴此日而晡雨彼原隰民曰休哉膏我黍苗何以致之陳公之勞自天降康我公之賜公曰匪豫讓於大士巍巍大士大慈大悲澤我蒸民孔惠孔時振振陳公式廉式愛通於神明厥澤孔潰維神之靈維公之誠維誠維假俾民亟寧維神斯依公歸弗有我作頌言用詔而後喜雨詠成化年中省城迎大士禱雨輒應性菴法師永顧率衆而詠曰去歲祈晴格上蒼今歲祈雨應非常才迎大士離三竺遂喜甘霖沛八荒甕內不須留蜴蜥道傍先見舞商羊應知上相誠心切頓使南方旱魃藏六合濃雲連海嶠一竿新水滿池瑭芃芃禾稼沾殊渥靄靄桑麻異衆芳野老騰歡歌歲稔山僧作偈誦時康人心自與天心合法運還同國運昌兩浙江山增氣象萬家謠誦樂虞唐偉哉功業垂千古好刻貞珉示不忘禱雨篇萬歷乙巳夏六月迎大士入城即時滂沛錢塘邵重生喜而歌曰蒼天烏乎虐下土驕陽亢魃不肯俯大士出山下民主感格未通心未普油然沛然欲成雨敲松擊瓦點可數孰能漏天不復補孰能立海若神禹感天旋日不旋武使我為農亦為圃襲衣百拜不敢侮小社大心在區宇楊枝涓滴我願吐伽瓶洋溢吾所怙匹夫之誠未狂瞽小兒青龍白龍亦同舞其時都城集千小兒齊唱謠曰青龍頭白龍尾小兒求雨天歡喜點點落在苗田裏故末句云然
