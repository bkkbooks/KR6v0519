body:
  text: 天目山三學學人廣賓纂宰官外護品側聞遊諸國土現宰官居士之身治此郊圻擅外王內聖之學心勞密行蹟著異聞乃若朝廷屢寄以麾符天下並思其風采刳心檀度刮目藻揚斧斤土木而適合時宜翰墨文章而善弘佛事是皆莊嚴淨聖之覺場表帥蒸民於神道者也況兹大士旱乾水溢凡禱捷臻饑饉菑傷有蘄響答山川之祀陰恃以祈天兵革之鋒暗彌於向日五馬望塵遙拜雙龍載路羣歌得非民命是憑政聲斯藉者哉加之道德所居慈悲兼獎蘇趙作家而神交臻辨賈秦誤國而心服晦圓別多折攝之方綽有經權之妙遂令津梁後進城塹當時虛心咨請者忘疲極口頌稱者匪妄外侮攸禦非類自悛故曰孔門有季路使惡言不入於耳也志外護師友宋趙抃字閲道熙寧三年四月以右諫議大夫給事中資政殿大學士知杭州十年五月再守杭與天竺辨才法師道契嘗贊之曰阿師去天竺山空鬼亦哭天竺師復歸道場生光輝及致政會於龍井號二間人作間堂志其事宋蘇軾號東坡居士熙寧三年六月以直史館通判杭州元祐四年三月以翰林學士出守杭州一日訪辨才不值題白雲堂壁曰不辭清曉扣松扉卻值支公久不歸山鳥不鳴天欲雪捲簾惟見白雲飛嘗以幼子蘇逮效靈運故事剃度天竺觀音前權寄緇褐後遇恩奏逮授承務郎乃以度牒一道另度一人贖逮回嘗具奏詔慈辨法師從諫住上竺弘天台教觀當時人立公生祠於靈鷲寺後宋秦觀字少游元祐初纍遷國史編修官與天竺辨才方外契深有游記龍井記神異記唱和記又寫辨才龍井十題詩遺其徒懷楚刻石宋李偃政和五年以起復集賢殿修撰為徽猷待制知杭州嘗訪上竺宣梵珍法師值諸塗而立談因建植杖亭紀其事宋尹焞字彥明紹興中召為崇政殿說書權禮部侍郎在朝班時嘗迎天竺觀音於郊外有問何以迎觀音為對曰此西方大士也衆皆迎敢違衆咨請郡守蘇子瞻嘗問辨才法師曰此山如師道行幾人辨才答曰沙門多密行非可盡識高麗國王弟僧統義天者慕法留滯朝廷以其國母思憶促其歸時義天問法上竺慈辨諫法師輪下諫諭之曰高僧道紀負經游學以母不可捨遂荷與俱謂經母皆不可背以肩橫荷今僧統賢於紀遠甚豈為經背母使憂憶乎義天於是有歸志有貴客謁柏庭月法師問何以安心月云心本不動又問法華經藏答云當處全彰王孟公請益上竺咸法師以十六觀義咸曰佛在十萬億剎外而提封不越方寸若克循觀道則往彼非遙也資政學士鄭公問咸法師楞嚴八還之旨咸曰迷心為境八法瞀亂達大觀者一念自反郡太守入山見池中紅蓮問咸法師曰既是白蓮社因甚卻開紅花咸曰山中并喜君侯至任是無情也改容守又指看經羅漢曰既是無學如何看經咸撫羅漢背云何不祗對趙彥肅嚴陵人登慶元進士洛學之翹楚也嘗謁上竺印法師問如來出世先說何法印曰示生同居先苦諦也又問諸大乘經多奇詭駭人來至法華何其平易印曰羣機未熟必先動蕩機熟會入衒駭何為自是深識時教大旨初彥肅好詆佛氏此後嘗謂門人曰法恩逾於父母非小子所知也秦檜嘗問上竺圓智法師止觀之義一法耶二法也智曰如水湛然而清者止也可鑒鬚者觀也法界寂然名為止寂然嘗照名為觀豈有二耶陳行婆見慈辨諫法師師問修行許久婆稱修行多年師問曾見阿誰婆稱多見善知識師問如何指示婆曰直截根源也不看經也不念佛師云錯了也因為說法婆既信服又示以二頌信施五季錢忠懿王弘俶文穆王子也以石晉天福四年道翊所創觀音像菴感夢大士曰吾居處甚陋覺而廣其殿宇改額曰天竺看經院王為人崇信大法前後造寺數百及歸朝以愛子為僧宋張去華襄邑人咸平元年以給事中守杭自正月至五月不雨躬迎大士奉安梵天寺禱之甘雨隨澍因作諸福事宋蔡襄治平二年二月以端明殿學士禮部侍郎出知杭州府時宰相曾公亮以錢十萬委襄為扁襄為書所賜院額揭之殿楹宋陳軒字元輿建陽人紹興元年八月以龍圖閣學士知府事奏上賜以祠牒并蠲兩浙祠廟錢修造令轉運胡宗哲張綬主之極其壯麗四年軒移金陵慈辨以書求記寶文閣待制李琮為立石宋丁謂封晉公以蘇人擅移皇堂貶崖州司戶恐禍不可測道杭祈佛飯僧於上竺手為疏後以此疏寄京師知己至達睿見因得不死亦佛之借力也宋相國吳履齊淳祐九年九月給省劄減下沙莊沙場沙地八分稅之六宋待制韓大倫景定五年述其大父莊敏公舊施平江府許墅莊田二十頃自作記以勒石宋秦檜與上竺圓智法師善檜嘗問智以止觀之義智為開諭甚簡而明檜悅乃拜隨施錢五萬緡為修建上竺觀堂邵山人曰按此檜殺嶽飛惡聞嶽字之時知有佛法矣在檜不肯露報應悔懼之意在僧不敢露解寃釋結之情但借應對以為施豫漸近佛家以冀冥護檜立心作意陰暗如此元別兒怯不花至順元年由廣西都元帥為江浙行省參知政事次年拜左丞相行至淮東聞杭大火仰天揮淚曰我不德纍杭人也馳赴鎮録以賑恤之每遇霪雨亢旱輒恭禱天竺無不響應著作五季皮光業襄陽人日休子也貞元初為鎮海軍節度使推官後轉兩浙觀察使為撰上天竺觀音看經院靈應記存宋李照時以大中祥符七年由集賢學士出為杭州司理撰天竺看經院靈感觀音聖像記甚詳後燬於兵燹不存宋蘇轍字子由纍官翰林學士門下侍郎元豐三年謫高安又自績溪召還道歙由錢塘追訪子瞻遺迹十月八日遊上天竺念子瞻昔與辨才相好尚隔南山作三詩寄之辨才卒子由為塔銘宋楊傑無為人元祐中為侍郎與辨才法師分洽為撰諸記十題和詩并序嘗館伴高麗王弟義天問法慈辨法師贊其能滿所望作禮而去宋宋之瑞光祿大夫也淳熙中撰上竺慧光法師若訥諡宗教廣慈大師普照塔銘宋趙時逢官提刑紹興五年二月甲寅住持妙圭建千佛閣成逢為之記宋李綱高宗南渡建炎元年召為尚書右僕射擢居相位才七十五日朝綱軍政肅然振飭為黃潛善汪伯彥所讒遂罷提舉洞霄宮孝宗乾道元年召上竺若訥法師入對稱旨發幣金建十六觀堂綱撰碑文以表章之宋洪邁煥章閣學士也慶元四年九月詔住持妙圭立寺碑邁為撰文并書宋陸游字務觀寶謨閣待制也開禧元年詔上竺前住持兼左街僧録妙圭再住上竺前後共二十二年上嘉其行解御書復菴之額以旌之殆與若訥接武揚休者也游為記并書宋樓鑰四明人吏部尚書內翰也開禧二年七月草二賜錢建十六觀堂成鑰為之說宋文禮天目禪師也嘉定元年述十六觀堂舊記并為手書宋程公許刑部尚書兼侍讀學士也嘉定十六年撰上竺右街監義思義塔銘朝奉大夫起居舍人兼直院牟子才書宋林希逸官中大夫直寶文閣學士為撰上竺住山允憲法師塔銘宋尤焴修史內翰也淳祐十一年理宗御筆特書法照賜號佛光法師焴為恭跋宋文及翁纍官朝議大夫禮部尚書兼直學士院兼修國史實録院同修撰兼侍讀為撰上竺佛光法師慈應塔銘元黃溍義烏人博極羣書發為文章如澄湖不波一碧萬頃纍官侍讀學士與上竺東溟竺隱諸公有方外交嘗撰殿記元盛熙明龜兹人乃祖乃父生居西域世與佛鄰善誦佛書深達梵語嘗禮普陀山上天竺大士親承瑞應乃纂四品曰自在功德曰洞宇封域曰感應祥異曰興建沿革國朝宋濂金華人為國初佐命功臣官翰林學士嘗得法千巖和尚世傳為永明後身凡法門文字多出其手嘗為上竺日法師塔銘姚廣孝吳郡人初為沙門嘗僑大明山居選侍成祖文皇帝起靖難兵官至資善大夫太子少師兼修國史嘗為生隱道法師塔銘楊復吳興人纍官中順大夫大理寺少卿正統己未為上竺都綱止堂山法師塔銘禮部郎中兼翰林院侍書錢塘蔣暉書商輅淳安人蓋資德大夫正治上卿太子少保吏部尚書兼文淵閣學士制誥經筵官也成化丙申為上竺撰鐘樓記趙寬吳江人賜進士出身中順大夫奉敕總理學政浙江按察司副使於弘治癸亥為撰上竺靈感觀音寺記又述觀世音感應頌夏時正仁和人以南京大理寺卿致仕成化癸卯為撰上天竺修造記江瀾仁和人以賜進士出身翰林院編修文林郎經筵講官弘治庚戌為撰上天竺觀音後殿記魏驥蕭山人以資善大夫南京吏部尚書致仕奉詔進階一級九十六翁成化丙戌為上竺都綱性菴顧法師撰生塔銘又湖山佳處記徐江山號六橋官至奉訓大夫尚寶司少卿嘉靖壬寅夏五月為郡伯陳希齊公禱雨天竺甚響答作靈應頌諸大綬山陰人進士及第翰林院修撰承務郎嘉靖壬戌為撰雷侯柏山公遺愛堂記旌舉宋呂溱皇祐三年以起居舍人守杭州謂天竺住持甲乙相承為不稱特奏以聞仁宗乃詔南屏法師梵臻弘天台教觀宋孫沔皇祐五年以直閣學士給事中知杭州延禪師幻旻住持上天竺繼以禪師智月開堂提唱宗風凡十年宋沈遘字文通皇祐七年八月以起居舍人知制誥禮部侍郎出為杭守遘浙人也從父老請大士以音聲為佛事宜教不宜禪亦為具奏賜名靈感觀音院詔辨才法師弘天台教觀宋張詵元豐四年以龍圖閣學士知杭州以上竺首座法照法師用文升為住持文乃南屏慈辨法師弟也宋翁彥國宣和六年以徽猷閣學士知杭州奏以慧覺法師齊玉為上竺住持玉卒石林葉丞相夢鼎為銘吳說書宋康允之建炎三年以徽猷閣待制守杭奏以普明大師如靖住持上天竺宋孫覿紹興元年以朝奉郎龍圖閣待制知府事奏以佛照大師智堅為住持時丁兵火賜以祠牒建後殿及僧堂宋梁汝嘉紹興三年以龍圖閣待制知府事奏上以圓通大師應如為住持宋鄭清之丞相也端平三年奏上竺梵奎為住持詔補左街僧録宋吳潛寧國人嘉熙五年以中大夫試工部尚書兼吏部尚書兼侍講知府事奏上詔允憲住山宋趙與𥲅淳祐七年以資政殿學士兼觀文殿學士知臨安府事奏詔上竺以法照住山宋史彌遠四明人當國日奏列五山十剎比仕官之九棘三槐仍分禪教如文武班僧必出小院聲華彰著者拾級而升當時列上竺為教院五山第一山下竺為第二山中竺為禪院十剎第一剎元高納麟河西人太傅寧國公之子用名臣子入備宿衛起家中書舍人天歷元年除杭州總管至正元年靈山天竺寺災麟敦請東溟日法師恢復之四年仍請主上天竺寺護法殷殷蓋宿植然也斷禁宋趙清獻公熙寧三年及十年以資政殿大學士兩知杭州故民稱大資相公於靈竺極用情清察上竺下竺靈隱三寺坐山照山為興聖法安南院光福院及居民沈明梅承遇張僧壽産地山園奏請判還本寺永禁樵採燒畬以為三寺係東南古蹟全藉四向形勝掩比之五嶽四瀆並禁樵採影射聖旨依准施行至今賴之宋咸淳四年秋八月詔臨安府并上竺講寺以愚岡後培植禁伐加後澗構橋用接山勢元高納麟守杭有政績及為行宣政院使時上竺有僧犯法麟坐以重罪又奏設崇教所以治僧獄訟俾僧知罪國朝雷鳴陽雲南人嘉靖間公倅青州海寇亂公領青州兵至杭駐靈竺與僧善而知其病先是靈竺寺皆有先朝賜山萬畝時兵興皆以負郭山加餉而重役隨之利歸佃戶害則歸僧諸寺皆逃散次年公升本府二守始令僧當官告佃戶承買納餉當役僧得僅存寺有遺愛碑孫孟郡太守也嘉靖三十年衆舉珊一峯主修多福寺擅伐路松二株孫置之法并其徒正普俱還俗嘉靖間海寇亂督府宗憲胡公嚴造海舟凡故家墳墓大木皆不能免公特下令曰九里松唐時古蹟不許擅伐故獨保全孫沖萬歷初年為錢塘令寺僧德明補種九里松沖與禁樵採曰吾與種樹得養人術焉陳善郡紳方伯也載府志論云李氏謂天下治亂於雒陽名園盛衰驗之然則壯都邑之觀增山川之色匪特建置大者即一纖微草木之間亦可以觀欲存全盛之蹟者能無惜護乎哉北山自集慶而入夾道古松乃唐名守袁公所植翠蓋亭亭鬱蔥彌望遊者侈觀行者藉蔭亦美政一端在焉比者豪右或恣為翦伐黠僧因而販鬻料今所存屬各寺界者上竺祗六十一本中竺祗十六本下竺祗十一本疏稠靡均蓊藹非故自今不嚴其防戢昔賢遺愛駸蕩然矣嗟夫喬木不足以重故國甘棠非惠政所存而永懷者思保其蔽芾蒞治君子其毋以小物疏厲禁乎萬歷年間杭嚴何公寓所憤天竺之弊習劇加整飭因致書雲棲蓮大師兼行誘導挽其頽風蓮大師復以書曰蒙諭上天竺事謹陳白如左唯我公祖乘夙願力現宰官身以大慈心憫念末法僧徒少持戒行摘其尤者而置之法俾有罪者自新無罪者加勉是所以安僧非所以病僧也今兹發奸摘伏萬口稱快威畏德懷矣而繼承尊諭將申明佛制以開導而漸摩之是則雪霜之後煦以陽和殺伐既張綏以文德也義之盡仁之至護法之功莫斯為甚但宏衰病伶仃偷生巖穴兼之跛躄步履須人其何能勵精效勞以副委任責成之至意乎況今處士以橫議被逮時僧以傲世取尤以勢揆之亦所當避因別思所以稱台旨者昔唐文皇以遺教經普施天下州郡今此經本山重梓加以鄙見補注愚意不若流通此經概南北兩山城內外寺院菴堂大者與十冊中者與五冊小者與一冊人各受持不得違犯或能有俾於萬一也道尊如書所勸行之并諸山各申厲禁而天竺三木之刑乃釋錢塘龔邑侯審天竺與鄉紳爭山斷案曰本山寺山也二十三房於萬歷五年賣之於陳太僕則道柯為政萬歷四十一年賣之於李水部則祖玉為政衆僧明知寺山之不可賣而朦朧兩架之於兩先生意以不發則暫時雙獲其利發則必竟獨取其償不憂共鬥之更爭而竊幸可坐收其價縱官司責以擅賣公田彼將脫卸於鄉先生之意以免罪耳謀大狡矣雖然僧不足責也至若本山則僧不可賣鄉先生亦不必有也太僕之不必有無論矣李水部塋域切近或者以為孝子仁人為至親一抔作千年之計非得本山恐寺僧以後砍伐樹木傷損龍脈抑或盜賣他人混葬風水為害種種但必令我子孫守之不如萬世山門為我守也今官為厲禁杜其種種上以妥龍天之靈而旁以利縉紳之域斷亦足矣此意流傳三令五申於後來者勝於華胄之自為矣爰昔山門之意想土著之縉紳不後於傳舍之邑宰無寧使鄉先生自出此意而令衆僧懷德畏威賢於官斷遠矣惟水部裁之古之名卿尚舍宅為寺而塋域於寺者意或優長若太僕即遠在京師若愛之以德只有還山于寺之為德也此案既發鄉紳莫敢誰何崇禎年間按臺劉公諱士楨禁約曰照得三天竺者地擅飛來奉西方之大士名傳鷲嶺作彼岸之慈航祗以逼近西湖遂致聲譁南國時逢節序瞻仰如蟻近訪有等無知惡少蔑佛法而逞恣睢至於有眼狂儒亦棄楞嚴而墮惡道或假薦紳之聲勢或肆罡煞之凶殘魚肉緇流見在有刀山劍樹謗凌聖教又何逃戴角披毛陰網不疏王章丕著如有前項棍徒橫行嚇詐者許寺僧扭赴官司從公審究枷號寺門庶幾三尺長存五空不染大千世界輝佛日而鞏王圖清淨慈門集旃檀而驅羅剎特行給示普告羣生妝點唐袁仁敬開元十三年刺史杭州極愛靈竺政事之暇為種松九里號九里松後人思之建袁公亭其下又建門跨路曰袁公松門其後不無死者舊時靈竺僧好事失其名曾補種賦詩曰不為栽松待茯苓只圖山色四時青老僧終不將歸去留與錢塘作畫屏後有僧幻隱者亦曾補種萬歷初年僧德明又補種百株錢塘令孫公沖與禁樵採十不活一又令聶公心湯諭寺僧補種所活如之古山人論其不活之故有三居民既稠寸土可貴無論三行并一行之路皆侵其半或為牆籬庳厠久占不還一旦清查則種種不悅必加陰損一也各方香客既多城中樵採不少或游手戲攀或覻視為利未免生事貴木賤人仁者不為二也當道者縱斷而行矣叢怨不顧矣松必小者可種十年而後成官不久任繼者未必踵事三也然則松終不可復耶今亦有三道點其見在者不許民居其下罪寺僧一也既有伐松之能寧無種松之力宜令自一門至寺為茶坊五令僧居守官又以輕贖者植嚴諭者約是兩利也僧既住所管每枯一松例補植活小松五株許補不許伐此三道也五年而後木成矣如此不又稱某公攸植耶宋孝宗皇帝淳熙元年賜盤雲檜二本蓋唐相牛僧孺園中物也植之上竺殿階下以為佛供其枝幹盤回團雲綰霧儼如寶幢翠蓋相對峙耳辨才法師手植千葉山茶二本在白雲堂下雲液池上自宋歷元柯葉暢茂若有呵護冬之時嫩蕊含緋繁英簇錦照映巖谷以代衣裓之散也宋吳說書九里松扁乃祕閣吳師禮子世工翰墨人評其端穩秀潤高宗欲易以己書屢書不能踰遂命以金飾之宋范仲淹皇祐元年自知鄧州移知杭州吳中大饑日出宴湖上又諭諸寺主曰歲饑工價至賤可大興土木之役於是諸寺鼎興工作使貧力技役皆得仰食於此杭民不至流徙宋曹澄知臨安府事隆興二年九月奉詔督建上竺法堂并五百阿羅漢閣宋理宗御書上竺天台教寺額宋蔡學士襄書靈感觀音之殿丞相京鏜紹熙五年書兩峯堂扁國朝曹國公李文忠書上天竺三字山門額潞王淨寧書曰大慈悲父翰林蔣暉書曰圓通妙境工部吳涵書曰慈悲感應知府李文奎書曰淨聖按臺劉士楨書曰自在慈航按臺王範書曰慈航濟世經筵姜逢元書曰普照大千撫臺尹應元書曰塵海慈航古虞徐觀復書曰一音圓照吳興潘湛書曰良哉淨聖雲間楊萬里書曰靈巖慧照工部朱廷煥書曰慈航廣渡杭兵道吳伯與書曰觀察法界撫臺熊奮渭書曰望洋彼岸鹽臺馮垣登書曰不可思議祭悼宋蘇端明軾祭辨才法師文曰孔老異同儒釋分宮又於其間禪律相攻我見大海有南北東江河雖殊其至則同維大法師自戒定通律無持破垢淨皆空講無辨訥事理皆融如不動山如常撞鐘如一月水如萬竅風八十一年生雖有終遇物而應施則無窮我初適吳尚見五公講有辨臻禪有璉嵩後二十年獨餘此翁翁又去矣後生誰宗道俗欷歔山澤改容誰持一杯往弔井龍我知杭時白叟黃童要我復來已許於中山無此老去將安從噫參寥子往奠必躬豈無他人莫寫我胸佛光照祭禮禪師文曰維淳祐六年歲在庚戌十月癸巳朔十四日丙午天竺山人法照謹以湯茗果饌之奠致祭滅翁禪師之靈曰魂兮歸來兮梁之渚風蕭蕭兮木葉下瞻太白兮芒寒蹇獨立兮誰語麋何食兮中洲蛟何為乎元浦夕惕兮余懷奠藴藻兮筐筥尚饗竺庵冏祭上天竺覺幻師長和尚文曰維師教育儒經釋典策我勤讀攝之以慈誨之必穀日漸月漬殘膏賸馥不念至愚期成欲速鳥漸高飛牛顧後逐師之恩深如雨霑木匪寒不衣匪昏不燭師之深恩罔報慙恧將期有侍遽嬰疾篤奄爾真歸露晞電矚於戲哀哉音不在耳容不在目悲風滿屋雖欲不哭焉得不哭尚享國朝忠肅公于謙弔祭古春蘭法師詩有序曰古春法師先君方外交也昔豫彌月時師赴湯餅之會嘗摩豫之頂曰此兒他日救時宰相也已而齠齔知學先君數以師言警豫及登第拜官日恐負師言以貽瘝曠之羞兹嬰內艱家居改葬先柩於三台山下而師與先君不可復作矣感時追舊祇具蔬盤茗碗展拜塔下爰賦詩一律以志豫之耿耿云維那正法眼冰鑑獨先知摩頂昔憐我銘心更憶師救時慚宰相被謗懼磷緇拜奠香臺下臨風雪涕洟鍾我靈撰祭春山師文曰浮玉巃嵸苕水瀜瀜山峙水流蜿蜒如龍川嶽英秀瑞氣所鍾篤生哲人繄惟我翁菰城世胤錢氏巨族族多文學如金如玉翁於沖齒遂脫塵緣雪霜礪志艱苦備全少壯拮据手足胝胼肯厥堂構訓育後賢森挺馥郁桂蘭盈前坦夷應物衷無黨偏詩頌溫溫易著謙謙洎乎垂暮梵網精嚴六時禮誦人天起虔壽齊宣聖飄然上仙哲人其萎梁木斯傾高山失抑爰喪典型林嵐減色猿鳥哀鳴曷能不悲頓足拊膺弔盈陶鶴春輟秦聲臨風設俎黍稷苾芬薦以芳芷雜以香蘅惟翁之靈來格來歆
